<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLOPs Are Cheap. Bytes Are Not.</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  .lrow { display: flex; gap: 3px; margin-bottom: 3px; opacity: 0; position: relative; }
  .lcell {
    height: 32px; display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, monospace; font-size: 12px;
    background: #232836; border-radius: 6px; color: #c7cce0;
  }
  .lcell.lab { justify-content: flex-start; padding-left: 9px; font-family: inherit; font-size: 11.5px; background: transparent; }
  .lcell.hd { font-weight: 700; font-family: inherit; font-size: 11px; color: var(--ink-2); background: transparent; }
  #spec { position: absolute; left: 44px; top: 118px; width: 500px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; }
  #spec h3 { margin: 0 0 8px; font-size: 14px; }
  #spec h3 .note { font-size: 10px; color: var(--ink-2); font-weight: 400; margin-left: 6px; }
  #spec .lcell.lab { width: 148px; }
  #spec .lcell:not(.lab) { width: 100px; }
  .gname { font-weight: 700; }
  .gsub { font-size: 9px; color: var(--ink-2); margin-left: 5px; }

  #axis { position: absolute; left: 590px; top: 128px; height: 330px; }
  #axis .rail { position: absolute; left: 40px; top: 0; bottom: 0; width: 2px; background: var(--line); }
  #axis .alab { position: absolute; left: 0; top: -24px; width: 120px; font-size: 11px; color: var(--ink-2); }
  .bdot { position: absolute; left: 34px; width: 14px; height: 14px; border-radius: 50%; opacity: 0; }
  .bval { position: absolute; left: 54px; font: 700 12.5px ui-monospace, monospace; opacity: 0; white-space: nowrap; }
  #eq {
    position: absolute; left: 470px; top: 470px; min-width: 240px;
    font: 600 16px ui-monospace, monospace; color: #e8eaf0;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 9px 15px; opacity: 0; white-space: nowrap; z-index: 9;
  }
  #eq b { color: var(--accent); }

  .callout {
    position: absolute; font: 11.5px ui-monospace, monospace; line-height: 1.5;
    border: 1px solid; border-radius: 8px; padding: 5px 10px; opacity: 0;
  }
  #co-h200 { left: 44px; top: 368px; width: 300px; color: #6fb1ff; border-color: rgba(111,177,255,0.45); background: rgba(57,135,229,0.08); }
  #co-div { left: 44px; top: 452px; width: 300px; color: #e0a935; border-color: rgba(201,133,0,0.45); background: rgba(201,133,0,0.07); }
  #co-rubin { left: 370px; top: 452px; width: 250px; color: #6b7284; border-color: var(--line); }

  #prec { position: absolute; left: 370px; top: 356px; width: 260px; opacity: 0; }
  #prec .plab { font-size: 10.5px; color: var(--ink-2); margin-bottom: 4px; }
  #prec .prow { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
  #prec .pname { width: 34px; font: 700 10px ui-monospace, monospace; color: #2fd6b0; }
  #prec .pbar { height: 12px; border-radius: 3px 5px 5px 3px; background: #2fd6b0; width: 0; }
  #prec .pval { font: 10px ui-monospace, monospace; color: var(--ink-2); white-space: nowrap; }

  #rack { position: absolute; left: 44px; top: 555px; width: 560px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px 16px; opacity: 0; display: flex; gap: 16px; align-items: center; }
  #rackgrid { display: grid; grid-template-columns: repeat(12, 10px); gap: 3px; }
  #rackgrid i { width: 10px; height: 10px; border-radius: 2px; background: rgba(144,133,233,0.55); }
  #rack .rtxt { font-size: 11.5px; line-height: 1.55; color: var(--ink-2); }
  #rack .rtxt b { color: var(--c-o); font-size: 12.5px; }

  #roof { position: absolute; left: 700px; top: 128px; opacity: 0; }
  #roof text { font-family: ui-monospace, monospace; fill: #6b7284; font-size: 10px; }
  #roof .axisline { stroke: var(--line); stroke-width: 1.5; }
  #roof .roofline { stroke: #3987e5; stroke-width: 3; fill: none; stroke-linecap: round; }
  #roof .region { font-size: 11px; font-weight: 700; }
  #ridge { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #3987e5; box-shadow: 0 0 16px rgba(57,135,229,0.8); opacity: 0; z-index: 9; }
  #wdot { position: absolute; width: 15px; height: 15px; border-radius: 50%; background: #e0a935; box-shadow: 0 0 14px rgba(224,169,53,0.8); opacity: 0; z-index: 9; }
  #wq { position: absolute; font: 800 22px ui-monospace, monospace; color: #e0a935; opacity: 0; z-index: 9; }
  #aidef {
    position: absolute; left: 700px; top: 96px; font: 600 13px ui-monospace, monospace;
    color: var(--accent); opacity: 0;
  }
  #punch {
    position: absolute; left: 660px; top: 560px; width: 576px;
    font-size: 13.5px; color: var(--accent); font-weight: 600; line-height: 1.55; opacity: 0;
  }
  #punch .cliff { color: var(--ink-2); font-weight: 400; font-style: italic; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">FLOPs Are Cheap. Bytes Are Not.</div>
  <div class="slide-sub">machine balance = TFLOPS ÷ TB/s — derived live from the spec sheet</div>

  <div id="spec">
    <h3>Per-GPU trajectory <span class="note" id="sparsenote"></span></h3>
    <div id="specrows"></div>
  </div>

  <div id="axis">
    <div class="alab">machine balance<br>(FLOPs / byte)</div>
    <div class="rail"></div>
  </div>
  <div id="eq"></div>

  <div class="callout" id="co-h200"></div>
  <div class="callout" id="co-div"></div>
  <div class="callout" id="co-rubin"></div>
  <div id="prec"><div class="plab">same B200 silicon, three ceilings (dense TFLOPS):</div></div>

  <div id="rack">
    <div id="rackgrid"></div>
    <div class="rtxt" id="racktxt"></div>
  </div>

  <div id="aidef">AI = FLOPs performed ÷ bytes moved from HBM</div>
  <svg id="roof" width="536" height="400"></svg>
  <div id="ridge"></div>
  <div id="wdot"></div>
  <div id="wq">?</div>
  <div id="punch"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/gpus.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("sparsenote").textContent = GPUS.sparse;
  document.getElementById("co-h200").textContent = "H200: " + GPUS.h200note + " — a refresh the market paid a premium for, purely for memory";
  document.getElementById("co-div").textContent = GPUS.divergence + " — the wall is getting worse";
  document.getElementById("co-rubin").textContent = GPUS.rubin;
  document.getElementById("punch").innerHTML = GPUS.punchline + '<br><span class="cliff">' + GPUS.cliffhanger + "</span>";
  document.getElementById("racktxt").innerHTML = "<b>" + GPUS.nvl72.name + "</b> — " + GPUS.nvl72.gpus +
    " GPUs, one NVLink domain<br>" + GPUS.nvl72.hbm + " · " + GPUS.nvl72.aggBw + "<br>" +
    GPUS.nvl72.nvlink + " → expert parallelism";

  // spec table
  var rows = document.getElementById("specrows");
  var hd = document.createElement("div");
  hd.className = "lrow";
  hd.innerHTML = '<div class="lcell lab hd">GPU</div><div class="lcell hd">BF16 dense</div><div class="lcell hd">HBM BW</div><div class="lcell hd">HBM</div>';
  rows.appendChild(hd);
  GPUS.list.forEach(function (g) {
    var d = document.createElement("div");
    d.className = "lrow"; d.id = "row-" + g.key;
    var w = g.approx ? " ⚠" : "";
    d.innerHTML = '<div class="lcell lab"><span class="gname" style="color:' + g.color + '">' + g.name +
      '</span><span class="gsub">' + g.gen + "</span></div>" +
      '<div class="lcell">' + (g.approx ? "~" : "") + g.tflops.toLocaleString() + "</div>" +
      '<div class="lcell">' + g.bw.toFixed(g.bw % 1 ? 2 : 1) + " TB/s" + w + "</div>" +
      '<div class="lcell">' + g.cap + " GB</div>";
    rows.appendChild(d);
  });

  // balance axis dots (scale 0..500 over 330px, top=500)
  var axis = document.getElementById("axis");
  function yFor(v) { return 330 - v / 500 * 330; }
  GPUS.list.forEach(function (g) {
    var v = GPUS.balance(g);
    var dot = document.createElement("div");
    dot.className = "bdot"; dot.id = "bdot-" + g.key;
    dot.style.background = g.color;
    dot.style.boxShadow = "0 0 12px " + g.color + "aa";
    dot.style.top = (yFor(v) - 7) + "px";
    axis.appendChild(dot);
    var lab = document.createElement("div");
    lab.className = "bval"; lab.id = "bval-" + g.key;
    lab.style.color = g.color;
    var dy = { h100: -9, b200: 9 }[g.key] || 0;   // 295 and 281 sit close
    lab.style.top = (yFor(v) - 8 + dy) + "px";
    lab.textContent = "~" + v + (g.approx ? " ⚠" : "") + "  " + g.name;
    axis.appendChild(lab);
  });

  // NVL72 rack grid
  var rg = document.getElementById("rackgrid");
  for (var i = 0; i < 72; i++) rg.appendChild(document.createElement("i"));

  // precision bars
  var prec = document.getElementById("prec");
  GPUS.precision.forEach(function (p) {
    var r = document.createElement("div");
    r.className = "prow";
    r.innerHTML = '<div class="pname">' + p[0] + '</div><div class="pbar" data-w="' + (p[1] / 9000 * 190) + '"></div>' +
      '<div class="pval">' + p[1].toLocaleString() + "</div>";
    prec.appendChild(r);
  });

  var eq = document.getElementById("eq");
  var tl = gsap.timeline({ paused: true });

  // steps 1-5: one GPU generation per click
  GPUS.list.forEach(function (g, i) {
    tl.fromTo("#row-" + g.key, { opacity: 0, x: -16 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" });
    if (i === 0) tl.fromTo("#spec, #axis .alab, #axis .rail", { opacity: 0 }, { opacity: 1, duration: 0.4 }, "<");
    tl.call(function () {
      eq.innerHTML = g.tflops.toLocaleString() + " ÷ " + g.bw + " = <b>~" + GPUS.balance(g) + " FLOPs/byte</b>";
    })
      .fromTo(eq, { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.35 })
      .fromTo("#bdot-" + g.key, { opacity: 0, scale: 0, y: -30 }, { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "bounce.out" })
      .fromTo("#bval-" + g.key, { opacity: 0 }, { opacity: 1, duration: 0.3 }, "-=0.2");

    if (g.key === "h200") {
      tl.to("#row-h200 .lcell", { borderColor: "#6fb1ff", boxShadow: "inset 0 0 0 1.5px rgba(111,177,255,0.6)", duration: 0.3 }, "-=0.2")
        .fromTo("#co-h200", { opacity: 0, x: -12 }, { opacity: 1, x: 0, duration: 0.4 });
    }
    if (g.key === "b200") {
      tl.fromTo("#prec", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 });
      document.querySelectorAll("#prec .pbar").forEach(function (b) {
        tl.fromTo(b, { width: 0 }, { width: b.dataset.w + "px", duration: 0.45, ease: "power2.out" }, "<+0.08");
      });
    }
    if (g.key === "b300") {
      tl.fromTo("#co-div", { opacity: 0, x: -12 }, { opacity: 1, x: 0, duration: 0.4 })
        .fromTo("#co-rubin", { opacity: 0 }, { opacity: 1, duration: 0.4 }, "-=0.2");
    }
    DECK.markStep(tl);
  });

  // step 6: NVL72 rack (the equation chip has served its purpose)
  tl.to(eq, { opacity: 0, duration: 0.3 })
    .fromTo("#rack", { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" })
    .fromTo("#rackgrid i", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.25, stagger: { each: 0.008, from: "start" } }, "-=0.3");
  DECK.markStep(tl);

  // step 7: the roofline draws; H100's ratio flies over as the ridge point
  // log-log: x = AI 2^0..2^10 over 460px (x0=60), y = TFLOPS 2^0..2^14 over 330px (y0=360)
  var X0 = 60, W = 460, Y0 = 360, H = 330;
  function rx(ai) { return X0 + Math.log2(ai) / 10 * W; }
  function ry(tf) { return Y0 - Math.log2(tf) / 14 * H; }
  var svg = document.getElementById("roof");
  var NS = "http://www.w3.org/2000/svg";
  function el(tag, attrs, txt) {
    var e = document.createElementNS(NS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (txt) e.textContent = txt;
    svg.appendChild(e);
    return e;
  }
  el("line", { x1: X0, y1: Y0, x2: X0 + W, y2: Y0, "class": "axisline" });
  el("line", { x1: X0, y1: Y0, x2: X0, y2: Y0 - H, "class": "axisline" });
  [1, 4, 16, 64, 256, 1024].forEach(function (v) {
    el("text", { x: rx(v) - 8, y: Y0 + 16 }, String(v));
  });
  [1, 16, 256, 4096].forEach(function (v) {
    el("text", { x: X0 - 38, y: ry(v) + 4 }, String(v));
  });
  el("text", { x: X0 + W / 2 - 60, y: Y0 + 34 }, "arithmetic intensity (FLOPs/byte)");
  el("text", { x: X0 - 46, y: ry(16384) - 8 }, "TFLOPS");
  var h = GPUS.list[1]; // H100
  var bal = GPUS.balance(h);
  var roofPath = el("path", {
    d: "M " + rx(1) + " " + ry(h.bw) + " L " + rx(bal) + " " + ry(h.tflops) + " L " + rx(1024) + " " + ry(h.tflops),
    "class": "roofline",
  });
  var plen = roofPath.getTotalLength();
  roofPath.style.strokeDasharray = plen;
  roofPath.style.strokeDashoffset = plen;
  var memT = el("text", { x: rx(4), y: ry(400), "class": "region", fill: "#6fb1ff", opacity: 0 }, "memory-bound");
  var cmpT = el("text", { x: rx(340), y: ry(3600), "class": "region", fill: "#2fd6b0", opacity: 0 }, "compute-bound");
  el("text", { x: rx(bal) - 20, y: ry(h.tflops) - 26, fill: "#3987e5", opacity: 0, id: "ridgelab" }, "ridge = 295");

  // stage coords of the ridge (svg sits at 700,128)
  var RIDGE = { x: 700 + rx(bal), y: 128 + ry(h.tflops) };

  tl.fromTo("#aidef", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .fromTo("#roof", { opacity: 0 }, { opacity: 1, duration: 0.4 }, "-=0.2")
    .to(roofPath, { strokeDashoffset: 0, duration: 1.1, ease: "power2.inOut" })
    .fromTo("#ridge",
      { opacity: 1, left: 560, top: 300, scale: 0.6 },
      { left: RIDGE.x - 8, top: RIDGE.y - 8, scale: 1, duration: 0.8, ease: "power2.inOut" })
    .to("#ridgelab", { opacity: 1, duration: 0.3 })
    .to(memT, { opacity: 1, duration: 0.35 })
    .to(cmpT, { opacity: 1, duration: 0.35 }, "-=0.15");
  DECK.markStep(tl);

  // step 8: workload dot rides the roof from compute-bound down to AI ~ 1
  var path2 = [];
  [900, 500, bal, 64, 16, 4, 1.3].forEach(function (ai) {
    var tf = Math.min(h.tflops, h.bw * ai);
    path2.push({ left: 700 + rx(ai) - 7, top: 128 + ry(tf) - 7 });
  });
  tl.fromTo("#wdot", { opacity: 0 }, { opacity: 1, duration: 0.3, left: path2[0].left, top: path2[0].top });
  path2.slice(1).forEach(function (p) {
    tl.to("#wdot", { left: p.left, top: p.top, duration: 0.45, ease: "power1.inOut" });
  });
  tl.call(function () {
    var q = document.getElementById("wq");
    q.style.left = (path2[6].left - 2) + "px";
    q.style.top = (path2[6].top - 34) + "px";
  })
    .fromTo("#wq", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.5)" })
    .to("#wq", { scale: 1.25, duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut" })
    .fromTo("#punch", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.5 }, "-=0.8");

  DECK.register(tl, {});
</script>
</body>
</html>
