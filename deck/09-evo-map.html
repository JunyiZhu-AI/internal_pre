<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Attention Evolution Map</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #metric { position: absolute; left: 0; top: 140px; width: 100%; text-align: center; font: 600 15px ui-monospace, monospace; color: var(--accent); opacity: 0; }
  #lineage { position: absolute; left: 72px; top: 240px; display: flex; align-items: flex-start; opacity: 0; }
  .nd { width: 140px; text-align: center; opacity: 0.26; filter: grayscale(0.9); transition: opacity 0.5s, filter 0.5s; }
  .nd.on { opacity: 1; filter: none; }
  .nd .gwrap { height: 56px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 12px; }
  .nd .nm { font: 800 13.5px ui-monospace, monospace; }
  .nd .sb { font: 10.5px ui-monospace, monospace; color: #6b7284; margin-top: 3px; }
  .nd .by { font: 700 12px ui-monospace, monospace; color: #c7cce0; margin-top: 7px; }
  .conn { width: 26px; height: 2px; background: #2a2e3b; margin-top: 27px; flex: none; transform-origin: left center; }
  /* matrix-form glyphs */
  .g { display: flex; align-items: flex-end; justify-content: center; gap: 2px; }
  .gs { display: block; height: 44px; border-radius: 2px; background: linear-gradient(180deg, rgba(144,133,233,0.45), #9085e9); }
  .gs.cap { border-radius: 6px; box-shadow: 0 0 10px rgba(144,133,233,0.8); }
  .g.mat { display: grid; grid-template-columns: repeat(6, 7px); gap: 1px; }
  .g.mat b { width: 7px; height: 7px; border-radius: 1.5px; display: block; }
  .gsq { width: 40px; height: 40px; border: 2px solid; border-radius: 7px; display: flex; flex-direction: column; justify-content: space-evenly; padding: 5px; background: rgba(47,214,176,0.06); }
  .gsq u { display: block; height: 4px; border-radius: 2px; background: #2fd6b0; }
  .gsq.kda { background: rgba(224,75,56,0.05); }
  #gaugewrap { position: absolute; left: 50%; transform: translateX(-50%); top: 470px; opacity: 0; }
  #gaugewrap .ev-gauge b { font-size: 16px; }
  #story { position: absolute; left: 0; bottom: 72px; width: 100%; text-align: center; font-size: 20px; font-weight: 800; color: var(--accent); opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">The Attention Evolution Map</div>
  <div class="slide-sub">seven architectures — the same n×n matrix and purple strips, reshaped again and again</div>

  <div id="metric"></div>
  <div id="lineage"></div>
  <div id="gaugewrap"><div class="ev-gauge">KV bytes / token · <b id="gv">2.6 MB</b></div></div>
  <div id="story"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("metric").textContent = EV.metric;
  document.getElementById("story").textContent = EV.story;

  function glyphHTML(key) {
    var s = "", i, r, c;
    if (key === "mha") { for (i = 0; i < 14; i++) s += '<i class="gs" style="width:3px"></i>'; return '<div class="g">' + s + "</div>"; }
    if (key === "gqa") { for (i = 0; i < 4; i++) s += '<i class="gs" style="width:9px"></i>'; return '<div class="g">' + s + "</div>"; }
    if (key === "mla") return '<div class="g"><i class="gs cap" style="width:11px"></i></div>';
    if (key === "sparse") {
      for (r = 0; r < 6; r++) for (c = 0; c < 6; c++) {
        var bg = c > r ? "transparent" : (r - c < 2 ? "rgba(224,169,53,0.85)" : "rgba(57,135,229,0.14)");
        s += '<b style="background:' + bg + '"></b>';
      }
      return '<div class="g mat">' + s + "</div>";
    }
    if (key === "linear") { for (i = 0; i < 4; i++) s += '<u style="opacity:.55"></u>'; return '<div class="g"><span class="gsq" style="border-color:#2fd6b0">' + s + "</span></div>"; }
    if (key === "hybrid") { for (i = 0; i < 4; i++) s += '<u style="opacity:.55"></u>'; return '<div class="g" style="gap:5px"><span class="gsq" style="border-color:#9085e9;width:28px;height:28px;padding:4px">' + s + '</span><i class="gs" style="width:8px;height:32px"></i></div>'; }
    if (key === "kda") { for (i = 0; i < 5; i++) s += '<u style="opacity:' + (0.15 + i * 0.2) + '"></u>'; return '<div class="g"><span class="gsq kda" style="border-color:#e04b38">' + s + "</span></div>"; }
    return "";
  }

  var lin = document.getElementById("lineage");
  EV.nodes.forEach(function (n, i) {
    if (i) lin.insertAdjacentHTML("beforeend", '<div class="conn"></div>');
    lin.insertAdjacentHTML("beforeend",
      '<div class="nd" id="nd-' + n.key + '"><div class="gwrap">' + glyphHTML(n.key) + "</div>" +
      '<div class="nm" style="color:' + n.color + '">' + n.name + "</div>" +
      '<div class="sb">' + n.sub + "</div>" +
      '<div class="by">' + (n.bytes ? n.bytes + (n.warn ? "" : "") : "&nbsp;") + "</div></div>");
  });

  function on(key) { document.getElementById("nd-" + key).classList.add("on"); }
  function setG(txt) {
    document.getElementById("gv").textContent = txt;
    gsap.fromTo("#gaugewrap", { scale: 1.14 }, { scale: 1, duration: 0.45, ease: "power2.out" });
  }

  var tl = gsap.timeline({ paused: true });

  // step 1: the skeleton — seven matrix-forms, one metric, gauge at MHA
  tl.fromTo("#lineage", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" })
    .fromTo(".conn", { scaleX: 0 }, { scaleX: 1, duration: 0.35, stagger: 0.06, ease: "power2.out" }, "<")
    .fromTo("#metric", { opacity: 0 }, { opacity: 1, duration: 0.45 })
    .fromTo("#gaugewrap", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .call(function () { on("mha"); });
  DECK.markStep(tl);

  // step 2: the cache shrinks — GQA, MLA, Sparse
  tl.call(function () { on("gqa"); setG("330 KB"); }).to({}, { duration: 0.9 })
    .call(function () { on("mla"); setG("~70 KB"); }).to({}, { duration: 0.9 })
    .call(function () { on("sparse"); setG("≤ window"); }).to({}, { duration: 0.9 });
  DECK.markStep(tl);

  // step 3: the cache disappears — Linear, Hybrid, KDA
  tl.call(function () { on("linear"); setG("O(1) state"); }).to({}, { duration: 0.9 })
    .call(function () { on("hybrid"); }).to({}, { duration: 0.9 })
    .call(function () { on("kda"); setG("~tens of KB (state)"); }).to({}, { duration: 0.9 });
  DECK.markStep(tl);

  // step 4: the story in one line
  tl.fromTo("#story", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" });

  DECK.register(tl, {
    reset: function () {
      document.querySelectorAll(".nd.on").forEach(function (n) { n.classList.remove("on"); });
      document.getElementById("gv").textContent = "2.6 MB";
      gsap.set("#gaugewrap", { scale: 1 });
    }
  });
</script>
</body>
</html>
