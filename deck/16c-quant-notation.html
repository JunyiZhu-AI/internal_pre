<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantization: Decoding the Notation</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/bottlenecks.css">
<style>
  /* ---- the four-bucket machine (slide-02 visual language) ---- */
  #machine { position: absolute; inset: 0; opacity: 0.13; filter: grayscale(0.9); }
  #pkg {
    position: absolute; left: 44px; top: 112px; width: 545px; height: 392px;
    border: 1.5px solid var(--line); border-radius: 18px; background: rgba(27,30,39,0.45);
  }
  #pkg .pkglab { position: absolute; left: 16px; top: 10px; font-size: 11px; color: var(--ink-2); letter-spacing: 0.08em; }

  #hbm {
    position: absolute; left: 76px; top: 168px; width: 158px; height: 300px;
    border: 2px solid rgba(201,133,0,0.7); border-radius: 8px;
  }
  #hbm .hlab { position: absolute; bottom: 4px; width: 100%; text-align: center; font-size: 10.5px; color: #e0a935; font-weight: 700; }
  #wblock { position: absolute; left: 8px; top: 10px; right: 8px; display: flex; flex-wrap: wrap; gap: 2px; align-content: flex-start; }
  .wcell {
    flex: none; width: 28px; height: 13px; border-radius: 2px;
    background: linear-gradient(rgba(201,133,0,0.45), rgba(201,133,0,0.85));
    animation: wGlow 2.6s ease-in-out infinite;
  }
  .wcell:nth-child(3n) { animation-delay: 0.6s; }
  .wcell:nth-child(4n) { animation-delay: 1.3s; }
  @keyframes wGlow { 50% { opacity: 0.55; } }
  #wblab { position: absolute; left: 8px; top: 132px; right: 8px; text-align: center; font: 600 9.5px ui-monospace, monospace; color: rgba(224,169,53,0.85); }
  #freed {
    position: absolute; left: 8px; right: 8px; top: 148px; bottom: 24px;
    border: 1.5px dashed rgba(224,169,53,0.45); border-radius: 6px; opacity: 0;
    display: flex; align-items: center; justify-content: center; text-align: center;
    font: 600 10px ui-monospace, monospace; color: rgba(224,169,53,0.85); line-height: 1.5;
  }

  .pipe {
    position: absolute; left: 240px; top: 296px; width: 148px; height: 16px;
    border: 2px solid rgba(47,214,176,0.55); border-radius: 8px; overflow: hidden;
  }
  .pipe i {
    position: absolute; top: 3px; width: 6px; height: 6px; border-radius: 50%;
    background: #2fd6b0; animation: qFlow 1.1s linear infinite;
  }
  .pipe i:nth-child(2) { animation-delay: 0.22s; }
  .pipe i:nth-child(3) { animation-delay: 0.44s; }
  .pipe i:nth-child(4) { animation-delay: 0.66s; }
  .pipe i:nth-child(5) { animation-delay: 0.88s; }
  @keyframes qFlow { from { left: -8px; } to { left: 156px; } }
  .pipe.thin { border-color: rgba(47,214,176,0.3); }
  .pipe.thin i { width: 4px; height: 4px; top: 4px; animation-duration: 2.6s; opacity: 0.75; }
  .pipe.thin i:nth-child(4), .pipe.thin i:nth-child(5) { display: none; }

  #die {
    position: absolute; left: 396px; top: 214px; width: 158px; height: 196px;
    border: 2.5px solid #3987e5; border-radius: 10px; background: #0d1420;
    animation: bnChipPulse 1.8s ease-in-out infinite;
  }
  #die .dlab { position: absolute; bottom: 6px; width: 100%; text-align: center; font-size: 12px; color: #9ec7f5; font-weight: 600; }
  .tiles {
    position: absolute; inset: 10px 10px 26px; display: grid; gap: 3px;
    grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr);
  }
  .tiles i { background: rgba(57,135,229,0.22); border-radius: 2px; animation: smTwinkle 2.6s ease-in-out infinite; }
  .tiles i:nth-child(3n) { animation-delay: 0.5s; }
  .tiles i:nth-child(4n) { animation-delay: 1.1s; }
  .tiles i:nth-child(5n) { animation-delay: 1.7s; background: rgba(57,135,229,0.34); }
  @keyframes smTwinkle { 50% { background: rgba(111,177,255,0.6); } }
  #die.hold { animation: none; border-color: rgba(57,135,229,0.4); }
  #die.hold .tiles i { animation: none; background: rgba(57,135,229,0.07); }
  #die.lp { animation: lpPulse 1.2s ease-in-out infinite; border-color: #6fb1ff; }
  #die.lp .tiles i { animation: lpTwinkle 1.1s ease-in-out infinite; background: rgba(111,177,255,0.5); }
  @keyframes lpPulse { 50% { box-shadow: 0 0 26px rgba(111,177,255,0.8); } }
  @keyframes lpTwinkle { 50% { background: #9ec7f5; } }

  #dietag {
    position: absolute; left: 372px; top: 178px; width: 206px; text-align: center;
    font: 700 11px ui-monospace, monospace; color: #8a91a5; opacity: 0; z-index: 8;
    border: 1.5px solid #3a3f4f; border-radius: 999px; padding: 3px 6px; background: rgba(11,13,18,0.88);
  }
  #dietag.lp { color: #6fb1ff; border-color: rgba(111,177,255,0.6); }

  /* the two control chips (dials) + the KV chip */
  .dial {
    position: absolute; font: 700 11px ui-monospace, monospace; padding: 3px 9px; border-radius: 999px;
    background: rgba(11,13,18,0.92); border: 1.5px solid; opacity: 0; z-index: 8; white-space: nowrap;
  }
  .dial b { color: #e8eaf0; margin-left: 5px; }
  #wchip { left: 60px; top: 148px; border-color: rgba(224,169,53,0.85); color: #e0a935; }
  #achip { left: 234px; top: 262px; border-color: rgba(111,177,255,0.8); color: #6fb1ff; }
  #kvchip { left: 60px; top: 452px; border-color: rgba(144,133,233,0.85); color: #9085e9; }

  /* zone flashes, exactly slide-02's */
  .zflash { position: absolute; opacity: 0; pointer-events: none; z-index: 20; border-radius: 12px; }
  #fl-cap { left: 70px; top: 162px; width: 170px; height: 312px; border: 3px solid #c98500; box-shadow: 0 0 26px rgba(201,133,0,0.8); }
  #fl-bw { left: 232px; top: 288px; width: 164px; height: 32px; border: 3px solid #2fd6b0; box-shadow: 0 0 26px rgba(47,214,176,0.8); }
  #fl-compute { left: 390px; top: 208px; width: 170px; height: 208px; border: 3px solid #3987e5; box-shadow: 0 0 26px rgba(57,135,229,0.8); }

  /* ---- right column ---- */
  #hero { position: absolute; left: 620px; top: 116px; width: 616px; }
  #hero .hrow { display: flex; align-items: baseline; gap: 10px; opacity: 0; }
  #hero .hbig { font: 800 42px ui-monospace, monospace; letter-spacing: -0.01em; }
  #hero .hbig .w { color: #e0a935; } #hero .hbig .a { color: #6fb1ff; } #hero .hbig .b { color: #e8eaf0; }
  #hero .hrest { font: 600 14.5px ui-monospace, monospace; color: #c7cce0; }
  #etiq { margin-top: 10px; font-size: 11.5px; font-style: italic; color: var(--ink-2); opacity: 0; }

  .panel { position: absolute; left: 620px; width: 616px; }
  #wpanel { top: 226px; } #apanel { top: 314px; }
  .panel .ph { font: 700 13px ui-monospace, monospace; opacity: 0; }
  #wpanel .ph { color: #e0a935; } #apanel .ph { color: #6fb1ff; }
  .panel .pw { margin-top: 3px; font-size: 12px; color: #c7cce0; line-height: 1.4; opacity: 0; }
  .panel .pb { margin-top: 2px; font-size: 12px; font-weight: 600; line-height: 1.4; opacity: 0; }
  #wpanel .pb { color: #2fd6b0; } #apanel .pb { color: #3987e5; }
  #apanel .pk { margin-top: 5px; font-size: 11.5px; color: #9085e9; line-height: 1.4; opacity: 0; }

  #caveat { position: absolute; left: 620px; top: 424px; width: 616px; font-size: 12.5px; font-weight: 600; color: #e04b38; line-height: 1.45; opacity: 0; }
  #b200 { position: absolute; left: 620px; top: 472px; width: 616px; }
  #b200lab { font-size: 11.5px; color: var(--ink-2); margin-bottom: 8px; line-height: 1.4; opacity: 0; }
  .brow { display: flex; align-items: center; gap: 9px; height: 21px; opacity: 0; }
  .brow .bname { width: 40px; font: 700 11px ui-monospace, monospace; }
  .brow .bfill { height: 13px; border-radius: 3px; transform-origin: left; }
  .brow .bval { font: 600 11px ui-monospace, monospace; color: #c7cce0; white-space: nowrap; }

  /* ---- taxonomy: technique-cards, slide-02 toolkit style ---- */
  #tax { position: absolute; left: 44px; top: 576px; width: 966px; display: flex; gap: 8px; align-items: stretch; }
  #unlock { width: 96px; flex: none; }
  #unlock .abbr { font-size: 12px; white-space: nowrap; }
  #unlock .full { font-size: 9px; }
  #unlock .lock { top: auto; bottom: 6px; }
  #unlock.open { filter: none; border-color: var(--accent); box-shadow: 0 0 14px rgba(47,214,176,0.35); }
  #unlock.open .abbr { color: var(--accent); }
  .qcard {
    flex: 1; position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 7px 9px; opacity: 0;
  }
  .qcard .qn { font: 700 12.5px ui-monospace, monospace; color: #c7cce0; }
  .qcard .qm { margin-top: 2px; font-size: 9px; color: #9aa1b5; line-height: 1.3; }
  .qcard .qb { margin-top: 2px; font-size: 9px; font-weight: 700; line-height: 1.3; }
  .qcard .qd { margin-top: 2px; font-size: 8.5px; color: #6b7284; line-height: 1.35; }
  .qcard.fmt { border-color: rgba(111,177,255,0.5); }
  .qcard.fmt .qn { color: #6fb1ff; }
  .qcard.fmt::after {
    content: "format name"; position: absolute; top: 4px; right: 6px;
    font: 600 7.5px ui-monospace, monospace; color: rgba(111,177,255,0.75);
  }
  .qcard.kv { border-color: rgba(144,133,233,0.5); }
  .qcard.kv .qn { color: #9085e9; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Quantization: Decoding the Notation</div>
  <div class="slide-sub">the four buckets return — which bills do the two dials pay?</div>

  <div id="machine">
    <div id="pkg"><span class="pkglab">GPU PACKAGE</span></div>
    <div id="hbm">
      <div id="wblock"></div>
      <div id="wblab">weights</div>
      <div id="freed"><span></span></div>
      <div class="hlab">HBM</div>
    </div>
    <div class="pipe"><i></i><i></i><i></i><i></i><i></i></div>
    <div id="die"><div class="dlab">Processor</div></div>
  </div>

  <div class="dial" id="wchip">W · weights<b id="wbits">16-bit</b></div>
  <div class="dial" id="achip">A · activations<b id="abits">16-bit</b></div>
  <div class="dial" id="kvchip">KV · INT8/FP8 KV</div>
  <div id="dietag"></div>

  <div class="zflash" id="fl-cap"></div>
  <div class="zflash" id="fl-bw"></div>
  <div class="zflash" id="fl-compute"></div>

  <div id="hero">
    <div class="hrow"><span class="hbig"></span><span class="hrest"></span></div>
    <div id="etiq"></div>
  </div>
  <div class="panel" id="wpanel">
    <div class="ph">pay with W · 16 → 8 → 4</div>
    <div class="pw"></div><div class="pb"></div>
  </div>
  <div class="panel" id="apanel">
    <div class="ph">pay with A · → 8</div>
    <div class="pw"></div><div class="pb"></div><div class="pk"></div>
  </div>
  <div id="caveat"></div>
  <div id="b200"><div id="b200lab"></div></div>

  <div id="tax">
    <div class="tcard locked" id="unlock">
      <div class="abbr">FP8 / INT4</div>
      <div class="full">Quantization</div>
      <span class="lock">🔒</span>
    </div>
  </div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/quant.js"></script>
<script src="shared/gpus.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  // ---- static content from shared data ----
  var parts = QT.headline.split(" — ");
  document.querySelector("#hero .hbig").innerHTML =
    '<span class="w">W</span><span class="b">x</span><span class="a">A</span><span class="b">y</span>';
  document.querySelector("#hero .hrest").textContent = "— " + parts[1];
  document.getElementById("etiq").textContent = QT.etiquette;
  document.querySelector("#wpanel .pw").textContent = QT.wDial.what;
  document.querySelector("#wpanel .pb").textContent = QT.wDial.buys;
  document.querySelector("#apanel .pw").textContent = QT.aDial.what;
  document.querySelector("#apanel .pb").textContent = QT.aDial.buys;
  document.querySelector("#apanel .pk").textContent = QT.kvDial.what + " — " + QT.kvDial.buys;
  document.getElementById("caveat").textContent = "⚠ " + QT.caveat;
  document.getElementById("b200lab").textContent = QT.b200;
  document.querySelector("#freed span").textContent = "footprint ÷4 — freed";

  // weights block: 30 cells, 16-bit wide at rest
  var wblock = document.getElementById("wblock");
  for (var i = 0; i < 32; i++) {
    var c = document.createElement("i");
    c.className = "wcell";
    wblock.appendChild(c);
  }
  // die tiles (slide-02 look)
  var die = document.getElementById("die");
  var tiles = document.createElement("div");
  tiles.className = "tiles";
  for (i = 0; i < 30; i++) tiles.appendChild(document.createElement("i"));
  die.appendChild(tiles);

  // B200 precision ceilings (GPUS.precision)
  var BCOLORS = ["#6b7284", "#3987e5", "#2fd6b0"];
  var b200 = document.getElementById("b200");
  GPUS.precision.forEach(function (p, i) {
    var w = Math.round(p[1] / 9000 * 430);
    b200.insertAdjacentHTML("beforeend",
      '<div class="brow"><span class="bname" style="color:' + BCOLORS[i] + '">' + p[0] + "</span>" +
      '<div class="bfill" style="width:' + w + "px;background:linear-gradient(90deg," + BCOLORS[i] + "55," + BCOLORS[i] + ')"></div>' +
      '<span class="bval">' + p[1].toLocaleString() + (i === 2 ? " TFLOPS dense" : "") + "</span></div>");
  });

  // taxonomy cards (QT.rows) — slide-02 toolkit-card style
  var BUYC = ["#2fd6b0", "#3987e5", "#3987e5", "#2fd6b0", "#2fd6b0", "#e0a935"];
  var tax = document.getElementById("tax");
  QT.rows.forEach(function (r, i) {
    var cls = "qcard";
    if (r[0].charAt(0) === "“") cls += " fmt";
    if (i === QT.rows.length - 1) cls += " kv";
    tax.insertAdjacentHTML("beforeend",
      '<div class="' + cls + '"><div class="qn">' + r[0] + "</div>" +
      '<div class="qm">' + r[1] + "</div>" +
      '<div class="qb" style="color:' + BUYC[i] + '">' + r[2] + "</div>" +
      '<div class="qd">' + r[3] + "</div></div>");
  });

  // ---- DOM mutators (via .call, restored in reset) ----
  var FP16TAG = "FP16 matmul — no speedup";
  var LPTAG = "low-precision tensor cores";
  var dietag = document.getElementById("dietag");
  function setBits(id, txt) { document.getElementById(id).textContent = txt; }
  function dieHold() { die.classList.add("hold"); dietag.textContent = FP16TAG; }
  function dieLP() {
    die.classList.remove("hold"); die.classList.add("lp");
    dietag.textContent = LPTAG; dietag.classList.add("lp");
  }
  function pipesThin(on) {
    document.querySelectorAll(".pipe").forEach(function (p) { p.classList.toggle("thin", on); });
  }
  var unlock = document.getElementById("unlock");
  function openLock() {
    unlock.classList.remove("locked"); unlock.classList.add("open");
    unlock.querySelector(".lock").textContent = "🔓";
  }

  // ---- timeline: 4 beats ----
  var tl = gsap.timeline({ paused: true });

  // beat 1: the machine wakes + the notation is the hero + the two control chips
  tl.to("#machine", { opacity: 1, filter: "grayscale(0)", duration: 0.6, ease: "power2.out" })
    .fromTo("#wchip", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.2)" }, "-=0.25")
    .fromTo("#achip", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.2)" }, "<0.12")
    .fromTo("#hero .hrow", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, "-=0.2")
    .fromTo("#etiq", { opacity: 0 }, { opacity: 1, duration: 0.4 }, "-=0.1");
  DECK.markStep(tl);

  // beat 2: pay with W — weights re-tile 16 → 8 → 4, pipe thins, die stays FP16
  tl.fromTo("#wpanel .ph", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35 })
    .call(function () { setBits("wbits", "8-bit"); })
    .fromTo("#wchip", { scale: 1.28 }, { scale: 1, duration: 0.3, ease: "power2.out" })
    .fromTo(".wcell", { width: 28 }, { width: 14, duration: 0.55, ease: "power2.inOut" }, "<")
    .call(function () { setBits("wbits", "4-bit"); })
    .fromTo("#wchip", { scale: 1.28 }, { scale: 1, duration: 0.3, ease: "power2.out" })
    .fromTo(".wcell", { width: 14 }, { width: 7, duration: 0.55, ease: "power2.inOut", immediateRender: false }, "<")
    .call(function () { pipesThin(true); })
    .fromTo("#fl-bw", { opacity: 0 }, { opacity: 1, duration: 0.09, yoyo: true, repeat: 3 })
    .fromTo("#fl-cap", { opacity: 0 }, { opacity: 1, duration: 0.09, yoyo: true, repeat: 3 }, "<")
    .fromTo("#freed", { opacity: 0 }, { opacity: 1, duration: 0.45 })
    .call(function () { dieHold(); })
    .fromTo("#dietag", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .fromTo("#wpanel .pw", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35 }, "-=0.1")
    .fromTo("#wpanel .pb", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35 }, "-=0.15");
  DECK.markStep(tl);

  // beat 3: pay with A — die lights up low-precision, taxonomy unlocks + builds
  tl.fromTo("#apanel .ph", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35 })
    .call(function () { setBits("abits", "8-bit"); })
    .fromTo("#achip", { scale: 1.28 }, { scale: 1, duration: 0.3, ease: "power2.out" })
    .call(function () { dieLP(); })
    .fromTo("#fl-compute", { opacity: 0 }, { opacity: 1, duration: 0.09, yoyo: true, repeat: 3 })
    .fromTo("#apanel .pw", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35 })
    .fromTo("#apanel .pb", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35 }, "-=0.15")
    .fromTo("#kvchip", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.2)" })
    .fromTo("#fl-cap", { opacity: 0 }, { opacity: 1, duration: 0.09, yoyo: true, repeat: 3 }, "<")
    .fromTo("#apanel .pk", { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.35 })
    .fromTo("#unlock", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" })
    .to({}, { duration: 0.25 })
    .call(function () { openLock(); })
    .fromTo("#unlock", { scale: 1.14 }, { scale: 1, duration: 0.35, ease: "back.out(3)" })
    .fromTo(".qcard", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.35, stagger: 0.06, ease: "power2.out" });
  DECK.markStep(tl);

  // beat 4: the regime caveat + the B200 ceilings saved for this moment
  tl.fromTo("#caveat", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.45 })
    .fromTo("#b200lab", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .fromTo(".brow", { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.35, stagger: 0.12 })
    .fromTo(".bfill", { scaleX: 0 }, { scaleX: 1, duration: 0.5, stagger: 0.12, ease: "power2.out" }, "<0.1");

  DECK.register(tl, {
    reset: function () {
      setBits("wbits", "16-bit"); setBits("abits", "16-bit");
      die.classList.remove("hold", "lp");
      dietag.classList.remove("lp"); dietag.textContent = "";
      pipesThin(false);
      unlock.classList.add("locked"); unlock.classList.remove("open");
      unlock.querySelector(".lock").textContent = "🔒";
    }
  });
</script>
</body>
</html>
