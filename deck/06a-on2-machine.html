<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Self-Attention Recap: The O(n²) Problem</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  #formula { position: absolute; right: 44px; top: 34px; font: 600 15px ui-monospace, monospace; color: #9aa1b5; }
  #nsel { position: absolute; left: 44px; top: 122px; display: flex; gap: 8px; align-items: center; opacity: 0; }
  #nsel .nl { font: 12px ui-monospace, monospace; color: var(--ink-2); margin-right: 4px; }
  .nchip { font: 700 13px ui-monospace, monospace; color: #6b7284; border: 1.5px solid var(--line); border-radius: 999px; padding: 4px 14px; }
  .nchip.on { color: #0c1116; background: var(--accent); border-color: var(--accent); }
  #die { position: absolute; left: 90px; top: 240px; width: 150px; height: 220px; border: 2.5px solid #3987e5; border-radius: 10px; background: repeating-linear-gradient(0deg, rgba(57,135,229,0.1) 0 7px, transparent 7px 14px), repeating-linear-gradient(90deg, rgba(57,135,229,0.1) 0 7px, transparent 7px 14px); opacity: 0; }
  #die .lab { position: absolute; bottom: 6px; width: 100%; text-align: center; font-size: 11px; color: #9ec7f5; font-weight: 600; }
  #hbm { position: absolute; left: 380px; top: 170px; width: 390px; height: 400px; border: 2px solid rgba(201,133,0,0.7); border-radius: 12px; opacity: 0; }
  #hbm .lab { position: absolute; bottom: -24px; width: 100%; text-align: center; font-size: 12px; color: #e0a935; font-weight: 700; }
  .qkv { position: absolute; top: 12px; width: 60px; height: 32px; border: 1.5px solid #4a5066; border-radius: 6px; display: flex; align-items: center; justify-content: center; font: 700 12px ui-monospace, monospace; color: #c7cce0; }
  #sblock { position: absolute; left: 50%; top: 226px; transform: translate(-50%, -50%); background: rgba(224,75,56,0.18); border: 2px solid #e04b38; border-radius: 6px; display: flex; align-items: center; justify-content: center; font: 700 13px ui-monospace, monospace; color: #ff8a7a; opacity: 0; z-index: 5; }
  #gauge { position: absolute; left: 800px; top: 170px; width: 26px; height: 400px; border: 1.5px solid var(--line); border-radius: 6px; overflow: hidden; opacity: 0; }
  #gfill { position: absolute; left: 0; right: 0; bottom: 0; height: 0; background: linear-gradient(0deg, #e04b38, #e0a935); }
  #glab { position: absolute; left: 838px; top: 170px; font: 11px ui-monospace, monospace; color: var(--ink-2); opacity: 0; }
  #passes { position: absolute; inset: 0; pointer-events: none; }
  #passes path { fill: none; stroke: #e04b38; stroke-width: 2.5; opacity: 0; }
  .passlab { position: absolute; font: 600 11.5px ui-monospace, monospace; color: #ff8a7a; opacity: 0; }
  #counters { position: absolute; left: 940px; top: 240px; width: 296px; font: 600 13px ui-monospace, monospace; color: #9aa1b5; line-height: 2.1; opacity: 0; }
  #counters b { color: #e8eaf0; font-size: 16px; }
  #onehead { position: absolute; left: 940px; top: 356px; font: 700 13px ui-monospace, monospace; color: #e04b38; opacity: 0; }
  #punch { position: absolute; left: 44px; bottom: 30px; font-size: 17px; font-weight: 700; color: var(--accent); opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Self-Attention Recap: The O(n²) Problem</div>
  <div class="slide-sub">run the machine from last slide at scale</div>
  <div id="formula">Attention = softmax(QKᵀ/√d)·V</div>

  <div id="nsel"><span class="nl">context n =</span></div>
  <div id="die"><div class="lab">Processor</div></div>
  <svg id="passes" width="1280" height="720"></svg>
  <div id="hbm">
    <div class="qkv" style="left:40px">Q</div>
    <div class="qkv" style="left:150px">K</div>
    <div class="qkv" style="left:260px">V</div>
    <div id="sblock">S</div>
    <div class="lab">HBM · 80 GB</div>
  </div>
  <div id="gauge"><div id="gfill"></div></div>
  <div id="glab">S vs<br>80 GB</div>
  <div class="passlab" id="pl1">① write S = QKᵀ</div>
  <div class="passlab" id="pl2">② read S — softmax</div>
  <div class="passlab" id="pl3">③ read again — ·V</div>
  <div id="counters">score matrix&nbsp; <b id="cn">—</b><br>entries&nbsp; <b id="ce">—</b><br>size (BF16)&nbsp; <b id="cg">—</b></div>
  <div id="onehead">— for ONE head</div>
  <div id="punch"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnscale.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("punch").textContent = AS.sin;
  var nsel = document.getElementById("nsel");
  AS.presets.forEach(function (p, i) {
    nsel.insertAdjacentHTML("beforeend", '<span class="nchip" id="nc' + i + '">' + p.lab + "</span>");
  });

  var NS = "http://www.w3.org/2000/svg";
  var passes = document.getElementById("passes");
  function ppath(d) {
    var p = document.createElementNS(NS, "path");
    p.setAttribute("d", d);
    passes.appendChild(p);
    return p;
  }
  var p1 = ppath("M 245 300 C 300 300, 320 320, 375 340");
  var p2 = ppath("M 375 380 C 320 380, 300 360, 245 340");
  var p3 = ppath("M 375 420 C 310 420, 290 390, 245 370");

  var sizes = [16, 46, 168, 430];   // ~ sqrt scale, 1M deliberately overflows
  function setN(i) {
    var p = AS.presets[i];
    for (var k = 0; k < 4; k++) document.getElementById("nc" + k).classList.toggle("on", k === i);
    document.getElementById("cn").textContent = p.lab + " × " + p.lab;
    document.getElementById("ce").textContent = AS.fmtN(AS.entries(p.n));
    document.getElementById("cg").textContent = AS.fmtGB(AS.sGB(p.n));
    gsap.to("#sblock", { width: sizes[i], height: sizes[i], fontSize: 10 + i * 2, duration: 0.8, ease: "power2.inOut" });
    gsap.to("#gfill", { height: Math.min(1, AS.sGB(p.n) / AS.hbmGB) * 396, duration: 0.8, ease: "power2.inOut" });
  }

  var tl = gsap.timeline({ paused: true });

  // step 1: the machine + the op, at n = 1k
  tl.fromTo("#die, #hbm, #gauge, #glab, #nsel, #counters", { opacity: 0 }, { opacity: 1, duration: 0.5, stagger: 0.06 })
    .fromTo("#sblock", { opacity: 0, scale: 0.4 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.8)" })
    .call(function () { setN(0); });
  DECK.markStep(tl);

  // step 2: the naive dataflow — three full passes over HBM
  [[p1, "#pl1", 260, 300], [p2, "#pl2", 260, 384], [p3, "#pl3", 260, 428]].forEach(function (row) {
    tl.call(function () {
      var l = document.getElementById(row[1].slice(1));
      l.style.left = row[2] + "px"; l.style.top = (row[3] - 22) + "px";
    })
      .to(row[0], { opacity: 1, duration: 0.35 })
      .to(row[1], { opacity: 1, duration: 0.3 }, "-=0.15")
      .fromTo(row[0], { strokeDashoffset: 0 }, { strokeDasharray: "8 7", strokeDashoffset: -60, duration: 0.8, ease: "none" });
  });
  DECK.markStep(tl);

  // steps 3-5: scale n
  tl.call(function () { setN(1); }).to({}, { duration: 0.9 });
  DECK.markStep(tl);
  tl.call(function () { setN(2); }).to({}, { duration: 0.9 })
    .fromTo("#onehead", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" })
    .to("#hbm", { borderColor: "#e04b38", boxShadow: "0 0 26px rgba(224,75,56,0.5)", duration: 0.5 });
  DECK.markStep(tl);
  tl.call(function () { setN(3); }).to({}, { duration: 0.9 })
    .fromTo("#punch", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 });

  DECK.register(tl, {});
</script>
</body>
</html>
