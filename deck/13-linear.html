<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Linear Attention &amp; SSMs: Replace the Cache with a State</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #map { left: 690px; top: 96px; }
  .pan { position: absolute; top: 150px; width: 560px; height: 370px; background: var(--panel);
         border: 1px solid var(--line); border-radius: 12px; opacity: 0; }
  #pf { left: 44px; } #pl { left: 676px; }
  .ph { font: 800 13px ui-monospace, monospace; padding: 13px 16px 3px; }
  .ps { font: 600 11.5px ui-monospace, monospace; color: #6b7284; padding: 0 16px; }
  .toks { position: absolute; left: 40px; top: 66px; display: flex; gap: 6px; }
  .toks i { width: 10px; height: 10px; border-radius: 3px; background: #232836; }
  .toks i.on { background: #3987e5; box-shadow: 0 0 8px rgba(57,135,229,0.8); }
  .gstrip { position: absolute; top: 100px; width: 30px; height: 12px; border-radius: 4px;
            background: linear-gradient(180deg, rgba(144,133,233,0.5), #9085e9); }
  .gstrip .sl { position: absolute; top: -20px; width: 100%; text-align: center; font: 800 11px ui-monospace, monospace; color: #9085e9; }
  #cnt { position: absolute; left: 0; bottom: 14px; width: 100%; text-align: center;
         font: 700 12.5px ui-monospace, monospace; color: #ff8a7a; }
  #state { position: absolute; left: 196px; top: 118px; width: 168px; height: 168px; border: 2px solid var(--accent);
           border-radius: 10px; padding: 5px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
  #state i { border-radius: 2px; background: #173b33; }
  #slab { position: absolute; left: 0; bottom: 14px; width: 100%; text-align: center;
          font: 700 12.5px ui-monospace, monospace; color: var(--accent); }
  #ssm { position: absolute; left: 676px; top: 536px; max-width: 560px; opacity: 0; }
  #dl { position: absolute; left: 44px; top: 542px; width: 560px; font: 600 12.5px ui-monospace, monospace; color: #e04b38; opacity: 0; }
  #catch { position: absolute; left: 44px; bottom: 28px; font-size: 17px; font-weight: 800; color: #e0a935; opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Linear Attention &amp; SSMs: Replace the Cache with a State</div>
  <div class="slide-sub">same token stream, two memories — one grows, one is a d×d square</div>

  <div id="map"></div>
  <div class="pan" id="pf">
    <div class="ph" style="color:#ff8a7a">FULL ATTENTION — the cache grows every token</div>
    <div class="ps">decode reads the whole purple list, every step</div>
    <div class="toks" id="tf"></div>
    <div class="gstrip" id="sk" style="left:238px"><span class="sl">K</span></div>
    <div class="gstrip" id="sv" style="left:288px"><span class="sl">V</span></div>
    <div id="cnt">cache slots: 1</div>
  </div>
  <div class="pan" id="pl">
    <div class="ph" style="color:var(--accent)">LINEAR — a fixed d×d state</div>
    <div class="ps" id="rec"></div>
    <div class="toks" id="tt"></div>
    <div id="state"></div>
    <div id="slab"></div>
  </div>
  <div id="ssm" class="op-chip"></div>
  <div id="dl"></div>
  <div id="catch"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("map"), 4);
  document.getElementById("rec").textContent = EV.linear.recur;
  document.getElementById("slab").textContent = EV.linear.state;
  document.getElementById("ssm").textContent = EV.linear.ssm;
  document.getElementById("dl").textContent = EV.linear.delta;
  document.getElementById("catch").textContent = EV.linear.catch;

  // 16 stream tokens per panel
  var tf = document.getElementById("tf"), tt = document.getElementById("tt");
  for (var i = 0; i < 16; i++) {
    tf.appendChild(document.createElement("i"));
    tt.appendChild(document.createElement("i"));
  }
  var state = document.getElementById("state");
  var cells = [];
  for (var c = 0; c < 36; c++) {
    var el = document.createElement("i");
    state.appendChild(el);
    cells.push(el);
  }

  // ambient decode loop: left cache grows, right state stays fixed (cells rewritten)
  var t = 0;
  var amb = gsap.timeline({ repeat: -1, paused: true });
  amb.call(function () {
    var step = t % 16;
    if (step === 0) {
      gsap.set("#sk, #sv", { height: 12 });
      [].forEach.call(tf.children, function (d) { d.classList.remove("on"); });
      [].forEach.call(tt.children, function (d) { d.classList.remove("on"); });
    }
    tf.children[step].classList.add("on");
    tt.children[step].classList.add("on");
    gsap.to("#sk, #sv", { height: 12 * (step + 1), duration: 0.3 });
    document.getElementById("cnt").textContent = "cache slots: " + (step + 1);
    var cell = cells[(step * 7 + 11) % 36];
    gsap.fromTo(cell, { backgroundColor: "#2fd6b0" }, { backgroundColor: "#173b33", duration: 0.5 });
    t++;
  }).to({}, { duration: 0.45 });

  var tl = gsap.timeline({ paused: true });

  // step 1: two decode loops, side by side
  tl.fromTo("#pf", { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" })
    .fromTo("#pl", { opacity: 0, x: 18 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, "<0.15")
    .call(function () { t = 0; amb.play(0); })
    .to({}, { duration: 2.2 });
  DECK.markStep(tl);

  // step 2: the SSM branch of the same family
  tl.fromTo("#ssm", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 });
  DECK.markStep(tl);

  // step 3: the delta rule — a cell is corrected, not appended
  var dc = cells[15];
  tl.fromTo("#dl", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .to(dc, { outline: "2px solid #e04b38", scale: 1.35, backgroundColor: "#e04b38", duration: 0.35 })
    .to({}, { duration: 0.4 })
    .to(dc, { backgroundColor: "#2fd6b0", outlineColor: "#2fd6b0", duration: 0.4 })
    .to(dc, { scale: 1, outline: "0px solid rgba(0,0,0,0)", duration: 0.35 })
    .to("#state", { opacity: 0.55, duration: 0.3, yoyo: true, repeat: 1 });   // the forget gate breathes
  DECK.markStep(tl);

  // step 4: the catch — why hybrids exist
  tl.fromTo("#catch", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 });

  DECK.register(tl, {
    reset: function () {
      amb.pause(0); t = 0;
      gsap.set("#sk, #sv", { height: 12 });
      [].forEach.call(tf.children, function (d) { d.classList.remove("on"); });
      [].forEach.call(tt.children, function (d) { d.classList.remove("on"); });
      document.getElementById("cnt").textContent = "cache slots: 1";
      gsap.set(cells, { clearProps: "backgroundColor,outline,scale" });
    }
  });
</script>
</body>
</html>
