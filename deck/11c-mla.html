<!DOCTYPE html><html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLA: Compress KV into a Latent</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #map { left: 660px; top: 96px; }
  #funnel { position: absolute; left: 90px; top: 150px; opacity: 0; }
  #latline { position: absolute; left: 120px; top: 428px; font: 700 13px ui-monospace, monospace; color: var(--c-o); opacity: 0; }
  .kvfly { position: absolute; display: flex; gap: 4px; z-index: 5; }
  .kvfly i { width: 22px; height: 110px; border-radius: 5px; background: linear-gradient(180deg, rgba(144,133,233,0.5), #9085e9); display: flex; align-items: flex-start; justify-content: center; font: 800 10px ui-monospace, monospace; color: #0c1116; padding-top: 4px; font-style: normal; }
  .caps { position: absolute; width: 38px; height: 22px; border-radius: 7px; background: #b9b0ff; box-shadow: 0 0 14px rgba(144,133,233,0.8); display: flex; align-items: center; justify-content: center; font: 800 10.5px ui-monospace, monospace; color: #0c1116; z-index: 6; }
  #cmp { position: absolute; left: 700px; top: 172px; width: 480px; opacity: 0; }
  .crow { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .crow .cl { width: 42px; font: 700 13px ui-monospace, monospace; color: var(--ink-2); text-align: right; }
  .crow .cbr { height: 20px; border-radius: 5px; background: linear-gradient(180deg, rgba(144,133,233,0.6), #9085e9); transform-origin: left center; }
  .crow .cv { font: 800 13px ui-monospace, monospace; color: #e8eaf0; white-space: nowrap; }
  #bytesline { position: absolute; left: 700px; top: 252px; width: 490px; font: 600 12.5px ui-monospace, monospace; color: var(--ink-2); opacity: 0; }
  #absorb { position: absolute; left: 700px; top: 316px; width: 490px; height: 96px; opacity: 0; }
  .wchip { position: absolute; font: 700 13px ui-monospace, monospace; padding: 7px 12px; border-radius: 8px; border: 1.5px solid var(--line); background: var(--panel); color: #c7cce0; }
  .wchip.mv { border-color: rgba(144,133,233,0.6); color: #b9b0ff; z-index: 3; }
  .warr { position: absolute; font: 700 14px ui-monospace, monospace; color: #4a5066; }
  #abline { position: absolute; left: 700px; top: 420px; width: 490px; font: 700 13px ui-monospace, monospace; color: var(--accent); opacity: 0; }
  #adopt { position: absolute; left: 44px; bottom: 40px; font: 600 13.5px ui-monospace, monospace; color: var(--ink-2); opacity: 0; }
  #framing { position: absolute; left: 44px; bottom: 14px; font-size: 15.5px; font-weight: 700; color: var(--accent); opacity: 0; }

  /* —— recurring cache bar —— */
  #cbar { position: absolute; left: 90px; top: 552px; width: 1100px; }
  #cbar .cb-lab { font: 700 10.5px ui-monospace, monospace; letter-spacing: 0.14em; color: #e0a935; opacity: 0.75; margin-bottom: 5px; }
  #cbar .cb-box { position: relative; height: 62px; border: 2px solid rgba(201,133,0,0.55); border-radius: 10px; background: rgba(18,20,26,0.6); display: flex; overflow: hidden; }
  #cbar .cb-w { flex: none; width: 300px; display: flex; align-items: center; justify-content: center; font: 700 12px ui-monospace, monospace; color: #e0a935; background: repeating-linear-gradient(90deg, rgba(201,133,0,0.26) 0 7px, rgba(201,133,0,0.12) 7px 14px); border-right: 1.5px solid rgba(201,133,0,0.35); }
  #cbar .cb-kv { flex: none; width: 0; display: flex; align-items: center; justify-content: center; font: 800 11.5px ui-monospace, monospace; color: #0c1116; white-space: nowrap; overflow: hidden; background: linear-gradient(180deg, rgba(144,133,233,0.62), #9085e9); }
  #cbar .cb-b { flex: 1; position: relative; }
  #cbar .cb-slots { position: absolute; inset: 0; display: flex; }
  #cbar .cb-slot { flex: 1; border-left: 1.5px dashed rgba(74,80,102,0.55); }
  #cbar .cb-blab { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font: 700 11px ui-monospace, monospace; color: #9aa1b5; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">MLA: Compress KV into a Latent</div>
  <div class="slide-sub">don't share the heads — shrink what each token stores</div>
  <div id="map"></div>

  <svg id="funnel" width="560" height="270">
    <path d="M 140 15 L 380 110 L 380 150 L 140 245 Z" fill="rgba(144,133,233,0.08)" stroke="rgba(144,133,233,0.55)" stroke-width="1.5"/>
    <text x="196" y="135" fill="#9aa1b5" font-family="ui-monospace, monospace" font-size="11" font-weight="700">down-proj W↓</text>
    <text x="20" y="135" fill="#6b7284" font-family="ui-monospace, monospace" font-size="10.5">K,V per token</text>
  </svg>
  <div id="latline"></div>
  <div id="cmp">
    <div class="crow"><div class="cl">GQA</div><div class="cbr" id="bGqa" style="width:297px"></div><div class="cv">330 KB</div></div>
    <div class="crow"><div class="cl">MLA</div><div class="cbr" id="bMla" style="width:63px; background:#b9b0ff; box-shadow:0 0 12px rgba(144,133,233,0.6)"></div><div class="cv">~70 KB <span class="ev-warn">⚠</span></div></div>
  </div>
  <div id="bytesline"></div>
  <div id="absorb">
    <div class="wchip mv" id="wuk" style="left:0; top:0">W↑K</div>
    <div class="wchip mv" id="wuv" style="left:0; top:52px">W↑V</div>
    <div class="warr" style="left:120px; top:8px">absorbed ⟶</div>
    <div class="warr" style="left:120px; top:60px">absorbed ⟶</div>
    <div class="wchip" id="wq" style="left:280px; top:0">W_Q</div>
    <div class="wchip" id="wo" style="left:280px; top:52px">W_O</div>
  </div>
  <div id="abline"></div>
  <div id="cbar"></div>
  <div id="adopt"></div>
  <div id="framing"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("map"), 2);
  document.getElementById("latline").textContent = EV.mla.latent;
  document.getElementById("bytesline").textContent = EV.mla.bytes + " ⚠";
  document.getElementById("abline").textContent = EV.mla.absorb;
  document.getElementById("adopt").textContent = EV.mla.adopters;
  document.getElementById("framing").textContent = EV.mla.framing;

  // ---- cache bar (recurring) ----
  var cb = (function () {
    var host = document.getElementById("cbar");
    host.innerHTML = '<div class="cb-lab">HBM · FIXED CAPACITY</div>' +
      '<div class="cb-box"><div class="cb-w">weights</div>' +
      '<div class="cb-kv"><span class="cb-kvt"></span></div>' +
      '<div class="cb-b"><div class="cb-slots"></div><div class="cb-blab"></div></div></div>';
    var api = {
      kv: host.querySelector(".cb-kv"), kvt: host.querySelector(".cb-kvt"),
      blab: host.querySelector(".cb-blab"), slotBox: host.querySelector(".cb-slots"),
      slots: function (n) {
        api.slotBox.innerHTML = "";
        for (var i = 0; i < n; i++) { var d = document.createElement("div"); d.className = "cb-slot"; api.slotBox.appendChild(d); }
      }
    };
    return api;
  })();
  function barInit() {   // inherits the GQA-era picture
    gsap.set(cb.kv, { width: 390 });
    cb.kvt.textContent = "KV · 330 KB / token";
    cb.blab.textContent = "batch ×1";
    cb.slots(0);
  }
  barInit();

  // ---- ambient: K,V columns squeeze through the funnel into capsules ----
  var stage = document.querySelector(".stage");
  var flyers = [];
  function spawn() {
    var col = document.createElement("div");
    col.className = "kvfly";
    col.style.left = "104px"; col.style.top = "205px";
    col.innerHTML = "<i>K</i><i>V</i>";
    stage.appendChild(col); flyers.push(col);
    var cap = document.createElement("div");
    cap.className = "caps";
    cap.style.left = "474px"; cap.style.top = "262px";
    cap.textContent = "c_t";
    gsap.set(cap, { opacity: 0 });
    stage.appendChild(cap); flyers.push(cap);
    var t = gsap.timeline({ onComplete: function () { col.remove(); cap.remove(); } });
    t.fromTo(col, { opacity: 0, x: 0 }, { opacity: 1, x: 96, duration: 0.55, ease: "power1.in" })
      .to(col, { x: 330, scale: 0.16, opacity: 0, duration: 0.55, ease: "power2.in" })
      .fromTo(cap, { opacity: 0, scale: 0.4 }, { opacity: 1, scale: 1, duration: 0.25, ease: "back.out(2.2)" }, "-=0.1")
      .to(cap, { x: 60, duration: 0.3, ease: "power1.out" })
      .add(function () {
        var tx = 392 + cb.kv.offsetWidth / 2 - 19 - 474;   // centre of the purple region
        gsap.to(cap, { x: tx, duration: 0.55, ease: "none" });
        gsap.to(cap, { y: 318, scale: 0.7, duration: 0.55, ease: "power2.in", onComplete: function () {
          gsap.fromTo(cb.kv, { filter: "brightness(1.7)" }, { filter: "brightness(1)", duration: 0.4 });
        } });
      })
      .to({}, { duration: 0.6 });
  }
  var loop = gsap.timeline({ repeat: -1, paused: true });
  loop.call(spawn).to({}, { duration: 2.1 });

  var tl = gsap.timeline({ paused: true });

  // step 1: the bottleneck — per-token K,V squeezed into a small latent c_t
  tl.fromTo("#funnel", { opacity: 0, x: -16 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" })
    .call(function () { loop.play(0); })
    .fromTo("#latline", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .to({}, { duration: 2.2 });
  DECK.markStep(tl);

  // step 2: the number — ~70 KB vs 330 KB, and the purple region drops again
  tl.fromTo("#cmp", { opacity: 0 }, { opacity: 1, duration: 0.3 })
    .fromTo("#bGqa", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power2.out" })
    .fromTo("#bMla", { scaleX: 0 }, { scaleX: 1, duration: 0.4, ease: "power2.out" })
    .fromTo("#bytesline", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .call(function () { cb.kvt.textContent = "~70 KB"; cb.blab.textContent = "batch ×~5"; cb.slots(5); })
    .to(cb.kv, { width: 84, duration: 0.8, ease: "power2.inOut" });
  DECK.markStep(tl);

  // step 3: the absorption trick — up-projections vanish into W_Q / W_O
  tl.fromTo("#absorb", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.45 })
    .to({}, { duration: 0.4 })
    .to("#wuk", { x: 280, opacity: 0, duration: 0.6, ease: "power2.in" })
    .to("#wq", { borderColor: "rgba(47,214,176,0.8)", color: "#2fd6b0", boxShadow: "0 0 14px rgba(47,214,176,0.4)", duration: 0.3 }, "-=0.1")
    .to("#wuv", { x: 280, opacity: 0, duration: 0.6, ease: "power2.in" }, "-=0.3")
    .to("#wo", { borderColor: "rgba(47,214,176,0.8)", color: "#2fd6b0", boxShadow: "0 0 14px rgba(47,214,176,0.4)", duration: 0.3 }, "-=0.1")
    .fromTo("#abline", { opacity: 0 }, { opacity: 1, duration: 0.45 });
  DECK.markStep(tl);

  // step 4: who runs it — and why it is not a detour
  tl.fromTo("#adopt", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#framing", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 });

  DECK.register(tl, {
    reset: function () {
      loop.pause(0);
      flyers.forEach(function (f) { gsap.killTweensOf(f); f.remove(); });
      flyers = [];
      gsap.set("#funnel, #latline, #cmp, #bytesline, #absorb, #abline, #adopt, #framing", { opacity: 0 });
      gsap.set("#wuk, #wuv", { x: 0, opacity: 1 });
      gsap.set("#wq, #wo", { borderColor: "", color: "", boxShadow: "", clearProps: "borderColor,color,boxShadow" });
      gsap.set(cb.kv, { filter: "none" });
      barInit();
    }
  });
</script>
</body>
</html>
