<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kimi Delta Attention: The Frontier of the Linear Line</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #map { left: 690px; top: 96px; }
  #sq { position: absolute; left: 110px; top: 176px; width: 240px; height: 240px; border: 2px solid var(--accent);
        border-radius: 10px; padding: 7px; opacity: 0; }
  .srow { height: 24px; margin-bottom: 4px; border-radius: 4px;
          background: linear-gradient(90deg, rgba(47,214,176,0.12), rgba(47,214,176,0.75)); }
  #sqlab { position: absolute; left: 110px; top: 424px; width: 240px; text-align: center;
           font: 700 12px ui-monospace, monospace; color: var(--accent); opacity: 0; }
  #knob1 { position: absolute; left: 396px; top: 176px; width: 70px; height: 240px; opacity: 0; }
  #knob1 .trk { position: absolute; left: 12px; top: 10px; bottom: 10px; width: 5px; border-radius: 3px; background: #2a2e3b; }
  #kh { position: absolute; left: 7px; top: 110px; width: 15px; height: 15px; border-radius: 50%;
        background: #e0a935; box-shadow: 0 0 10px rgba(224,169,53,0.8); }
  #knob1 .kl { position: absolute; left: 32px; top: 108px; font: 700 11px ui-monospace, monospace; color: #e0a935; white-space: nowrap; }
  #ks { position: absolute; left: 380px; top: 183px; width: 160px; height: 240px; opacity: 0; }
  .ms { position: absolute; left: 0; width: 140px; height: 4px; border-radius: 2px; background: #2a2e3b; }
  .mh { position: absolute; top: -5px; left: 0; width: 13px; height: 13px; border-radius: 50%;
        background: #e04b38; box-shadow: 0 0 8px rgba(224,75,56,0.8); }
  .capline { position: absolute; left: 110px; top: 470px; width: 520px; font: 600 13.5px ui-monospace, monospace; opacity: 0; }
  #c1 { color: #c7cce0; }
  #c2 { color: #ff8a7a; }
  #conn { position: absolute; inset: 0; pointer-events: none; }
  #conn path { fill: none; stroke: var(--accent); stroke-width: 2; stroke-dasharray: 7 6; }
  #stack { position: absolute; left: 800px; top: 158px; width: 250px; }
  .lay { display: flex; align-items: center; gap: 10px; height: 36px; margin-bottom: 6px;
         border: 1.5px solid; border-radius: 8px; padding: 0 12px; opacity: 0;
         font: 700 12px ui-monospace, monospace; }
  .lay.kda { border-color: rgba(47,214,176,0.6); color: var(--accent); background: rgba(47,214,176,0.06); }
  .lay.mla { border-color: rgba(111,177,255,0.6); color: #6fb1ff; background: rgba(57,135,229,0.07); }
  .lay .ic { width: 18px; height: 18px; flex: none; }
  .lay.kda .ic { border: 1.5px solid var(--accent); border-radius: 4px;
                 background: repeating-linear-gradient(0deg, rgba(47,214,176,0.55) 0 3px, transparent 3px 6px); }
  .lay.mla .ic { border: 1.5px solid #6fb1ff; border-radius: 9px; width: 12px; margin: 0 3px;
                 background: rgba(111,177,255,0.35); }
  #ratio { position: absolute; left: 800px; top: 520px; width: 260px;
           font: 700 12.5px ui-monospace, monospace; color: #9aa1b5; opacity: 0; line-height: 1.6; }
  #ratio b { color: var(--accent); }
  #pos { position: absolute; left: 44px; bottom: 28px; font-size: 17px; font-weight: 800; color: var(--accent); opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Kimi Delta Attention: The Frontier of the Linear Line</div>
  <div class="slide-sub">zoom into the state square — who gets to forget, and how fast</div>

  <div id="map"></div>
  <div id="sq"></div>
  <div id="sqlab">the d×d state, row = memory channel</div>
  <div id="knob1"><div class="trk"></div><div id="kh"></div><span class="kl">one α per head</span></div>
  <div id="ks"></div>
  <div class="capline" id="c1"></div>
  <div class="capline" id="c2"></div>
  <svg id="conn" width="1280" height="720"></svg>
  <div id="stack"></div>
  <div id="ratio">K3 backbone — <b>3 × KDA : 1 × gated MLA</b> (the full-attention layers from the MLA slide)</div>
  <div id="pos"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("map"), 5);
  document.getElementById("c1").textContent = EV.kda.from;
  document.getElementById("c2").textContent = EV.kda.upgrade + "";
  var stack = document.getElementById("stack");
  ["kda", "kda", "kda", "mla", "kda", "kda", "kda", "mla"].forEach(function (kind) {
    var d = document.createElement("div");
    d.className = "lay " + kind;
    d.innerHTML = '<span class="ic"></span>' + (kind === "kda" ? "KDA — linear" : "gated MLA — full attention");
    stack.appendChild(d);
  });
  var connPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
  connPath.setAttribute("d", "M 548 300 C 650 300, 680 176, 796 178");
  document.getElementById("conn").appendChild(connPath);
  var connLen = connPath.getTotalLength();
  connPath.style.strokeDasharray = connLen;
  connPath.style.strokeDashoffset = connLen;
  document.getElementById("pos").textContent = EV.kda.position;

  // 8 state rows + 8 per-channel sliders
  var sq = document.getElementById("sq"), ks = document.getElementById("ks");
  var rows = [], handles = [];
  for (var i = 0; i < 8; i++) {
    var r = document.createElement("div");
    r.className = "srow";
    sq.appendChild(r); rows.push(r);
    var s = document.createElement("div");
    s.className = "ms"; s.style.top = (i * 28 + 12) + "px";
    var h = document.createElement("div");
    h.className = "mh";
    s.appendChild(h);
    ks.appendChild(s);
    handles.push(h);
  }
  gsap.set(handles, { x: 60 });

  // ambient A: ONE scalar gate — every channel breathes in lockstep
  var pa = { t: 0 };
  var ambA = gsap.timeline({ repeat: -1, paused: true });
  ambA.to(pa, {
    t: Math.PI * 2, duration: 3.2, ease: "none",
    onUpdate: function () {
      var v = Math.sin(pa.t);
      gsap.set("#kh", { y: -85 * v });
      gsap.set(rows, { opacity: 0.35 + 0.3 * (v + 1) / 2 + 0.3 });
    }
  });

  // ambient B: per-channel gates — every channel forgets at its own rate
  var FR = [1, 3, 2, 5, 4, 7, 2, 6], PH = [0, 1.3, 2.6, 0.7, 3.9, 1.9, 5.1, 2.9];
  var pb = { t: 0 };
  var ambB = gsap.timeline({ repeat: -1, paused: true });
  ambB.to(pb, {
    t: Math.PI * 2, duration: 6, ease: "none",
    onUpdate: function () {
      for (var i = 0; i < 8; i++) {
        var v = Math.sin(pb.t * FR[i] + PH[i]);
        gsap.set(handles[i], { x: 63 + 58 * v });
        gsap.set(rows[i], { opacity: 0.3 + 0.6 * (v + 1) / 2 });
      }
    }
  });

  var tl = gsap.timeline({ paused: true });

  // step 1: Gated DeltaNet — delta writes + one scalar forget knob
  tl.fromTo("#sq, #sqlab", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" })
    .fromTo("#knob1", { opacity: 0, x: -10 }, { opacity: 1, x: 0, duration: 0.45 })
    .call(function () { ambA.play(0); })
    .fromTo("#c1", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .to({}, { duration: 1.6 });
  DECK.markStep(tl);

  // step 2: KDA — the knob splits into per-channel sliders
  tl.call(function () { ambA.pause(); })
    .to("#knob1", { opacity: 0, duration: 0.35 })
    .fromTo("#ks", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .fromTo(".ms", { x: -14, opacity: 0 }, { x: 0, opacity: 1, duration: 0.35, stagger: 0.07, ease: "power2.out" })
    .call(function () { ambB.play(0); })
    .to("#c1", { opacity: 0, duration: 0.25 })
    .fromTo("#c2", { opacity: 0 }, { opacity: 1, duration: 0.35 }, "<")
    .to({}, { duration: 1.6 });
  DECK.markStep(tl);

  // step 3: where the box ships — the K3 backbone stack, 3 KDA : 1 gated MLA
  tl.to(connPath, { strokeDashoffset: 0, duration: 0.6, ease: "power2.inOut" })
    .fromTo(".lay", { opacity: 0, x: 18 }, { opacity: 1, x: 0, duration: 0.3, stagger: 0.09, ease: "power2.out" })
    .fromTo("#ratio", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .to(".lay.mla", { boxShadow: "0 0 14px rgba(111,177,255,0.5)", duration: 0.35, yoyo: true, repeat: 1 });
  DECK.markStep(tl);

  // step 4: its place on the map
  tl.fromTo("#pos", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 })
    .fromTo("#map .ev-sn.on i", { scale: 1 }, { scale: 1.8, duration: 0.28, yoyo: true, repeat: 3, ease: "power1.inOut" });

  DECK.register(tl, {
    reset: function () {
      ambA.pause(0); ambB.pause(0);
      pa.t = 0; pb.t = 0;
      gsap.set(rows, { opacity: 1 });
      gsap.set("#kh", { y: 0 });
      gsap.set(handles, { x: 60 });
    }
  });
</script>
</body>
</html>
