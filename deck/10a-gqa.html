<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MQA / GQA: Share the KV Heads</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #stsign { position: absolute; left: 44px; top: 116px; display: flex; align-items: center; gap: 10px; }
  #stsign .rnd { width: 26px; height: 26px; border-radius: 50%; border: 3px solid #3987e5; background: #0c1116;
    display: flex; align-items: center; justify-content: center; font: 800 13px ui-monospace, monospace; color: #e8eaf0; }
  #stsign .snm { font: 600 12px ui-monospace, monospace; color: #9aa1b5; }
  #stsign .sfare { font: 700 11px ui-monospace, monospace; color: #3987e5; border: 1px solid var(--line);
    border-radius: 999px; padding: 3px 10px; background: var(--panel); }
  #cap1 { position: absolute; left: 136px; top: 176px; font: 600 13px ui-monospace, monospace; color: #9aa1b5; opacity: 0; }
  #cap1 b { color: #e8eaf0; }
  #groups { position: absolute; left: 136px; top: 216px; display: flex; gap: 16px; opacity: 0; }
  .grp { width: 112px; position: relative; }
  .qrow { display: flex; gap: 2px; }
  .qrow i { width: 12px; height: 12px; border-radius: 3px; background: rgba(57,135,229,0.85); display: block; }
  .krow { display: flex; gap: 2px; margin-top: 6px; }
  .krow i { width: 12px; height: 9px; border-radius: 2px; background: #9085e9; display: block; }
  #mqabar { position: absolute; left: 600px; top: 292px; width: 88px; height: 16px; border-radius: 5px;
    background: linear-gradient(180deg, rgba(144,133,233,0.55), #9085e9); opacity: 0; }
  .gbar { position: absolute; top: 292px; width: 96px; height: 16px; border-radius: 5px;
    background: linear-gradient(180deg, rgba(144,133,233,0.55), #9085e9); opacity: 0; }
  #share { position: absolute; left: 136px; top: 336px; width: 1008px; text-align: center;
    font: 700 13.5px ui-monospace, monospace; opacity: 0; }
  #bill { position: absolute; left: 136px; top: 424px; opacity: 0; }
  #bill .bl { font: 600 12px ui-monospace, monospace; color: #6b7284; margin-bottom: 8px; }
  #billrow { display: flex; align-items: center; gap: 14px; }
  #billbar { width: 640px; height: 26px; border-radius: 7px; flex: none;
    background: linear-gradient(180deg, rgba(144,133,233,0.55), #9085e9); }
  #billnum { font: 800 17px ui-monospace, monospace; color: #9085e9; white-space: nowrap; }
  #div8 { font: 800 15px ui-monospace, monospace; color: var(--accent); border: 1.5px solid var(--accent);
    border-radius: 999px; padding: 3px 12px; opacity: 0; white-space: nowrap; }
  #already { position: absolute; left: 136px; top: 496px; font: 600 12.5px ui-monospace, monospace; color: #9aa1b5; opacity: 0; }
  #adopt { position: absolute; left: 136px; top: 560px; font: 600 13px ui-monospace, monospace; color: #c7cce0;
    border: 1px solid var(--line); border-radius: 10px; background: var(--panel); padding: 8px 14px; opacity: 0; }
  #punch { position: absolute; left: 44px; bottom: 26px; font-size: 16px; font-weight: 700; color: var(--accent); opacity: 0; }
</style></head><body>
<div class="stage">
  <div class="slide-title">MQA / GQA: Share the KV Heads</div>
  <div class="slide-sub">first stop out of MHA — same query heads, fewer K,V sets</div>
  <div id="stsign"><b class="rnd">2</b><span class="snm">arriving at</span><span class="sfare">2.6 MB → 330 KB / token</span></div>
  <div id="strip"></div>

  <div id="cap1"></div>
  <div id="groups"></div>
  <div id="mqabar"></div>
  <div id="share"></div>

  <div id="bill">
    <div class="bl">KV cache per token — 80 layers, BF16</div>
    <div id="billrow"><div id="billbar"></div><span id="div8">÷ 8</span><span id="billnum">2.6 MB</span></div>
  </div>
  <div id="already"></div>
  <div id="adopt"></div>
  <div id="punch"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("strip"), 1);
  var strip = document.getElementById("strip");
  strip.style.left = "644px"; strip.style.top = "96px";

  document.getElementById("cap1").innerHTML =
    "MHA: <b>" + EV.gqa.mhaHeads + " query heads</b>, each with its own private K,V — 64 KV sets";
  document.getElementById("already").textContent = EV.gqa.already;
  document.getElementById("adopt").textContent = EV.gqa.adopters;
  document.getElementById("punch").textContent = EV.gqa.pattern;

  // 8 groups x 8 query heads; a private KV tick under every query head
  var groups = document.getElementById("groups");
  var stage = document.querySelector(".stage");
  for (var g = 0; g < 8; g++) {
    var d = document.createElement("div");
    d.className = "grp";
    var q = '<div class="qrow">', k = '<div class="krow">';
    for (var i = 0; i < 8; i++) { q += "<i></i>"; k += "<i></i>"; }
    d.innerHTML = q + "</div>" + k + "</div>";
    groups.appendChild(d);
    var b = document.createElement("div");
    b.className = "gbar"; b.id = "gb" + g;
    b.style.left = (136 + g * 128 + 8) + "px";
    stage.insertBefore(b, document.getElementById("share"));
  }

  var share = document.getElementById("share");
  function setShare(txt, color) { share.textContent = txt; share.style.color = color; }

  var tl = gsap.timeline({ paused: true });

  // step 1: MHA — every query head with a private K,V
  tl.fromTo("#cap1", { opacity: 0, y: -8 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#groups", { opacity: 0 }, { opacity: 1, duration: 0.2 }, "<0.1")
    .fromTo(".qrow i", { opacity: 0, scale: 0.3 }, { opacity: 1, scale: 1, duration: 0.25, stagger: 0.008, ease: "back.out(2)" })
    .fromTo(".krow i", { opacity: 0, y: -6 }, { opacity: 1, y: 0, duration: 0.25, stagger: 0.008 });
  DECK.markStep(tl);

  // step 2: collapse — MQA extreme flashes, settles on GQA groups of 8
  tl.call(function () { setShare("MQA: all 64 query heads share ONE K,V — maximum saving, quality dips", "#ff8a7a"); })
    .to(".krow i", { y: 24, opacity: 0, duration: 0.45, stagger: 0.004, ease: "power2.in" })
    .fromTo("#mqabar", { opacity: 0, scaleX: 0.2 }, { opacity: 1, scaleX: 1, duration: 0.4, ease: "back.out(1.6)" }, "-=0.15")
    .fromTo("#share", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "<")
    .to("#mqabar", { boxShadow: "0 0 18px rgba(144,133,233,0.9)", duration: 0.2, yoyo: true, repeat: 3 })
    .to({}, { duration: 0.7 })
    .call(function () { setShare(EV.gqa.note, "#9aa1b5"); })
    .to("#mqabar", { opacity: 0, duration: 0.3 })
    .fromTo(".gbar", { opacity: 0, scaleX: 0.3 }, { opacity: 1, scaleX: 1, duration: 0.35, stagger: 0.05, ease: "back.out(1.6)" }, "-=0.1")
    .fromTo("#share", { opacity: 0.4 }, { opacity: 1, duration: 0.3 }, "<");
  DECK.markStep(tl);

  // step 3: the bill — cache ÷ 8
  tl.fromTo("#bill", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#div8", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2)" })
    .to("#billbar", { width: 80, duration: 0.9, ease: "power2.inOut" })
    .call(function () { document.getElementById("billnum").textContent = "330 KB"; })
    .fromTo("#billnum", { opacity: 0.2 }, { opacity: 1, duration: 0.35 })
    .fromTo("#already", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 });
  DECK.markStep(tl);

  // step 4: who runs it, and what it started
  tl.fromTo("#adopt", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.45 })
    .fromTo("#punch", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 })
    .to("#strip .ev-sn.on i", { scale: 1.6, duration: 0.25, yoyo: true, repeat: 3, ease: "power1.inOut" });

  DECK.register(tl, {
    reset: function () {
      share.textContent = ""; share.style.color = "";
      document.getElementById("billnum").textContent = "2.6 MB";
      gsap.set("#billbar", { width: 640 });
    },
  });
</script>
</body></html>
