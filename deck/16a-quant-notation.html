<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantization: Decoding the Notation</title>
<link rel="stylesheet" href="shared/deck.css?v=2">
<style>
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  #headline { position: absolute; left: 44px; top: 100px; font: 800 21px ui-monospace, monospace; color: #e8eaf0; opacity: 0; }
  #etiq { position: absolute; left: 44px; top: 132px; width: 730px; font-size: 11.5px; font-style: italic; color: var(--ink-2); opacity: 0; }
  #notn { position: absolute; left: 830px; top: 98px; font: 800 30px ui-monospace, monospace; opacity: 0; letter-spacing: 0.02em; }
  #notn .nW { color: #e0a935; } #notn .nA { color: #6fb1ff; }

  /* ---- the rig (slide-02 machine language) ---- */
  .rig { opacity: 0; }
  #hbm { position: absolute; left: 60px; top: 196px; width: 112px; height: 178px;
         border: 2px solid rgba(201,133,0,0.7); border-radius: 8px; }
  #hbm .hlab { position: absolute; bottom: 4px; width: 100%; text-align: center; font-size: 10.5px; color: #e0a935; font-weight: 700; }
  #wfoot { position: absolute; left: 10px; top: 12px; width: 88px; height: 102px; border-radius: 5px;
           background: linear-gradient(rgba(201,133,0,0.45), rgba(201,133,0,0.85));
           display: flex; align-items: center; justify-content: center; overflow: hidden;
           animation: hbmGlow 2.6s ease-in-out infinite; }
  #wfoot span { font: 700 10px ui-monospace, monospace; color: #0c1116; white-space: nowrap; }
  #kvfoot { position: absolute; left: 10px; top: 126px; width: 88px; height: 30px; border-radius: 5px;
            background: rgba(144,133,233,0.6); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #kvfoot span { font: 700 9.5px ui-monospace, monospace; color: #0c1116; }
  @keyframes hbmGlow { 50% { opacity: 0.55; } }

  #pipe { position: absolute; left: 172px; top: 264px; width: 388px; height: 18px;
          border: 2px solid rgba(47,214,176,0.55); border-radius: 9px; overflow: hidden; }
  #pipe i { position: absolute; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%;
            background: #2fd6b0; animation: qFlow 1.2s linear infinite; }
  #pipe i:nth-child(2) { animation-delay: 0.2s; } #pipe i:nth-child(3) { animation-delay: 0.4s; }
  #pipe i:nth-child(4) { animation-delay: 0.6s; } #pipe i:nth-child(5) { animation-delay: 0.8s; }
  #pipe i:nth-child(6) { animation-delay: 1.0s; }
  @keyframes qFlow { from { left: -8px; } to { left: 384px; } }

  #wtile { position: absolute; left: 264px; top: 208px; width: 92px; height: 92px; z-index: 3;
           background: var(--panel); border: 1.5px solid rgba(224,169,53,0.55); border-radius: 8px;
           display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); gap: 2px; padding: 5px; }
  #wtile i { border-radius: 2px; }
  .dial { position: absolute; z-index: 4; }
  #wRead { position: absolute; left: 264px; top: 306px; width: 92px; text-align: center;
           font: 800 13px ui-monospace, monospace; color: #e0a935; }
  #aRead { position: absolute; left: 502px; top: 304px; font: 800 13px ui-monospace, monospace; color: #6fb1ff; }
  #kvlab { position: absolute; left: 172px; top: 400px; font: 700 10px ui-monospace, monospace; color: #9085e9; }

  #astream { position: absolute; left: 200px; top: 342px; width: 360px; height: 12px;
             border: 1.5px solid rgba(111,177,255,0.45); border-radius: 6px; overflow: hidden; }
  #astream i { position: absolute; top: 50%; transform: translateY(-50%); width: 5px; height: 5px; border-radius: 50%;
               background: #6fb1ff; animation: aFlow 1.7s linear infinite; }
  #astream i:nth-child(2) { animation-delay: 0.34s; } #astream i:nth-child(3) { animation-delay: 0.68s; }
  #astream i:nth-child(4) { animation-delay: 1.02s; } #astream i:nth-child(5) { animation-delay: 1.36s; }
  @keyframes aFlow { from { left: -8px; } to { left: 356px; } }
  #alab { position: absolute; left: 200px; top: 360px; font: 600 10.5px ui-monospace, monospace; color: rgba(111,177,255,0.75); }

  #core { position: absolute; left: 560px; top: 196px; width: 178px; height: 196px;
          border: 2.5px solid #3987e5; border-radius: 10px; background: #0d1420;
          animation: qCorePulse 1.8s ease-in-out infinite; }
  @keyframes qCorePulse { 50% { box-shadow: 0 0 20px rgba(57,135,229,0.5); } }
  #core .dlab { position: absolute; bottom: 6px; width: 100%; text-align: center; font-size: 11px; color: #9ec7f5; font-weight: 600; }
  .tiles { position: absolute; inset: 10px 10px 28px; display: grid; gap: 3px;
           grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(7, 1fr); }
  .tiles i { background: rgba(57, 135, 229, 0.22); border-radius: 2px; animation: smTwinkle 2.6s ease-in-out infinite; }
  .tiles i:nth-child(3n) { animation-delay: 0.5s; } .tiles i:nth-child(4n) { animation-delay: 1.1s; }
  .tiles i:nth-child(5n) { animation-delay: 1.7s; background: rgba(57, 135, 229, 0.34); }
  @keyframes smTwinkle { 50% { background: rgba(111, 177, 255, 0.6); } }
  .tiles.hot i { background: rgba(111, 177, 255, 0.55); animation-duration: 1.1s; }

  #badge { position: absolute; left: 652px; top: 184px; z-index: 5; padding: 3px 11px; border-radius: 999px;
           font: 800 12.5px ui-monospace, monospace; border: 2px solid #6b7284; background: #0b0d12; color: #c7cce0; }
  #outArrow { position: absolute; left: 744px; top: 284px; font: 700 13px ui-monospace, monospace; color: #4a5066; }

  .flashtag { position: absolute; padding: 3px 9px; border-radius: 7px; z-index: 6;
              font: 700 11px ui-monospace, monospace; border: 1.5px solid; background: rgba(11,13,18,0.9); opacity: 0; }
  #tagBW  { left: 460px; top: 234px; color: #2fd6b0; border-color: rgba(47,214,176,0.7); }
  #tagCap { left: 62px;  top: 164px; color: #e0a935; border-color: rgba(201,133,0,0.7); }
  #tagComp{ left: 748px; top: 226px; color: #6fb1ff; border-color: rgba(57,135,229,0.8); }
  #dequant { position: absolute; left: 560px; top: 400px; width: 250px;
             font: 600 10px ui-monospace, monospace; color: #ff8a7a; opacity: 0; line-height: 1.4; }

  /* ---- right column: dial cards + B200 panel ---- */
  .dcard { position: absolute; left: 830px; width: 406px; background: var(--panel);
           border: 1px solid var(--line); border-left: 3px solid; border-radius: 8px; padding: 8px 11px; opacity: 0; }
  .dcard .what { font-size: 11px; font-weight: 600; line-height: 1.4; }
  .dcard .buys { font-size: 10px; color: var(--ink-2); line-height: 1.35; margin-top: 3px; }
  #cardW  { top: 168px; border-left-color: #e0a935; } #cardW .what { color: #e0a935; }
  #cardA  { top: 260px; border-left-color: #6fb1ff; } #cardA .what { color: #6fb1ff; }
  #cardKV { top: 352px; border-left-color: #9085e9; } #cardKV .what { color: #9085e9; }

  #b200 { position: absolute; left: 830px; top: 432px; width: 406px; background: var(--panel);
          border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; opacity: 0; }
  #b200 .btitle { font-size: 10.5px; color: var(--ink-2); line-height: 1.45; margin-bottom: 9px; }
  #b200 .brow { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
  #b200 .bl { width: 42px; font: 700 11px ui-monospace, monospace; }
  #b200 .bbar { height: 13px; border-radius: 3px; }
  #b200 .bv { font: 700 10.5px ui-monospace, monospace; color: #c7cce0; }

  /* ---- taxonomy table ---- */
  #tax { position: absolute; left: 44px; top: 430px; width: 764px; }
  #tax .thead, #tax .trowx { display: grid; grid-template-columns: 94px 188px 164px 318px; column-gap: 10px; align-items: center; }
  #tax .thead { font: 700 9.5px ui-monospace, monospace; letter-spacing: 0.14em; color: #6b7284;
                text-transform: uppercase; padding-bottom: 4px; opacity: 0; }
  #tax .trowx { border-top: 1px solid var(--line); padding: 4px 0; min-height: 27px; opacity: 0; }
  #tax .tname { font: 700 11.5px ui-monospace, monospace; }
  #tax .tmean { font: 500 10.5px ui-monospace, monospace; color: #c7cce0; }
  #tax .tbuys { font-size: 10.5px; color: var(--ink-2); }
  #tax .tnote { font-size: 9px; color: #6b7284; font-style: italic; }
  #tax .trowx.fmt .tname { color: #2fd6b0; font-style: italic; }
  #tax .trowx.fmt { background: rgba(47,214,176,0.045); }

  #caveat { position: absolute; left: 44px; top: 662px; width: 750px;
            font-size: 12.5px; font-weight: 600; color: #ff8a7a; opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Quantization: Decoding the Notation</div>
  <div class="slide-sub">two dials on the matmul — and a third on the cache</div>

  <div id="headline"></div>
  <div id="etiq"></div>
  <div id="notn"><span class="nW" id="nW">W16</span><span class="nA" id="nA">A16</span></div>

  <div class="rig" id="r-hbm">
    <div id="hbm">
      <div id="wfoot"><span id="wfootLab">W · 16-bit</span></div>
      <div id="kvfoot"><span>KV</span></div>
      <div class="hlab">HBM</div>
    </div>
  </div>
  <div class="rig" id="r-pipe">
    <div id="pipe"><i></i><i></i><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="rig" id="r-astream">
    <div id="astream"><i></i><i></i><i></i><i></i><i></i></div>
    <div id="alab">x — activations</div>
  </div>
  <div class="rig" id="r-wtile">
    <div id="wtile"></div>
    <div class="dial" id="wdial" style="left:279px; top:223px;"></div>
    <div id="wRead">W16</div>
  </div>
  <div class="rig" id="r-adial">
    <div class="dial" id="adial" style="left:438px; top:282px;"></div>
    <div id="aRead">A16</div>
  </div>
  <div class="rig" id="r-core">
    <div id="core"><div class="dlab">Tensor cores</div></div>
    <div id="badge">FP16</div>
    <div id="outArrow">→ y</div>
  </div>
  <div class="rig" id="r-kv">
    <div class="dial" id="kvdial" style="left:120px; top:384px;"></div>
    <div id="kvlab">KV</div>
  </div>

  <div class="flashtag" id="tagBW">bytes/s ↓</div>
  <div class="flashtag" id="tagCap">GB ↓</div>
  <div class="flashtag" id="tagComp">FLOP/s ↑</div>
  <div id="dequant">dequant on the fly, zero compute speedup</div>

  <div class="dcard" id="cardW"><div class="what"></div><div class="buys"></div></div>
  <div class="dcard" id="cardA"><div class="what"></div><div class="buys"></div></div>
  <div class="dcard" id="cardKV"><div class="what"></div><div class="buys"></div></div>

  <div id="b200"><div class="btitle"></div><div id="bars"></div></div>
  <div id="tax"></div>
  <div id="caveat"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/quant.js?v=2"></script>
<script src="shared/gpus.js?v=2"></script>
<script src="shared/manifest.js?v=2"></script>
<script src="shared/deck.js?v=2"></script>
<script>
  document.getElementById("headline").textContent = QT.headline;
  document.getElementById("etiq").textContent = QT.etiquette;
  document.getElementById("caveat").textContent = "⚠ " + QT.caveat;
  document.querySelector("#cardW .what").textContent = QT.wDial.what;
  document.querySelector("#cardW .buys").textContent = QT.wDial.buys;
  document.querySelector("#cardA .what").textContent = QT.aDial.what;
  document.querySelector("#cardA .buys").textContent = QT.aDial.buys;
  document.querySelector("#cardKV .what").textContent = QT.kvDial.what;
  document.querySelector("#cardKV .buys").textContent = QT.kvDial.buys;

  // ---- dials (SVG rotary, ticks at 16 / 8 / 4) --------------------------
  function pos(a, r) { var t = a * Math.PI / 180; return [32 + r * Math.sin(t), 32 - r * Math.cos(t)]; }
  function dialSVG(host, size, color, ticks) {
    var s = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 64 64">' +
      '<circle cx="32" cy="32" r="31.5" fill="rgba(11,13,18,0.85)"/>' +
      '<circle cx="32" cy="32" r="24" fill="#12141a" stroke="#2a2e3b" stroke-width="2.5"/>';
    ticks.forEach(function (t) {
      var p1 = pos(t[1], 18.5), p2 = pos(t[1], 23), p3 = pos(t[1], 30);
      s += '<line x1="' + p1[0] + '" y1="' + p1[1] + '" x2="' + p2[0] + '" y2="' + p2[1] +
        '" stroke="#6b7284" stroke-width="2"/>' +
        '<text x="' + p3[0] + '" y="' + (p3[1] + 3) + '" text-anchor="middle" ' +
        'font-family="ui-monospace,monospace" font-size="9.5" font-weight="700" fill="#9aa1b5">' + t[0] + '</text>';
    });
    s += '<g class="needle"><line x1="32" y1="32" x2="32" y2="14" stroke="' + color +
      '" stroke-width="3" stroke-linecap="round"/><circle cx="32" cy="32" r="3.5" fill="' + color + '"/></g></svg>';
    host.innerHTML = s;
    return host.querySelector(".needle");
  }
  var wN = dialSVG(document.getElementById("wdial"), 62, "#e0a935", [["16", -70], ["8", 0], ["4", 70]]);
  var aN = dialSVG(document.getElementById("adial"), 58, "#6fb1ff", [["16", -70], ["8", 0], ["4", 70]]);
  var kvN = dialSVG(document.getElementById("kvdial"), 46, "#9085e9", [["16", -50], ["8", 50]]);
  gsap.set([wN, aN], { rotation: -70, svgOrigin: "32 32" });
  gsap.set(kvN, { rotation: -50, svgOrigin: "32 32" });

  // ---- weight tile: cells posterize as the dial turns -------------------
  var wtile = document.getElementById("wtile"), wcells = [];
  for (var i = 0; i < 25; i++) {
    var c = document.createElement("i");
    wtile.appendChild(c); wcells.push(c);
  }
  function requant(levels) {
    wcells.forEach(function (c, i) {
      var v = (i * 37 % 101) / 101;
      var q = Math.round(v * (levels - 1)) / (levels - 1);
      c.style.background = "rgba(224,169,53," + (0.12 + q * 0.55).toFixed(3) + ")";
    });
  }
  requant(16);

  // core tiles (slide-02 grid)
  var core = document.getElementById("core");
  var tgrid = document.createElement("div");
  tgrid.className = "tiles";
  for (var j = 0; j < 42; j++) tgrid.appendChild(document.createElement("i"));
  core.appendChild(tgrid);

  function dotSpeed(sec) {
    return function () {
      document.querySelectorAll("#pipe i").forEach(function (d) { d.style.animationDuration = sec ? sec + "s" : ""; });
    };
  }
  var badge = document.getElementById("badge");

  // ---- taxonomy table ---------------------------------------------------
  var tax = document.getElementById("tax");
  tax.innerHTML = '<div class="thead"><span>notation</span><span>matmul</span><span>buys</span><span>note</span></div>';
  QT.rows.forEach(function (r) {
    var fmt = r[0].charAt(0) === "“";
    var nameColor = fmt ? "" : (r[0].indexOf("KV") === 0 ? "color:#9085e9" : "color:#e0a935");
    tax.insertAdjacentHTML("beforeend",
      '<div class="trowx' + (fmt ? " fmt" : "") + '"><span class="tname" style="' + nameColor + '">' + r[0] +
      '</span><span class="tmean">' + r[1] + '</span><span class="tbuys">' + r[2] +
      '</span><span class="tnote">' + r[3] + "</span></div>");
  });

  // ---- B200 panel -------------------------------------------------------
  document.querySelector("#b200 .btitle").textContent = QT.b200;
  var BARC = { BF16: "#3987e5", FP8: "#2fd6b0", FP4: "#e0a935" };
  var bars = document.getElementById("bars");
  GPUS.precision.forEach(function (p) {
    bars.insertAdjacentHTML("beforeend",
      '<div class="brow"><span class="bl" style="color:' + BARC[p[0]] + '">' + p[0] +
      '</span><div class="bbar" style="width:' + Math.round(p[1] / 9000 * 258) + "px;background:linear-gradient(90deg," +
      BARC[p[0]] + "55," + BARC[p[0]] + ')"></div><span class="bv">' + p[1].toLocaleString() + "</span></div>");
  });

  // ---- timeline ---------------------------------------------------------
  var tl = gsap.timeline({ paused: true });

  // beat 1: the notation is the hero; the rig assembles
  tl.fromTo("#headline", { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" })
    .fromTo("#etiq", { opacity: 0 }, { opacity: 1, duration: 0.4 }, "-=0.2")
    .fromTo("#r-hbm", { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" })
    .fromTo("#r-pipe", { opacity: 0 }, { opacity: 1, duration: 0.35 }, "-=0.15")
    .fromTo("#r-astream", { opacity: 0 }, { opacity: 1, duration: 0.35 }, "-=0.15")
    .fromTo("#r-core", { opacity: 0, x: 14 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" }, "-=0.15")
    .fromTo("#r-wtile", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" })
    .fromTo("#r-adial", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" }, "-=0.2")
    .fromTo("#r-kv", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2)" }, "-=0.2")
    .fromTo("#notn", { opacity: 0 }, { opacity: 1, duration: 0.4 });
  DECK.markStep(tl);

  // beat 2: turn W — 16 → 8 → 4. Pipe narrows, footprint shrinks, core stays FP16.
  tl.to(wN, { rotation: 0, svgOrigin: "32 32", duration: 0.5, ease: "power2.inOut" })
    .call(function () {
      document.getElementById("wRead").textContent = "W8";
      document.getElementById("nW").textContent = "W8";
      document.getElementById("wfootLab").textContent = "W · 8-bit";
      requant(8);
    })
    .to("#wfoot", { height: 52, duration: 0.4, ease: "power2.out" }, "<")
    .to("#pipe", { height: 12, duration: 0.4 }, "<")
    .call(dotSpeed(1.9))
    .to({}, { duration: 0.35 })
    .to(wN, { rotation: 70, svgOrigin: "32 32", duration: 0.5, ease: "power2.inOut" })
    .call(function () {
      document.getElementById("wRead").textContent = "W4";
      document.getElementById("nW").textContent = "W4";
      document.getElementById("wfootLab").textContent = "W · 4-bit";
      requant(4);
    })
    .to("#wfoot", { height: 26, duration: 0.4, ease: "power2.out" }, "<")
    .to("#pipe", { height: 8, duration: 0.4 }, "<")
    .to("#pipe i", { width: 4, height: 4, duration: 0.3 }, "<")
    .call(dotSpeed(2.7))
    .fromTo("#tagBW", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2.5)" })
    .fromTo("#tagCap", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2.5)" }, "<0.12")
    // the tensor core refuses to budge
    .to(badge, { borderColor: "#e04b38", color: "#ff8a7a", boxShadow: "0 0 16px rgba(224,75,56,0.7)", duration: 0.22, yoyo: true, repeat: 3 })
    .to(badge, { x: "+=5", duration: 0.05, yoyo: true, repeat: 5 }, "<")
    .set(badge, { x: 0 })
    .fromTo("#dequant", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .fromTo("#cardW", { opacity: 0, x: 18 }, { opacity: 1, x: 0, duration: 0.45, ease: "power2.out" });
  DECK.markStep(tl);

  // beat 3: turn A — the core flips to INT8; taxonomy builds
  tl.to(aN, { rotation: 0, svgOrigin: "32 32", duration: 0.5, ease: "power2.inOut" })
    .call(function () {
      document.getElementById("aRead").textContent = "A8";
      document.getElementById("nA").textContent = "A8";
    })
    .to(badge, { rotationX: 90, duration: 0.22, ease: "power2.in" })
    .call(function () {
      badge.textContent = "INT8";
      badge.style.borderColor = "#3987e5";
      badge.style.color = "#6fb1ff";
      badge.style.boxShadow = "0 0 16px rgba(57,135,229,0.7)";
      tgrid.classList.add("hot");
    })
    .to(badge, { rotationX: 0, duration: 0.3, ease: "back.out(2)" })
    .fromTo("#tagComp", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2.5)" })
    .fromTo("#cardA", { opacity: 0, x: 18 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" })
    .to(kvN, { rotation: 50, svgOrigin: "32 32", duration: 0.45, ease: "power2.inOut" })
    .to("#kvfoot", { height: 16, duration: 0.35 }, "<")
    .fromTo("#cardKV", { opacity: 0, x: 18 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" })
    .fromTo("#tax .thead", { opacity: 0 }, { opacity: 1, duration: 0.3 })
    .fromTo("#tax .trowx", { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.35, stagger: 0.09, ease: "power2.out" })
    .to("#etiq", { color: "#2fd6b0", duration: 0.35, yoyo: true, repeat: 1 }, "-=0.4");
  DECK.markStep(tl);

  // beat 4: the regime caveat + the B200 ceilings callback
  tl.fromTo("#caveat", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 })
    .fromTo("#b200", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" })
    .fromTo("#b200 .bbar", { scaleX: 0, transformOrigin: "left center" },
      { scaleX: 1, duration: 0.55, stagger: 0.16, ease: "power2.out" })
    .fromTo("#b200 .brow:last-child .bv", { scale: 1 }, { scale: 1.25, color: "#e0a935", duration: 0.3, yoyo: true, repeat: 1, transformOrigin: "left center" });
