<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Attention Evolution Map</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #metric { position: absolute; left: 44px; top: 122px; font: 600 13px ui-monospace, monospace; color: #9aa1b5; opacity: 0; }
  #metric i { display: inline-block; width: 22px; height: 3px; background: var(--accent); border-radius: 2px; margin-right: 9px; vertical-align: middle; }
  #map { position: absolute; left: 0; top: 0; width: 1280px; height: 720px; pointer-events: none; }
  #base { stroke: #232836; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0; }
  #active { stroke-width: 7; fill: none; stroke-linecap: butt; stroke-linejoin: round; }
  .stc { fill: #12141a; stroke: #3a4051; stroke-width: 3.5; transition: stroke 0.35s, filter 0.35s; opacity: 0; }
  .stc.on { stroke: var(--col); filter: drop-shadow(0 0 7px var(--col)); }
  .sign { position: absolute; width: 128px; text-align: center; opacity: 0; transition: opacity 0.35s; }
  .sign.dim { opacity: 0.45; }
  .sign.on { opacity: 1; }
  .sign .nm { font-size: 13px; font-weight: 700; color: #e8eaf0; }
  .sign .sb { font-size: 10px; color: #6b7284; margin-top: 1px; }
  .sign .by { font: 700 11px ui-monospace, monospace; margin-top: 3px; opacity: 0; transform: translateY(4px); transition: opacity 0.35s, transform 0.35s; }
  .sign.on .by { opacity: 1; transform: none; }
  #fare { position: absolute; left: 902px; top: 108px; width: 308px; background: #0c1116; border: 1.5px solid var(--line); border-radius: 10px; padding: 9px 16px 10px; opacity: 0; }
  #fare .fl { font: 600 10px ui-monospace, monospace; color: #6b7284; letter-spacing: 0.08em; }
  #fare .fv { font: 800 28px ui-monospace, monospace; color: var(--accent); margin-top: 2px; }
  #fare .fs { font: 600 10.5px ui-monospace, monospace; color: #9aa1b5; margin-top: 2px; }
  #punch { position: absolute; left: 44px; bottom: 26px; font-size: 17px; font-weight: 700; color: var(--accent); opacity: 0; }
</style></head><body>
<div class="stage">
  <div class="slide-title">The Attention Evolution Map</div>
  <div class="slide-sub">the lineage as one transit line — seven stations</div>

  <div id="metric"><i></i><span id="metricTxt"></span></div>

  <svg id="map" viewBox="0 0 1280 720">
    <defs>
      <linearGradient id="lg" gradientUnits="userSpaceOnUse" x1="110" y1="0" x2="1150" y2="0"></linearGradient>
    </defs>
    <path id="base" d="M110,500 H470 L560,410 H700 L790,320 H1150"></path>
    <path id="active" d="M110,500 H470 L560,410 H700 L790,320 H1150" stroke="url(#lg)"></path>
    <g id="stg"></g>
    <circle id="rider" r="5" fill="#e8eaf0" opacity="0" style="filter: drop-shadow(0 0 6px #2fd6b0)"></circle>
  </svg>
  <div id="signs"></div>

  <div id="fare">
    <div class="fl">FARE&nbsp;·&nbsp;KV BYTES / DECODED TOKEN</div>
    <div class="fv" id="fareVal">2.6 MB</div>
    <div class="fs" id="fareAt">at MHA — baseline</div>
  </div>

  <div id="punch"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("metricTxt").textContent = EV.metric;
  document.getElementById("punch").textContent = EV.story;

  // station geometry along the line
  var ST = [
    { x: 110, y: 500, d: 0 },
    { x: 270, y: 500, d: 160 },
    { x: 430, y: 500, d: 320 },
    { x: 640, y: 410, d: 567.3 },
    { x: 870, y: 320, d: 834.6 },
    { x: 1010, y: 320, d: 974.6 },
    { x: 1150, y: 320, d: 1114.6 },
  ];

  var lg = document.getElementById("lg");
  var stg = document.getElementById("stg");
  var signs = document.getElementById("signs");
  EV.nodes.forEach(function (n, i) {
    var s = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    s.setAttribute("offset", ((ST[i].x - 110) / 1040).toFixed(3));
    s.setAttribute("stop-color", n.color);
    lg.appendChild(s);
    var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", ST[i].x); c.setAttribute("cy", ST[i].y); c.setAttribute("r", 10);
    c.setAttribute("class", "stc"); c.setAttribute("id", "stc" + i);
    c.style.setProperty("--col", n.color);
    stg.appendChild(c);
    var g = document.createElement("div");
    g.className = "sign"; g.id = "sign" + i;
    g.style.left = (ST[i].x - 64) + "px";
    g.style.top = (ST[i].y === 500 ? 520 : (ST[i].y === 410 ? 430 : 244)) + "px";
    g.innerHTML = '<div class="nm">' + n.name + '</div><div class="sb">' + n.sub +
      '</div><div class="by" style="color:' + n.color + '">' + (n.bytes || "&nbsp;") + (n.warn ? " ⚠" : "") + "</div>";
    signs.appendChild(g);
  });

  var active = document.getElementById("active");
  var L = active.getTotalLength();
  active.style.strokeDasharray = L;
  active.style.strokeDashoffset = L;

  function act(i) { document.getElementById("stc" + i).classList.add("on");
                    document.getElementById("sign" + i).classList.add("on"); }
  function setFare(v, at) {
    document.getElementById("fareVal").textContent = v;
    document.getElementById("fareAt").textContent = at;
    gsap.fromTo("#fareVal", { opacity: 0.15 }, { opacity: 1, duration: 0.45, ease: "power1.out" });
  }

  // ambient: a light rides the finished line
  var pos = { d: 0 };
  var rider = document.getElementById("rider");
  var loop = gsap.timeline({ repeat: -1, paused: true });
  loop.to(pos, {
    d: L, duration: 7, ease: "power1.inOut",
    onUpdate: function () {
      var p = active.getPointAtLength(pos.d);
      rider.setAttribute("cx", p.x); rider.setAttribute("cy", p.y);
    },
  }).to({}, { duration: 0.6 });

  var tl = gsap.timeline({ paused: true });

  // step 1: the skeleton — line, stations, signs, fare display at MHA
  tl.fromTo("#metric", { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.45 })
    .to("#base", { opacity: 1, duration: 0.6 }, "<0.1")
    .fromTo(".stc", { opacity: 0 }, { opacity: 1, duration: 0.3, stagger: 0.07 }, "<0.15")
    .call(function () {
      for (var i = 0; i < 7; i++) document.getElementById("sign" + i).classList.add("dim");
    })
    .fromTo("#fare", { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.45 }, "-=0.2")
    .call(function () { act(0); })
    .to({}, { duration: 0.35 });
  DECK.markStep(tl);

  // step 2: stations 1-3 — the cache shrinks 2.6 MB -> 330 KB -> ~70 KB
  tl.to("#active", { strokeDashoffset: L - ST[1].d, duration: 0.55, ease: "power1.inOut" })
    .call(function () { act(1); setFare("330 KB", "at MQA / GQA — cache ÷ 8"); })
    .to({}, { duration: 0.55 })
    .to("#active", { strokeDashoffset: L - ST[2].d, duration: 0.55, ease: "power1.inOut" })
    .call(function () { act(2); setFare("~70 KB", "at MLA — low-rank latent ⚠"); })
    .to({}, { duration: 0.55 })
    .to("#active", { strokeDashoffset: L - ST[3].d, duration: 0.7, ease: "power1.inOut" })
    .call(function () { act(3); setFare("~70 KB", "at Sparse — and cache ≤ window"); })
    .to({}, { duration: 0.3 });
  DECK.markStep(tl);

  // step 3: stations 4-6 — the cache becomes a fixed state
  tl.to("#active", { strokeDashoffset: L - ST[4].d, duration: 0.7, ease: "power1.inOut" })
    .call(function () { act(4); setFare("O(1)", "at Linear / SSM — fixed-size state"); })
    .to({}, { duration: 0.55 })
    .to("#active", { strokeDashoffset: L - ST[5].d, duration: 0.5, ease: "power1.inOut" })
    .call(function () { act(5); })
    .to({}, { duration: 0.4 })
    .to("#active", { strokeDashoffset: L - ST[6].d, duration: 0.5, ease: "power1.inOut" })
    .call(function () { act(6); setFare("~tens of KB", "at KDA — state, end of line ⚠"); })
    .to({}, { duration: 0.3 });
  DECK.markStep(tl);

  // step 4: the story in one line; a light rides the whole route
  tl.fromTo("#punch", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.55 })
    .call(function () { rider.setAttribute("opacity", 0.95); loop.play(0); });

  DECK.register(tl, {
    reset: function () {
      loop.pause(0);
      rider.setAttribute("opacity", 0);
      for (var i = 0; i < 7; i++) {
        document.getElementById("stc" + i).classList.remove("on");
        document.getElementById("sign" + i).classList.remove("on", "dim");
      }
      document.getElementById("fareVal").textContent = "2.6 MB";
      document.getElementById("fareAt").textContent = "at MHA — baseline";
      gsap.set("#active", { strokeDashoffset: L });
    },
  });
</script>
</body></html>
