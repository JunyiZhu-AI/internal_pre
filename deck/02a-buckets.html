<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hardware framework and efficient algorithms</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/bottlenecks.css">
<style>
  #framing {
    position: absolute; left: 45px; top: 98px; width: 860px;
    font-size: 14.5px; font-style: italic; color: var(--accent); opacity: 0;
  }
  .bucket {
    position: absolute; top: 450px; width: 196px; height: 218px;
    background: var(--panel); border: 1.5px solid var(--line);
    border-radius: 10px 10px 16px 16px;
    clip-path: polygon(0 0, 100% 0, 88% 100%, 12% 100%);
    padding: 14px 10px 0; text-align: center; opacity: 0;
  }
  .bucket h3 { margin: 8px 0 3px; font-size: 15px; }
  .bucket .unit {
    display: inline-block; font-family: ui-monospace, monospace; font-size: 11px;
    border: 1px solid; border-radius: 999px; padding: 1px 9px; margin-bottom: 5px;
  }
  .bucket .dom { font-size: 11px; color: var(--ink-2); }
  #cardcloud .tcard { position: absolute; width: 240px; }
  #teaser {
    position: absolute; left: 45px; top: 412px; width: 700px;
    font-size: 13px; color: var(--ink-2); font-style: italic; opacity: 0;
  }
  #simhost { left: 950px; top: 450px; width: 286px; height: 218px; opacity: 0; }
  #simlab { position: absolute; left: 950px; top: 418px; width: 286px; font-size: 12px; color: var(--ink-2); opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Hardware framework and efficient algorithms</div>
  <div class="slide-sub">where is the bottleneck — compute, bandwidth, capacity, or communication?</div>
  <div id="framing"></div>

  <div id="cardcloud"></div>
  <div id="teaser"></div>
  <div id="buckets"></div>

  <div id="simlab">our speedometer for the whole talk:</div>
  <div id="simhost" class="sim"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/bottlenecks.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("framing").textContent = "“" + BN.framing + "”";
  document.getElementById("teaser").textContent = "“" + BN.teaser + "”";

  // four buckets
  var bhost = document.getElementById("buckets");
  BN.list.forEach(function (b, i) {
    var d = document.createElement("div");
    d.className = "bucket"; d.id = "bk-" + b.key;
    d.style.left = (48 + i * 218) + "px";
    d.style.borderColor = b.color + "77";
    d.innerHTML = BN.iconHTML(b.key) +
      "<h3>" + b.name + "</h3>" +
      '<span class="unit" style="color:' + b.color + '; border-color:' + b.color + '55">' + b.unit + "</span>" +
      '<div class="dom">' + b.dom + "</div>";
    bhost.appendChild(d);
  });

  // floating locked technique cards
  var cloud = document.getElementById("cardcloud");
  BN.techniques.forEach(function (t, i) {
    var c = document.createElement("div");
    c.className = "tcard locked";
    c.style.left = (56 + (i % 3) * 292 + (i * 37) % 26) + "px";
    c.style.top = (152 + Math.floor(i / 3) * 84 + (i * 53) % 18) + "px";
    c.style.transform = "rotate(" + (((i * 67) % 11) - 5) + "deg)";
    c.innerHTML = '<div class="abbr">' + t[1] + '</div><div class="full">' + t[0] + '</div><span class="lock">🔒</span>';
    cloud.appendChild(c);
  });

  var sim = BN.buildSim(document.getElementById("simhost"), { ghost: true });

  var tl = gsap.timeline({ paused: true });

  // steps 1-4: the four buckets, one per click
  BN.list.forEach(function (b) {
    tl.fromTo("#bk-" + b.key, { opacity: 0, y: 46, scale: 0.85 },
      { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.6)" });
    DECK.markStep(tl);
  });

  // step 5: the framing line
  tl.fromTo("#framing", { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" });
  DECK.markStep(tl);

  // step 6: the locked toolkit rains in
  tl.fromTo("#cardcloud .tcard", { opacity: 0, y: -60 },
    { opacity: 1, y: 0, duration: 0.5, stagger: { each: 0.07, from: "random" }, ease: "power2.out" })
    .fromTo("#teaser", { opacity: 0 }, { opacity: 1, duration: 0.45 });
  DECK.markStep(tl);

  // step 7: the speedometer powers on
  tl.fromTo("#simlab", { opacity: 0 }, { opacity: 1, duration: 0.3 })
    .fromTo("#simhost", { opacity: 0, scale: 0.94 }, { opacity: 1, scale: 1, duration: 0.45, ease: "power2.out" })
    .call(function () { sim.start(); });

  DECK.register(tl, { reset: function () { sim.stop(); } });
</script>
</body>
</html>
