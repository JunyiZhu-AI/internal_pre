<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Precision Becomes an Architecture Hyperparameter</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  /* ---- split-flap component (same mechanics as slide 16) ---- */
  .flap {
    position: absolute; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-weight: 700; perspective: 520px;
  }
  .fh {
    position: absolute; left: 0; width: 100%; height: 50%; overflow: hidden;
    background: linear-gradient(180deg, #1e2330, #171b26);
  }
  .fh span {
    position: absolute; left: 0; top: 0; width: 100%; height: 200%;
    display: flex; align-items: center; justify-content: center;
    color: #f3f5fa; letter-spacing: 0.02em;
  }
  .ft { top: 0; border-radius: 9px 9px 0 0; border: 1px solid #313749; border-bottom: none; }
  .fb {
    bottom: 0; border-radius: 0 0 9px 9px; border: 1px solid #272c3a; border-top: none;
    background: linear-gradient(180deg, #141824, #10131c);
  }
  .fb span { top: -100%; }
  .fl { top: 0; z-index: 3; backface-visibility: hidden; visibility: hidden; }
  .fl.asTop {
    border-radius: 9px 9px 0 0; border: 1px solid #313749; border-bottom: none;
    background: linear-gradient(180deg, #212736, #1a1e2b);
  }
  .fl.asBot {
    top: 50%; border-radius: 0 0 9px 9px; border: 1px solid #272c3a; border-top: none;
    background: linear-gradient(180deg, #161a26, #10131c);
  }
  .fl.asBot span { top: -100%; }
  .fsplit {
    position: absolute; left: 0; right: 0; top: 50%; height: 2px; margin-top: -1px;
    background: #0b0d12; z-index: 4;
  }
  .plate {
    position: absolute; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 700;
    border-radius: 9px; border: 1px solid #2a2e3b;
    background: linear-gradient(180deg, #1a1f2b, #12151e);
    display: flex; align-items: center; justify-content: center; color: #9aa1b5;
  }
  .plate:after {
    content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 2px;
    margin-top: -1px; background: #0b0d12;
  }

  #disp { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
  #punch {
    position: absolute; left: 320px; top: 224px; width: 640px; text-align: center;
    font: 800 14.5px ui-monospace, monospace; color: var(--accent); opacity: 0;
  }

  /* ---- entry-point timeline ---- */
  .ecard {
    position: absolute; top: 252px; width: 310px; height: 66px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 12px; opacity: 0;
  }
  .ecard .en { font: 700 13px ui-monospace, monospace; }
  .ecard .ed { font-size: 11.5px; color: #c7cce0; margin-top: 2px; }
  .ecard .ee { font: 600 10px ui-monospace, monospace; color: var(--ink-2); margin-top: 2px; }
  #pline {
    position: absolute; left: 240px; top: 348px; width: 800px; height: 22px;
    display: flex; opacity: 0;
  }
  #pline .seg {
    border: 1px solid #2a2e3b; background: rgba(27,30,39,0.6);
    font: 600 10px ui-monospace, monospace; color: #6b7284;
    display: flex; align-items: center; justify-content: center;
  }
  #pline .seg:first-child { border-radius: 6px 0 0 6px; }
  #pline .seg:last-child { border-radius: 0 6px 6px 0; background: rgba(27,30,39,0.35); }
  #plab { position: absolute; left: 240px; top: 320px; font: 600 10.5px ui-monospace, monospace; font-style: italic; color: #6b7284; opacity: 0; }
  #mk {
    position: absolute; top: 334px; left: 933px; width: 13px; height: 13px;
    transform: rotate(45deg); border-radius: 2px; background: #6b7284;
    box-shadow: 0 0 12px rgba(232,234,240,0.35); opacity: 0; z-index: 5;
  }
  .gdot { position: absolute; top: 337px; width: 8px; height: 8px; transform: rotate(45deg); border-radius: 2px; opacity: 0; }
  #gd0 { left: 936px; background: #6b7284; }
  #gd1 { left: 241px; background: #3987e5; }

  /* ---- microscaling + weight wall ---- */
  #mscale {
    position: absolute; left: 90px; top: 396px; width: 116px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font: 700 12px ui-monospace, monospace; color: #e0a935;
    border: 1.5px solid rgba(224,169,53,0.8); border-radius: 8px; background: rgba(30,25,12,0.6);
    box-shadow: 0 0 14px rgba(224,169,53,0.45);
    animation: scGlow 2.2s ease-in-out infinite; opacity: 0;
  }
  @keyframes scGlow { 50% { box-shadow: 0 0 26px rgba(224,169,53,0.75); } }
  #mgrid {
    position: absolute; left: 84px; top: 440px;
    display: grid; grid-template-columns: repeat(4, 53px); grid-auto-rows: 32px; gap: 4px;
  }
  .mcell {
    background: #232836; border: 1px solid rgba(224,169,53,0.35); border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font: 600 12.5px ui-monospace, monospace; color: #d8cfae; opacity: 0;
  }
  #mcap { position: absolute; left: 84px; top: 592px; width: 292px; font-size: 11px; color: var(--ink-2); line-height: 1.4; opacity: 0; }

  #wallwrap { position: absolute; left: 396px; top: 376px; width: 310px; height: 230px; opacity: 0; }
  #bitslab { position: absolute; left: 68px; top: 12px; font: 600 10px ui-monospace, monospace; color: var(--ink-2); }
  #wall { position: absolute; left: 0; top: 48px; display: grid; grid-template-columns: repeat(8, 34px); grid-auto-rows: 24px; gap: 3px; }
  .brick { background: rgba(107,114,132,0.28); border: 1px solid #363c4c; border-radius: 3px; }
  #qlab { position: absolute; left: 396px; top: 588px; font: 600 10px ui-monospace, monospace; color: var(--accent); opacity: 0; }
  #ov { position: absolute; inset: 0; pointer-events: none; }
  #ov path { fill: none; stroke-linecap: butt; }
  #qpath { stroke: #2fd6b0; stroke-width: 2; opacity: 0.9; }
  #brk { stroke: rgba(224,169,53,0.55); stroke-width: 1.5; opacity: 0; }

  /* ---- strata under the frozen display ---- */
  .srow { position: absolute; left: 740px; width: 480px; height: 58px; opacity: 0; }
  .srow .slab { font: 700 10px ui-monospace, monospace; letter-spacing: 0.16em; color: #6b7284; text-transform: uppercase; }
  #why { position: absolute; left: 740px; top: 612px; width: 490px; font-size: 11.5px; color: #c7cce0; line-height: 1.4; opacity: 0; }

  #takeaway {
    position: absolute; left: 44px; top: 658px; width: 960px;
    font-size: 17px; font-weight: 800; color: var(--accent); opacity: 0;
  }
  #bridge {
    position: absolute; left: 44px; top: 692px; width: 980px;
    font-size: 12.5px; font-style: italic; color: var(--ink-2); opacity: 0;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Precision Becomes an Architecture Hyperparameter</div>
  <div class="slide-sub">the label freezes — everything underneath it keeps moving</div>

  <svg id="ov" width="1280" height="720">
    <path id="brk" d="M 148 427 L 148 434 M 86 434 L 318 434"/>
    <path id="qpath" d="M 492 597 L 516 596 L 540 598 L 564 596.5 L 588 597.5 L 612 596 L 636 598 L 660 596.5 L 684 597.5 L 706 597"/>
  </svg>

  <div id="disp">
    <div class="plate" id="pl-w" style="left:424px;top:96px;width:76px;height:120px;font-size:56px">W</div>
    <div class="plate" id="pl-a" style="left:678px;top:96px;width:76px;height:120px;font-size:56px">A</div>
  </div>
  <div id="punch"></div>

  <div class="ecard" id="ec0" style="left:151px"></div>
  <div class="ecard" id="ec1" style="left:485px"></div>
  <div class="ecard" id="ec2" style="left:819px"></div>
  <div id="pline">
    <div class="seg" style="width:55%">pretraining</div>
    <div class="seg" style="width:20%">SFT</div>
    <div class="seg" style="width:25%">serving</div>
  </div>
  <div id="plab">when quantization enters →</div>
  <div id="mk"></div><i class="gdot" id="gd0"></i><i class="gdot" id="gd1"></i>

  <div id="mscale">shared scale</div>
  <div id="mgrid"></div>
  <div id="mcap"></div>

  <div id="wallwrap">
    <div id="bitslab">bits / weight</div>
    <div id="wall"></div>
  </div>
  <div id="qlab">quality — flat</div>

  <div id="strata"></div>
  <div id="why"></div>
  <div id="takeaway"></div>
  <div id="bridge"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/quant.js"></script>
<script src="shared/gpus.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  // ---------- split-flap tile (same as slide 16) ----------
  function makeFlap(parent, o) {
    var el = document.createElement("div");
    el.className = "flap " + (o.cls || "");
    el.style.cssText = "left:" + o.x + "px;top:" + o.y + "px;width:" + o.w +
      "px;height:" + o.h + "px;font-size:" + o.fs + "px;";
    el.innerHTML = '<div class="fh ft"><span></span></div><div class="fh fb"><span></span></div>' +
      '<div class="fh fl"><span></span></div><div class="fsplit"></div>';
    parent.appendChild(el);
    var ts = el.children[0].firstChild, bs = el.children[1].firstChild,
        fl = el.children[2], fsp = fl.firstChild;
    var cur = o.text || "";
    ts.textContent = bs.textContent = cur;
    function settle() {
      gsap.killTweensOf(fl);
      ts.textContent = bs.textContent = cur;
      fl.className = "fh fl";
      gsap.set(fl, { autoAlpha: 0, rotationX: 0 });
    }
    var api = { el: el };
    api.setNow = function (t) { cur = t; settle(); };
    api.flip = function (t) {
      if (t === cur) return;
      settle();
      var old = cur; cur = t;
      ts.textContent = t;
      bs.textContent = old;
      fsp.textContent = old;
      fl.className = "fh fl asTop";
      gsap.set(fl, { autoAlpha: 1, rotationX: 0, transformOrigin: "50% 100%" });
      gsap.timeline()
        .to(fl, { rotationX: -88, duration: 0.14, ease: "power1.in" })
        .call(function () {
          fsp.textContent = t;
          fl.className = "fh fl asBot";
          gsap.set(fl, { autoAlpha: 1, rotationX: 88, transformOrigin: "50% 0%" });
        })
        .to(fl, { rotationX: 0, duration: 0.22, ease: "back.out(2.2)" })
        .call(function () { bs.textContent = t; gsap.set(fl, { autoAlpha: 0 }); });
    };
    // mechanical shrug: the flap folds and settles WITHOUT changing — that is the point
    api.wiggle = function () {
      settle();
      fsp.textContent = cur;
      fl.className = "fh fl asTop";
      gsap.set(fl, { autoAlpha: 1, rotationX: 0, transformOrigin: "50% 100%" });
      gsap.timeline()
        .to(fl, { rotationX: -30, duration: 0.13, ease: "power2.out" })
        .to(fl, { rotationX: 0, duration: 0.34, ease: "bounce.out" })
        .call(function () { gsap.set(fl, { autoAlpha: 0 }); });
    };
    return api;
  }

  // ---------- static text ----------
  document.getElementById("punch").textContent = QT.punchline;
  document.getElementById("mcap").textContent = QT.micro;
  document.getElementById("why").textContent = QT.why;
  document.getElementById("takeaway").textContent = QT.takeaway;
  document.getElementById("bridge").textContent = QT.bridge;

  // ---------- the frozen display: W4 A8 ----------
  var disp = document.getElementById("disp");
  var f4 = makeFlap(disp, { x: 508, y: 96, w: 110, h: 120, fs: 64 });
  var f8 = makeFlap(disp, { x: 762, y: 96, w: 110, h: 120, fs: 64 });

  // ---------- era cards ----------
  var EC = ["#6b7284", "#3987e5", "#2fd6b0"];
  QT.timeline.forEach(function (t, i) {
    document.getElementById("ec" + i).innerHTML =
      '<div class="en" style="color:' + EC[i] + '">' + t[0] + "</div>" +
      '<div class="ed">' + t[1] + "</div>" +
      '<div class="ee">' + t[2] + "</div>";
  });

  // ---------- microscaling block: 16 tiny values, ONE scale ----------
  var MV = [7, -3, 1, 5, -6, 2, 4, -1, 0, 3, -2, 6, 1, -5, 2, -4];
  var mg = document.getElementById("mgrid");
  MV.forEach(function (v) {
    var c = document.createElement("div");
    c.className = "mcell";
    c.textContent = v;
    mg.appendChild(c);
  });

  // ---------- weight wall + bits flap ----------
  var wall = document.getElementById("wall");
  for (var i = 0; i < 48; i++) {
    var b = document.createElement("i");
    b.className = "brick";
    wall.appendChild(b);
  }
  var fBits = makeFlap(document.getElementById("wallwrap"), { x: 0, y: 0, w: 60, h: 34, fs: 17 });

  // ---------- strata rows ----------
  var strata = document.getElementById("strata");
  var strataRows = [];
  QT.axes.forEach(function (a, i) {
    var row = document.createElement("div");
    row.className = "srow";
    row.style.top = (402 + i * 70) + "px";
    row.innerHTML = '<div class="slab">' + a[0] + "</div>";
    strata.appendChild(row);
    var f = makeFlap(row, { x: 0, y: 16, w: 360, h: 40, fs: 13.5 });
    strataRows.push({ row: row, f: f, text: a[1] });
  });

  // quality line: prepare draw-on
  var qp = document.getElementById("qpath"), qL = qp.getTotalLength();
  qp.style.strokeDasharray = qL;
  qp.style.strokeDashoffset = qL;

  // ---------- timeline ----------
  var tl = gsap.timeline({ paused: true });

  // beat 1: W4 A8 locks in; the entry point slides ever earlier into training
  tl.fromTo("#disp", { opacity: 0, scale: 0.96, transformOrigin: "648px 156px" },
      { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" })
    .call(function () { f4.flip("4"); })
    .to({}, { duration: 0.16 })
    .call(function () { f8.flip("8"); })
    .fromTo("#pline", { opacity: 0 }, { opacity: 1, duration: 0.4 }, "+=0.3")
    .fromTo("#plab", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "-=0.15")
    .fromTo("#ec0", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" })
    .fromTo("#mk", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2.5)" })
    .to({}, { duration: 0.25 })
    .fromTo("#ec1", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" })
    .to("#mk", { left: 237, backgroundColor: "#3987e5", duration: 0.7, ease: "power2.inOut" })
    .fromTo("#gd0", { opacity: 0 }, { opacity: 0.8, duration: 0.3 }, "<")
    .to({}, { duration: 0.25 })
    .fromTo("#ec2", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" })
    .to("#mk", { left: 753, backgroundColor: "#2fd6b0", duration: 0.6, ease: "power2.inOut" })
    .fromTo("#gd1", { opacity: 0 }, { opacity: 0.8, duration: 0.3 }, "<");
  DECK.markStep(tl);

  // beat 2: the K3 recipe — one shared scale per block; the wall repaints, quality holds
  tl.to("#ec2", { borderColor: "#2fd6b0", boxShadow: "0 0 18px rgba(47,214,176,0.3)", duration: 0.4 })
    .fromTo("#mscale", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" })
    .to("#brk", { opacity: 1, duration: 0.3 })
    .fromTo(".mcell", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.3, stagger: 0.02, ease: "power2.out" })
    .fromTo("#mcap", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .fromTo("#wallwrap", { opacity: 0 }, { opacity: 1, duration: 0.35 }, "-=0.1")
    .call(function () { fBits.flip("16"); })
    .fromTo("#qlab", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "+=0.4")
    .to("#qpath", { strokeDashoffset: 0, duration: 2.4, ease: "none" }, "<")
    .call(function () { fBits.flip("8"); })
    .to(".brick", {
      backgroundColor: "rgba(57,135,229,0.4)", borderColor: "rgba(57,135,229,0.65)",
      duration: 0.5, stagger: { each: 0.006 },
    }, "<0.15")
    .to({}, { duration: 0.55 })
    .call(function () { fBits.flip("4"); })
    .to(".brick", {
      backgroundColor: "rgba(47,214,176,0.45)", borderColor: "rgba(47,214,176,0.7)",
      duration: 0.5, stagger: { each: 0.006 },
    }, "<0.15")
    .to({}, { duration: 0.6 });
  DECK.markStep(tl);

  // beat 3: three strata flip under the frozen label — which flashes but does NOT change
  strataRows.forEach(function (s, i) {
    tl.fromTo(s.row, { opacity: 0, x: 20 }, { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" }, i ? "+=0.25" : "+=0.1")
      .call(function () { s.f.flip(s.text); });
  });
  tl.call(function () { f4.wiggle(); f8.wiggle(); }, null, "+=0.5")
    .to("#disp", { scale: 1.03, duration: 0.16, yoyo: true, repeat: 1, ease: "power2.out" })
    .to("#disp", { filter: "drop-shadow(0 0 16px rgba(47,214,176,0.55))", duration: 0.25, yoyo: true, repeat: 1 }, "<")
    .fromTo("#punch", { opacity: 0, y: -8 }, { opacity: 1, y: 0, duration: 0.45 })
    .fromTo("#why", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 }, "+=0.2");
  DECK.markStep(tl);

  // beat 4: takeaway, then the bridge to MoE
  tl.fromTo("#takeaway", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 })
    .fromTo("#bridge", { opacity: 0 }, { opacity: 1, duration: 0.45 }, "+=0.2");

  DECK.register(tl, {
    reset: function () {
      f4.setNow(""); f8.setNow(""); fBits.setNow("");
      strataRows.forEach(function (s) { s.f.setNow(""); });
    }
  });
</script>
</body>
</html>
