<!DOCTYPE html><html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sparse Attention: Attend to Fewer Tokens</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #map { left: 660px; top: 96px; }
  #mat { position: absolute; left: 116px; top: 158px; opacity: 0; }
  .mrow { display: flex; gap: 3px; margin-bottom: 3px; height: 14px; }
  .mrow i { width: 14px; border-radius: 2.5px; background: rgba(57,135,229,0.4); }
  #matlab { position: absolute; left: 116px; top: 436px; width: 300px; font: 600 11px ui-monospace, monospace; color: #6b7284; opacity: 0; }
  .rline { position: absolute; left: 470px; width: 700px; font: 600 13.5px ui-monospace, monospace; color: var(--ink-2); opacity: 0; line-height: 1.55; }
  #l-window { top: 196px; color: #e0a935; }
  #l-learned { top: 258px; }
  #l-learned b { color: var(--accent); font-weight: 700; }
  #l-evict { top: 320px; color: var(--c-o); }
  #l-trade { top: 392px; color: #ff8a7a; font-weight: 700; font-size: 14.5px; }
  #l-hand { top: 424px; color: #6b7284; font-style: italic; }
  .kseg { position: absolute; top: 6px; bottom: 6px; width: 44px; border-radius: 4px; background: rgba(12,17,22,0.22); }

  /* —— recurring cache bar —— */
  #cbar { position: absolute; left: 90px; top: 552px; width: 1100px; }
  #cbar .cb-lab { font: 700 10.5px ui-monospace, monospace; letter-spacing: 0.14em; color: #e0a935; opacity: 0.75; margin-bottom: 5px; }
  #cbar .cb-box { position: relative; height: 62px; border: 2px solid rgba(201,133,0,0.55); border-radius: 10px; background: rgba(18,20,26,0.6); display: flex; overflow: hidden; }
  #cbar .cb-w { flex: none; width: 300px; display: flex; align-items: center; justify-content: center; font: 700 12px ui-monospace, monospace; color: #e0a935; background: repeating-linear-gradient(90deg, rgba(201,133,0,0.26) 0 7px, rgba(201,133,0,0.12) 7px 14px); border-right: 1.5px solid rgba(201,133,0,0.35); }
  #cbar .cb-kv { flex: none; width: 0; position: relative; display: flex; align-items: center; justify-content: center; font: 800 11.5px ui-monospace, monospace; color: #0c1116; white-space: nowrap; overflow: hidden; background: linear-gradient(180deg, rgba(144,133,233,0.62), #9085e9); }
  #cbar .cb-kv .cb-kvt { position: relative; z-index: 2; }
  #cbar .cb-b { flex: 1; position: relative; }
  #cbar .cb-slots { position: absolute; inset: 0; display: flex; }
  #cbar .cb-slot { flex: 1; border-left: 1.5px dashed rgba(74,80,102,0.55); }
  #cbar .cb-blab { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font: 700 11px ui-monospace, monospace; color: #9aa1b5; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Sparse Attention: Attend to Fewer Tokens</div>
  <div class="slide-sub">keep full attention — just point it at less of the past</div>
  <div id="map"></div>

  <div id="mat"></div>
  <div id="matlab">rows = decode steps · columns = past tokens</div>
  <div class="rline" id="l-window"></div>
  <div class="rline" id="l-learned"></div>
  <div class="rline" id="l-evict"></div>
  <div class="rline" id="l-trade"></div>
  <div class="rline" id="l-hand">→ next: why keep a cache that grows at all?</div>
  <div id="cbar"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("map"), 3);
  document.getElementById("l-window").textContent = EV.sparse.window;
  document.getElementById("l-learned").innerHTML = EV.sparse.learned.replace("NSA", "<b>NSA</b>").replace("MoBA", "<b>MoBA</b>");
  document.getElementById("l-evict").textContent = EV.sparse.evict;
  document.getElementById("l-trade").textContent = EV.sparse.tradeoff;

  // ---- causal matrix, 16 rows ----
  var mat = document.getElementById("mat");
  var N = 16, W = 4, cells = [];   // cells[r][c]
  for (var r = 0; r < N; r++) {
    var row = document.createElement("div");
    row.className = "mrow"; cells.push([]);
    for (var c = 0; c <= r; c++) {
      var i = document.createElement("i");
      row.appendChild(i); cells[r].push(i);
    }
    mat.appendChild(row);
  }
  function inBand(r, c) { return r - c < W; }

  // ---- cache bar (recurring), segmented by token age ----
  var cb = (function () {
    var host = document.getElementById("cbar");
    host.innerHTML = '<div class="cb-lab">HBM · FIXED CAPACITY</div>' +
      '<div class="cb-box"><div class="cb-w">weights</div>' +
      '<div class="cb-kv"><span class="cb-kvt"></span></div>' +
      '<div class="cb-b"><div class="cb-slots"></div><div class="cb-blab"></div></div></div>';
    var api = {
      kv: host.querySelector(".cb-kv"), kvt: host.querySelector(".cb-kvt"),
      blab: host.querySelector(".cb-blab"), slotBox: host.querySelector(".cb-slots"),
      slots: function (n) {
        api.slotBox.innerHTML = "";
        for (var i = 0; i < n; i++) { var d = document.createElement("div"); d.className = "cb-slot"; api.slotBox.appendChild(d); }
      }
    };
    return api;
  })();
  var segs = [];
  for (var si = 0; si < 8; si++) {
    var sg = document.createElement("div");
    sg.className = "kseg"; sg.style.left = (4 + si * 48) + "px";
    cb.kv.appendChild(sg); segs.push(sg);
  }
  function barInit() {
    gsap.set(cb.kv, { width: 390 });
    cb.kvt.textContent = "KV · full history";
    cb.blab.textContent = "batch ×1";
    cb.slots(0);
    gsap.set(segs, { y: 0, opacity: 1 });
  }
  barInit();

  // ---- ambient: a router keeps picking off-band blocks ----
  var picked = [];
  var loop = gsap.timeline({ repeat: -1, paused: true });
  loop.call(function () {
    picked.forEach(function (el) { gsap.to(el, { backgroundColor: "rgba(57,135,229,0.06)", duration: 0.4 }); });
    picked = [];
    for (var k = 0; k < 3; k++) {
      var r = 6 + ((Math.random() * (N - 6)) | 0);
      var c = (Math.random() * (r - W - 1)) | 0;
      [cells[r][c], cells[r][c + 1]].forEach(function (el) {
        if (!el) return;
        picked.push(el);
        gsap.to(el, { backgroundColor: "#2fd6b0", duration: 0.25 });
      });
    }
  }).to({}, { duration: 0.7 });

  var tl = gsap.timeline({ paused: true });

  // step 1: the full n×n bill fades to a sliding-window band
  tl.fromTo("#mat, #matlab", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .fromTo(".mrow i", { opacity: 0 }, { opacity: 1, duration: 0.15, stagger: 0.0035 })
    .to({}, { duration: 0.4 })
    .call(function () {
      for (var r = 0; r < N; r++) for (var c = 0; c <= r; c++)
        if (!inBand(r, c)) gsap.to(cells[r][c], { backgroundColor: "rgba(57,135,229,0.06)", duration: 0.7 });
        else gsap.to(cells[r][c], { backgroundColor: "rgba(224,169,53,0.85)", duration: 0.7 });
    })
    .fromTo("#l-window", { opacity: 0, x: 12 }, { opacity: 1, x: 0, duration: 0.5 });
  DECK.markStep(tl);

  // step 2: learned selection — NSA / MoBA route to a few old blocks
  tl.call(function () { loop.play(0); })
    .fromTo("#l-learned", { opacity: 0, x: 12 }, { opacity: 1, x: 0, duration: 0.5 })
    .to({}, { duration: 1.6 });
  DECK.markStep(tl);

  // step 3: eviction — far-past KV physically leaves the box
  tl.fromTo("#l-evict", { opacity: 0, x: 12 }, { opacity: 1, x: 0, duration: 0.5 })
    .to(segs.slice(0, 5), { y: 74, opacity: 0, duration: 0.5, stagger: 0.11, ease: "power2.in" })
    .call(function () { cb.kvt.textContent = "KV ≤ window"; cb.blab.textContent = "evicted → batch ↑"; cb.slots(6); })
    .to(cb.kv, { width: 130, duration: 0.7, ease: "power2.inOut" });
  DECK.markStep(tl);

  // step 4: the trade-off — selection can miss
  tl.call(function () {
    var el = cells[14][1];
    gsap.fromTo(el, { backgroundColor: "#e04b38" }, { backgroundColor: "rgba(57,135,229,0.06)", duration: 0.55, repeat: 3, ease: "power2.out" });
  })
    .fromTo("#l-trade", { opacity: 0, x: 12 }, { opacity: 1, x: 0, duration: 0.5 })
    .fromTo("#l-hand", { opacity: 0 }, { opacity: 1, duration: 0.45 }, "+=0.3");

  DECK.register(tl, {
    reset: function () {
      loop.pause(0); picked = [];
      gsap.set("#mat, #matlab, .rline", { opacity: 0 });
      for (var r = 0; r < N; r++) for (var c = 0; c <= r; c++) {
        gsap.killTweensOf(cells[r][c]);
        gsap.set(cells[r][c], { opacity: 0, clearProps: "backgroundColor" });
      }
      gsap.set(".rline", { x: 0 });
      barInit();
    }
  });
</script>
</body>
</html>
