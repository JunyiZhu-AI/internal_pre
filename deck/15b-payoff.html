<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attention Line: The Payoff</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<link rel="stylesheet" href="shared/bottlenecks.css">
<style>
  /* the receipt */
  #rcpt { position: absolute; left: 44px; top: 150px; width: 410px; border: 1.5px dashed #3a4054; border-radius: 10px; background: var(--panel); padding: 18px 22px; font-family: ui-monospace, monospace; opacity: 0; }
  #rcpt .rh { font-size: 12px; font-weight: 800; color: #9aa1b5; letter-spacing: 0.08em; text-align: center; }
  #rcpt .rsep { border-top: 1.5px dashed #3a4054; margin: 12px 0; }
  .rrow { display: flex; align-items: baseline; gap: 8px; margin: 13px 0; opacity: 0; }
  .rrow .rn { font-size: 13.5px; font-weight: 700; }
  .rrow .dots { flex: 1; border-bottom: 2px dotted #3a4054; transform: translateY(-3px); }
  .rrow .rv { font-size: 15px; font-weight: 800; }
  #rtotal { display: flex; align-items: baseline; gap: 8px; opacity: 0; }
  #rtotal .rn { font-size: 13.5px; font-weight: 700; color: #e8eaf0; }
  #rtotal .dots { flex: 1; border-bottom: 2px dotted #3a4054; transform: translateY(-3px); }
  #rtotal .rv { font-size: 15px; font-weight: 800; color: var(--accent); }
  /* K3 numbers */
  #kvcut { position: absolute; left: 540px; top: 166px; font: 700 13px ui-monospace, monospace; color: #e0a935; border: 1.5px solid rgba(201,133,0,0.6); border-radius: 999px; padding: 7px 15px; background: var(--panel); opacity: 0; white-space: nowrap; }
  #badge { position: absolute; left: 540px; top: 222px; opacity: 0; }
  #badge .bnum { font: 800 74px ui-monospace, monospace; color: var(--accent); line-height: 1; text-shadow: 0 0 30px rgba(47,214,176,0.45); }
  #badge .bnum span { font-size: 44px; }
  #badge .blab { font: 600 13px ui-monospace, monospace; color: var(--ink-2); margin-top: 6px; }
  #quality { position: absolute; left: 870px; top: 252px; width: 330px; font: 700 12.5px ui-monospace, monospace; color: var(--accent); border: 1.5px solid rgba(47,214,176,0.55); border-radius: 10px; padding: 9px 13px; background: var(--panel); opacity: 0; line-height: 1.5; }
  #sim { left: 540px; top: 368px; width: 640px; height: 212px; opacity: 0; }
  #bridge { position: absolute; left: 44px; bottom: 30px; width: 940px; font-size: 16px; font-weight: 700; color: var(--accent); opacity: 0; }
</style></head>
<body>
<div class="stage">
  <div class="slide-title">Attention Line: The Payoff</div>
  <div class="slide-sub">the formula's seven-year journey, cashed out on K3</div>
  <div id="strip"></div>

  <div id="rcpt">
    <div class="rh">THE ATTENTION LINE · KV bytes / token</div>
    <div class="rsep"></div>
    <div id="rows"></div>
    <div class="rsep"></div>
    <div id="rtotal"><span class="rn">context scaling</span><span class="dots"></span><span class="rv">FIXED</span></div>
  </div>

  <div id="kvcut"></div>
  <div id="badge"><div class="bnum"><b id="bn">1.0</b><span> ×</span></div><div class="blab"></div></div>
  <div id="quality"></div>
  <div id="sim"></div>
  <div id="bridge"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/bottlenecks.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("strip"), 6);
  var strip = document.getElementById("strip");
  strip.style.left = "660px"; strip.style.top = "96px";

  var COLORS = { "MHA": "#6b7284", "GQA": "#3987e5", "MLA": "#6fb1ff", "hybrid-KDA": "#e04b38" };
  var WARN = { "MLA": true, "hybrid-KDA": true };
  var rows = document.getElementById("rows");
  EV.payoff.ladder.forEach(function (r) {
    var d = document.createElement("div");
    d.className = "rrow";
    d.innerHTML = '<span class="rn" style="color:' + COLORS[r[0]] + '">' + r[0] + '</span><span class="dots"></span>' +
      '<span class="rv" style="color:' + COLORS[r[0]] + '">' + r[1] + (WARN[r[0]] ? " ⚠" : "") + "</span>";
    rows.appendChild(d);
  });

  document.getElementById("kvcut").textContent = EV.payoff.kvcut;
  document.querySelector("#badge .blab").textContent = EV.payoff.speedLabel.replace(/^×\s*/, "");
  document.getElementById("quality").textContent = EV.payoff.quality;
  document.getElementById("bridge").textContent = EV.payoff.bridge;

  var sim = BN.buildSim(document.getElementById("sim"), {});
  var bn = document.getElementById("bn");
  var spd = { v: 1 };

  var tl = gsap.timeline({ paused: true });

  // step 1: the ladder sweeps down
  tl.fromTo("#rcpt", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45 });
  document.querySelectorAll(".rrow").forEach(function (r) {
    tl.fromTo(r, { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" }, "+=0.12")
      .fromTo(r, { backgroundColor: "rgba(47,214,176,0.14)" }, { backgroundColor: "rgba(0,0,0,0)", duration: 0.5 }, "<");
  });
  DECK.markStep(tl);

  // step 2: K3's bill — 75% less cache, decode 6.3× faster, live
  tl.fromTo("#kvcut", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#sim", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .call(function () { sim.start(); })
    .to({}, { duration: 1.2 })
    .fromTo("#badge", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.8)" })
    .fromTo(spd, { v: 1 }, {
      v: 6.3, duration: 2.4, ease: "power2.in",
      onUpdate: function () {
        bn.textContent = spd.v.toFixed(1);
        sim.setSpeed(+spd.v.toFixed(2));
      }
    })
    .to("#badge .bnum", { scale: 1.12, duration: 0.18, yoyo: true, repeat: 1, transformOrigin: "left bottom" });
  DECK.markStep(tl);

  // step 3: no quality tax
  tl.fromTo("#quality", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 });
  DECK.markStep(tl);

  // step 4: the receipt total — and the bridge to the next section
  tl.fromTo("#rtotal", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .fromTo("#rtotal .rv", { scale: 2.2, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.6)", transformOrigin: "center" })
    .fromTo("#bridge", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.5 });

  DECK.register(tl, {
    reset: function () {
      sim.stop();
      sim.setSpeed(1);
      bn.textContent = "1.0";
    }
  });
</script>
</body></html>
