<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantization: Decoding the Notation</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  /* ---- split-flap component ---- */
  .flap {
    position: absolute; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-weight: 700; perspective: 520px;
  }
  .fh {
    position: absolute; left: 0; width: 100%; height: 50%; overflow: hidden;
    background: linear-gradient(180deg, #1e2330, #171b26);
  }
  .fh span {
    position: absolute; left: 0; top: 0; width: 100%; height: 200%;
    display: flex; align-items: center; justify-content: center;
    color: #f3f5fa; letter-spacing: 0.02em;
  }
  .ft { top: 0; border-radius: 9px 9px 0 0; border: 1px solid #313749; border-bottom: none; }
  .fb {
    bottom: 0; border-radius: 0 0 9px 9px; border: 1px solid #272c3a; border-top: none;
    background: linear-gradient(180deg, #141824, #10131c);
  }
  .fb span { top: -100%; }
  .fl { top: 0; z-index: 3; backface-visibility: hidden; visibility: hidden; }
  .fl.asTop {
    border-radius: 9px 9px 0 0; border: 1px solid #313749; border-bottom: none;
    background: linear-gradient(180deg, #212736, #1a1e2b);
  }
  .fl.asBot {
    top: 50%; border-radius: 0 0 9px 9px; border: 1px solid #272c3a; border-top: none;
    background: linear-gradient(180deg, #161a26, #10131c);
  }
  .fl.asBot span { top: -100%; }
  .fsplit {
    position: absolute; left: 0; right: 0; top: 50%; height: 2px; margin-top: -1px;
    background: #0b0d12; z-index: 4;
  }
  .plate {
    position: absolute; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 700;
    border-radius: 9px; border: 1px solid #2a2e3b;
    background: linear-gradient(180deg, #1a1f2b, #12151e);
    display: flex; align-items: center; justify-content: center; color: #9aa1b5;
  }
  .plate:after {
    content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 2px;
    margin-top: -1px; background: #0b0d12;
  }

  #disp { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
  #headline {
    position: absolute; left: 64px; top: 254px;
    font: 600 14px ui-monospace, monospace; color: #e8eaf0; opacity: 0;
  }
  #etiq {
    position: absolute; left: 64px; top: 278px; width: 590px;
    font-size: 11px; font-style: italic; color: var(--ink-2); opacity: 0;
  }

  /* ---- consequence rig ---- */
  #rig { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
  #cap {
    position: absolute; left: 74px; top: 330px; width: 92px; height: 158px;
    border: 2px solid rgba(201,133,0,0.7); border-radius: 9px;
  }
  #cap .cl {
    position: absolute; left: 8px; right: 8px; height: 24px; border-radius: 4px;
    background: linear-gradient(rgba(201,133,0,0.4), rgba(201,133,0,0.85));
    animation: qGlow 2.6s ease-in-out infinite;
  }
  @keyframes qGlow { 50% { filter: brightness(0.55); } }
  #cap .hlab { position: absolute; bottom: 5px; width: 100%; text-align: center; font: 700 10.5px ui-monospace, monospace; color: #e0a935; }
  #pipe {
    position: absolute; left: 176px; top: 394px; width: 210px; height: 30px;
    border: 2px solid rgba(47,214,176,0.55); border-radius: 10px; overflow: hidden;
  }
  #pipe i {
    position: absolute; top: 50%; width: 6px; height: 6px; margin-top: -3px;
    border-radius: 50%; background: #2fd6b0; animation: qFlow 1.15s linear infinite;
  }
  #pipe i:nth-child(2) { animation-delay: 0.23s; }
  #pipe i:nth-child(3) { animation-delay: 0.46s; }
  #pipe i:nth-child(4) { animation-delay: 0.69s; }
  #pipe i:nth-child(5) { animation-delay: 0.92s; }
  @keyframes qFlow { from { left: -8px; } to { left: 212px; } }
  #pipelab { position: absolute; left: 240px; top: 436px; font: 600 10px ui-monospace, monospace; color: #2fd6b0; }
  #chip {
    position: absolute; left: 396px; top: 330px; width: 132px; height: 158px;
    border: 2.5px solid #3a4152; border-radius: 10px; background: #0d1420;
    filter: grayscale(1) brightness(0.62);
  }
  #chip .tiles {
    position: absolute; inset: 10px 10px 30px; display: grid; gap: 3px;
    grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr);
  }
  #chip .tiles i { background: rgba(57,135,229,0.22); border-radius: 2px; animation: qTw 2.6s ease-in-out infinite; }
  #chip .tiles i:nth-child(3n) { animation-delay: 0.5s; }
  #chip .tiles i:nth-child(4n) { animation-delay: 1.1s; }
  #chip .tiles i:nth-child(5n) { animation-delay: 1.7s; background: rgba(57,135,229,0.34); }
  @keyframes qTw { 50% { background: rgba(111,177,255,0.6); } }
  #chip .dlab { position: absolute; bottom: 7px; width: 100%; text-align: center; font: 600 11px ui-monospace, monospace; color: #9ec7f5; }
  #abadge {
    position: absolute; left: 366px; top: 494px; width: 192px; text-align: center;
    font: 700 12px ui-monospace, monospace; border: 1.5px solid; border-radius: 999px;
    padding: 4px 0; opacity: 0;
  }
  .badge.grey { color: #9aa1b5; border-color: #3a4152; background: rgba(27,30,39,0.85); }
  .badge.blue { color: #6fb1ff; border-color: #3987e5; background: rgba(13,20,32,0.92); box-shadow: 0 0 14px rgba(57,135,229,0.35); }
  #zerosp {
    position: absolute; left: 366px; top: 524px; width: 192px; text-align: center;
    font: 700 10px ui-monospace, monospace; color: #ff8a7a; opacity: 0;
  }

  #wires { position: absolute; inset: 0; pointer-events: none; }
  #wires path { fill: none; stroke-width: 2.5; stroke-linecap: butt; opacity: 0.85; }

  .tg {
    position: absolute; font: 700 11px ui-monospace, monospace; opacity: 0;
    text-shadow: 0 2px 8px #000; white-space: nowrap; z-index: 6;
  }
  #tg-bw   { left: 196px; top: 366px; color: #2fd6b0; }
  #tg-cap  { left: 60px;  top: 306px; color: #e0a935; }
  #tg-comp { left: 398px; top: 304px; color: #6fb1ff; }

  #dials { position: absolute; left: 64px; top: 538px; width: 594px; font-size: 11px; line-height: 1.35; }
  #wt1 { color: #c7cce0; opacity: 0; }
  #wt2 { color: #2fd6b0; margin: 3px 0 9px; opacity: 0; }
  #at1 { color: #c7cce0; opacity: 0; }
  #at2 { color: #6fb1ff; margin-top: 3px; opacity: 0; }
  #kvrow { position: absolute; left: 64px; top: 630px; width: 594px; height: 28px; opacity: 0; }
  #kvtext { position: absolute; left: 60px; top: 6px; font-size: 10.5px; color: #b0a8ef; }
  #caveat {
    position: absolute; left: 64px; top: 672px; width: 645px;
    font-size: 12px; font-style: italic; color: #ff8a7a; opacity: 0;
  }

  /* ---- taxonomy column ---- */
  #tax { position: absolute; left: 660px; top: 102px; width: 576px; height: 404px; }
  #taxhead { font: 700 10.5px ui-monospace, monospace; letter-spacing: 0.18em; color: #6b7284; opacity: 0; }
  .qrow { position: absolute; left: 0; width: 576px; height: 58px; opacity: 0; }
  .qmeta { position: absolute; left: 132px; top: 6px; width: 444px; }
  .qm { font: 600 12px ui-monospace, monospace; color: #c7cce0; }
  .qb {
    font: 700 9.5px ui-monospace, monospace; border: 1px solid; border-radius: 999px;
    padding: 1px 7px; margin-left: 6px; position: relative; top: -1px; white-space: nowrap;
  }
  .qn { font-size: 10.5px; color: var(--ink-2); margin-top: 3px; }
  .fq .fh span { color: #2fd6b0; }
  .fkv .fh span { color: #9085e9; }

  /* ---- B200 ceilings panel ---- */
  #b200 {
    position: absolute; left: 660px; top: 524px; width: 576px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 14px; opacity: 0;
  }
  #b200 .bh { font-size: 11.5px; color: #c7cce0; line-height: 1.35; }
  .prow { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
  .prow .pl { width: 40px; font: 700 11.5px ui-monospace, monospace; }
  .prow .pbar { height: 13px; border-radius: 3px; transform-origin: left; display: block; }
  .prow .pv { font: 600 11px ui-monospace, monospace; color: #c7cce0; opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Quantization: Decoding the Notation</div>
  <div class="slide-sub">two dials on one matmul — which budget does each one pay?</div>

  <svg id="wires" width="1280" height="720">
    <path id="ln-cap" d="M 205 242 C 175 285, 140 302, 118 330" stroke="#e0a935"/>
    <path id="ln-bw"  d="M 240 242 C 258 300, 272 345, 280 394" stroke="#2fd6b0"/>
    <path id="ln-a"   d="M 500 242 C 490 275, 472 298, 462 330" stroke="#3987e5"/>
    <path id="ln-kv"  d="M 78 632 C 40 576, 44 522, 96 492" stroke="#9085e9"/>
  </svg>

  <div id="disp">
    <div class="plate" id="pl-w" style="left:64px;top:118px;width:76px;height:120px;font-size:56px">W</div>
    <div class="plate" id="pl-a" style="left:356px;top:118px;width:76px;height:120px;font-size:56px">A</div>
  </div>
  <div id="headline"></div>
  <div id="etiq"></div>

  <div id="rig">
    <div id="cap">
      <i class="cl" style="top:12px"></i>
      <i class="cl" style="top:42px; animation-delay:0.4s"></i>
      <i class="cl" style="top:72px; animation-delay:0.8s"></i>
      <i class="cl" style="top:102px; animation-delay:1.2s"></i>
      <span class="hlab">HBM</span>
    </div>
    <div id="pipe"><i></i><i></i><i></i><i></i><i></i></div>
    <div id="pipelab">bandwidth</div>
    <div id="chip"><div class="dlab">Tensor cores</div></div>
    <div id="abadge" class="badge grey">FP16 — unchanged</div>
    <div id="zerosp">zero compute speedup</div>
  </div>

  <div class="tg" id="tg-bw">bytes / token ↓</div>
  <div class="tg" id="tg-cap">footprint ↓</div>
  <div class="tg" id="tg-comp">INT8 compute ✓</div>

  <div id="dials">
    <div id="wt1"></div><div id="wt2"></div><div id="at1"></div><div id="at2"></div>
  </div>
  <div id="kvrow"><div id="kvtext"></div></div>
  <div id="caveat"></div>

  <div id="tax"><div id="taxhead">THE WxAy FAMILY</div></div>
  <div id="b200"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/quant.js"></script>
<script src="shared/gpus.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  // ---------- split-flap tile ----------
  function makeFlap(parent, o) {
    var el = document.createElement("div");
    el.className = "flap " + (o.cls || "");
    el.style.cssText = "left:" + o.x + "px;top:" + o.y + "px;width:" + o.w +
      "px;height:" + o.h + "px;font-size:" + o.fs + "px;";
    el.innerHTML = '<div class="fh ft"><span></span></div><div class="fh fb"><span></span></div>' +
      '<div class="fh fl"><span></span></div><div class="fsplit"></div>';
    parent.appendChild(el);
    var ts = el.children[0].firstChild, bs = el.children[1].firstChild,
        fl = el.children[2], fsp = fl.firstChild;
    var cur = o.text || "";
    ts.textContent = bs.textContent = cur;
    function settle() {
      gsap.killTweensOf(fl);
      ts.textContent = bs.textContent = cur;
      fl.className = "fh fl";
      gsap.set(fl, { autoAlpha: 0, rotationX: 0 });
    }
    var api = { el: el };
    api.setNow = function (t) { cur = t; settle(); };
    api.flip = function (t) {
      if (t === cur) return;
      settle();
      var old = cur; cur = t;
      ts.textContent = t;      // revealed behind the falling flap
      bs.textContent = old;    // replaced when the rising flap lands
      fsp.textContent = old;
      fl.className = "fh fl asTop";
      gsap.set(fl, { autoAlpha: 1, rotationX: 0, transformOrigin: "50% 100%" });
      gsap.timeline()
        .to(fl, { rotationX: -88, duration: 0.14, ease: "power1.in" })
        .call(function () {
          fsp.textContent = t;
          fl.className = "fh fl asBot";
          gsap.set(fl, { autoAlpha: 1, rotationX: 88, transformOrigin: "50% 0%" });
        })
        .to(fl, { rotationX: 0, duration: 0.22, ease: "back.out(2.2)" })
        .call(function () { bs.textContent = t; gsap.set(fl, { autoAlpha: 0 }); });
    };
    return api;
  }

  // ---------- static text from shared data ----------
  document.getElementById("headline").textContent = QT.headline;
  document.getElementById("etiq").textContent = QT.etiquette;
  document.getElementById("wt1").textContent = QT.wDial.what;
  document.getElementById("wt2").textContent = QT.wDial.buys;
  document.getElementById("at1").textContent = QT.aDial.what;
  document.getElementById("at2").textContent = QT.aDial.buys;
  document.getElementById("kvtext").textContent = QT.kvDial.what + " — " + QT.kvDial.buys;
  document.getElementById("caveat").textContent = QT.caveat;

  // ---------- big display ----------
  var disp = document.getElementById("disp");
  var fW = makeFlap(disp, { x: 148, y: 118, w: 148, h: 120, fs: 62 });
  var fA = makeFlap(disp, { x: 440, y: 118, w: 148, h: 120, fs: 62 });

  // chip tiles
  (function () {
    var t = document.createElement("div");
    t.className = "tiles";
    for (var i = 0; i < 30; i++) t.appendChild(document.createElement("i"));
    document.getElementById("chip").insertBefore(t, document.getElementById("chip").firstChild);
  })();

  var capLayers = document.querySelectorAll("#cap .cl");

  // KV flap
  var fKV = makeFlap(document.getElementById("kvrow"), { x: 0, y: 0, w: 48, h: 26, fs: 12, cls: "fkv" });

  // ---------- taxonomy rows ----------
  var BUYC = ["#2fd6b0", "#3987e5", "#3987e5", "#e0a935", "#2fd6b0", "#9085e9"];
  var tax = document.getElementById("tax");
  var taxRows = [];
  QT.rows.forEach(function (r, i) {
    var quoted = r[0].charAt(0) === "“";
    var row = document.createElement("div");
    row.className = "qrow";
    row.style.top = (22 + i * 64) + "px";
    row.innerHTML = '<div class="qmeta"><div class="qm">' + r[1] +
      ' <span class="qb" style="color:' + BUYC[i] + ';border-color:' + BUYC[i] + '66">' + r[2] + "</span></div>" +
      '<div class="qn">' + r[3] + "</div></div>";
    tax.appendChild(row);
    var cls = quoted ? "fq" : (i === 5 ? "fkv" : "");
    var f = makeFlap(row, { x: 0, y: 8, w: 116, h: 38, fs: 13.5, cls: cls });
    taxRows.push({ row: row, f: f, name: r[0], quoted: quoted });
  });

  // ---------- B200 ceilings panel ----------
  (function () {
    var PC = ["#3987e5", "#6fb1ff", "#2fd6b0"];
    var pn = document.getElementById("b200");
    pn.innerHTML = '<div class="bh">' + QT.b200 + "</div>";
    GPUS.precision.forEach(function (p, i) {
      var w = Math.round(p[1] / 9000 * 320);
      pn.insertAdjacentHTML("beforeend",
        '<div class="prow"><span class="pl" style="color:' + PC[i] + '">' + p[0] + "</span>" +
        '<i class="pbar" style="width:' + w + "px;background:linear-gradient(90deg," + PC[i] + "44," + PC[i] + ')"></i>' +
        '<span class="pv">' + p[1].toLocaleString() + " TFLOPS</span></div>");
    });
  })();

  // consequence lines: prepare draw-on
  ["ln-cap", "ln-bw", "ln-a", "ln-kv"].forEach(function (id) {
    var p = document.getElementById(id), L = p.getTotalLength();
    p.style.strokeDasharray = L;
    p.style.strokeDashoffset = L;
  });

  var abadge = document.getElementById("abadge");
  function setBadgeBlue() { abadge.textContent = "INT8 tensor cores"; abadge.className = "badge blue"; }
  function setBadgeGrey() { abadge.textContent = "FP16 — unchanged"; abadge.className = "badge grey"; }

  // ---------- timeline ----------
  var tl = gsap.timeline({ paused: true });

  // beat 1: the notation is the hero — display flips on, rig assembles idle
  tl.fromTo("#disp", { opacity: 0, scale: 0.96, transformOrigin: "330px 178px" },
      { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" })
    .call(function () { fW.flip("16"); })
    .to({}, { duration: 0.16 })
    .call(function () { fA.flip("16"); })
    .fromTo("#headline", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 }, "+=0.3")
    .fromTo("#etiq", { opacity: 0 }, { opacity: 1, duration: 0.35 }, "-=0.1")
    .fromTo("#rig", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" });
  DECK.markStep(tl);

  // beat 2: turn W — 16 → 8 → 4. Pipe narrows, footprint shrinks, compute unmoved.
  tl.to("#pl-w", { color: "#2fd6b0", borderColor: "rgba(47,214,176,0.5)", duration: 0.35 })
    .to("#ln-cap", { strokeDashoffset: 0, duration: 0.4, ease: "power2.out" }, "<")
    .to("#ln-bw", { strokeDashoffset: 0, duration: 0.4, ease: "power2.out" }, "<0.12")
    .call(function () { fW.flip("8"); })
    .to("#pipe", { height: 18, top: 400, duration: 0.5, ease: "power2.inOut" }, "+=0.15")
    .to([capLayers[0], capLayers[1]], { opacity: 0.1, duration: 0.45 }, "<")
    .fromTo("#tg-bw", { opacity: 0 }, { opacity: 1, duration: 0.12, yoyo: true, repeat: 3 }, "<")
    .fromTo("#tg-cap", { opacity: 0 }, { opacity: 1, duration: 0.12, yoyo: true, repeat: 3 }, "<0.06")
    .to({}, { duration: 0.4 })
    .call(function () { fW.flip("4"); })
    .to("#pipe", { height: 10, top: 404, duration: 0.5, ease: "power2.inOut" }, "+=0.15")
    .to(capLayers[2], { opacity: 0.1, duration: 0.45 }, "<")
    .fromTo("#tg-bw", { opacity: 0 }, { opacity: 1, duration: 0.12, yoyo: true, repeat: 3 }, "<")
    .fromTo("#tg-cap", { opacity: 0 }, { opacity: 1, duration: 0.12, yoyo: true, repeat: 3 }, "<0.06")
    .fromTo("#wt1", { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.35 })
    .fromTo("#wt2", { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.35 }, "-=0.15")
    .fromTo("#abadge", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.5)" })
    .fromTo("#zerosp", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "-=0.1")
    .to("#chip", { x: 6, duration: 0.06, yoyo: true, repeat: 5 })
    .to("#chip", { x: 0, duration: 0.08 });
  DECK.markStep(tl);

  // beat 3: turn A — the compute line fires; taxonomy assembles; KV feeds capacity
  tl.to("#pl-a", { color: "#6fb1ff", borderColor: "rgba(57,135,229,0.55)", duration: 0.35 })
    .to("#ln-a", { strokeDashoffset: 0, duration: 0.4, ease: "power2.out" }, "<")
    .call(function () { fA.flip("8"); })
    .to("#chip", {
      filter: "grayscale(0) brightness(1)", borderColor: "#3987e5",
      boxShadow: "0 0 24px rgba(57,135,229,0.45)", duration: 0.5,
    }, "+=0.15")
    .to("#zerosp", { opacity: 0, duration: 0.25 }, "<")
    .call(setBadgeBlue)
    .to("#abadge", { scale: 1.12, duration: 0.15, yoyo: true, repeat: 1 })
    .fromTo("#tg-comp", { opacity: 0 }, { opacity: 1, duration: 0.12, yoyo: true, repeat: 3 }, "<")
    .fromTo("#at1", { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.35 })
    .fromTo("#at2", { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.35 }, "-=0.15")
    .fromTo("#taxhead", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "+=0.2");
  taxRows.forEach(function (t, i) {
    tl.fromTo(t.row, { opacity: 0, x: 22 }, { opacity: 1, x: 0, duration: 0.3, ease: "power2.out" }, i ? "-=0.08" : "+=0.05")
      .call(function () { t.f.flip(t.name); });
    if (t.quoted) tl.to("#etiq", { color: "#2fd6b0", duration: 0.18, yoyo: true, repeat: 1 }, "-=0.05");
  });
  tl.fromTo("#kvrow", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "+=0.2")
    .call(function () { fKV.flip("KV"); })
    .to("#ln-kv", { strokeDashoffset: 0, duration: 0.45, ease: "power2.out" })
    .to("#cap", { borderColor: "#9085e9", duration: 0.25, yoyo: true, repeat: 1 });
  DECK.markStep(tl);

  // beat 4: the regime caveat + B200's three ceilings (saved for this moment)
  tl.fromTo("#caveat", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 })
    .fromTo("#b200", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45 }, "+=0.15")
    .fromTo(".pbar", { scaleX: 0 }, { scaleX: 1, duration: 0.6, stagger: 0.16, ease: "power2.out" })
    .fromTo(".pv", { opacity: 0 }, { opacity: 1, duration: 0.3, stagger: 0.16 }, "<0.25");

  DECK.register(tl, {
    reset: function () {
      fW.setNow(""); fA.setNow(""); fKV.setNow("");
      taxRows.forEach(function (t) { t.f.setNow(""); });
      setBadgeGrey();
    }
  });
</script>
</body>
</html>
