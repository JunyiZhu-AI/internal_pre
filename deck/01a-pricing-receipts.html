<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The K3 pricing paradox — receipts</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  .receipt {
    position: absolute; top: 118px; width: 188px;
    background: #f4f1ea; color: #23211c;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11.5px;
    padding: 13px 13px 16px; border-radius: 3px 3px 0 0;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 6px),
      95% 100%, 85% calc(100% - 6px), 75% 100%, 65% calc(100% - 6px), 55% 100%,
      45% calc(100% - 6px), 35% 100%, 25% calc(100% - 6px), 15% 100%, 5% calc(100% - 6px), 0 100%);
    box-shadow: 0 10px 26px rgba(0,0,0,0.5);
  }
  .receipt h3 { margin: 0 0 2px; font-size: 13px; text-align: center; letter-spacing: 0.06em; }
  .receipt .rsub { text-align: center; font-size: 9.5px; color: #8a857a; margin-bottom: 7px; }
  .receipt .sep { border-top: 1.5px dashed #b9b3a6; margin: 7px 0; }
  .rrow { display: flex; justify-content: space-between; padding: 2.5px 0; position: relative; }
  .rrow b { font-weight: 700; }
  .rmode { position: relative; }
  .rmode .task-lines { position: absolute; inset: 0; opacity: 0; }
  .rtotal { text-align: center; margin-top: 6px; }
  .rtotal .tlab { font-size: 9.5px; color: #8a857a; }
  .rtotal .tval { font-size: 21px; font-weight: 800; }
  .receipt .accentbar { height: 4px; border-radius: 2px; margin-bottom: 8px; }
  .stamp {
    position: absolute; font-weight: 800; font-size: 13px; letter-spacing: 0.04em;
    border: 2.5px solid #c0392b; color: #c0392b; padding: 3px 8px; border-radius: 4px;
    transform: rotate(-9deg); opacity: 0; background: rgba(244,241,234,0.6); z-index: 5;
  }
  .conv {
    position: absolute; top: 508px; left: 60px; width: 380px; text-align: center;
    font-size: 14px; color: var(--accent); font-weight: 700; opacity: 0;
  }
  .qbadge {
    position: absolute; right: -21px; top: 0px; width: 17px; height: 17px; border-radius: 50%;
    background: var(--accent); color: #0c1116; font-weight: 800; font-size: 12px;
    display: flex; align-items: center; justify-content: center; opacity: 0; z-index: 6;
    font-family: -apple-system, sans-serif;
  }
  #bench {
    position: absolute; right: 44px; top: 118px; width: 520px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px 20px 12px; opacity: 0;
  }
  #bench h3 { margin: 0 0 4px; font-size: 15px; }
  #legend { display: flex; gap: 14px; font-size: 11px; color: var(--ink-2); margin-bottom: 10px; }
  #legend .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .brow { margin-bottom: 7px; }
  .brow .btop { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--ink-2); margin-bottom: 3px; }
  .brow .tag { font-size: 9.5px; padding: 1px 7px; border-radius: 999px; }
  .tag.independent { background: rgba(47,214,176,0.12); color: var(--accent); }
  .tag.vendor-run { background: rgba(201,133,0,0.14); color: #e0a935; }
  .tag.arena { background: rgba(144,133,233,0.14); color: var(--c-o); }
  .bars { display: flex; flex-direction: column; gap: 2px; }
  .bar { height: 7px; border-radius: 2px 4px 4px 2px; position: relative; }
  .bar .bval {
    position: absolute; left: calc(100% + 7px); top: -3.5px; font-size: 10.5px;
    font-family: ui-monospace, monospace; color: var(--ink-2); white-space: nowrap;
  }
  .bar .bval.win { color: #fff; font-weight: 700; }
  #footnote { font-size: 10px; color: #6b7284; margin-top: 8px; line-height: 1.45; }
  #quote {
    position: absolute; left: 60px; top: 545px; width: 560px;
    font-size: 15.5px; font-style: italic; color: #c7cce0; opacity: 0; line-height: 1.5;
  }
  #quote .by { font-size: 12px; color: var(--ink-2); font-style: normal; }
  #qs { position: absolute; right: 44px; top: 460px; width: 520px; display: flex; flex-direction: column; gap: 9px; }
  .qchip {
    background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 9px 13px; font-size: 13.5px; opacity: 0;
  }
  .qchip .qn { color: var(--accent); font-weight: 700; margin-right: 7px; font-family: ui-monospace, monospace; }
  #promise {
    position: absolute; left: 44px; bottom: 58px; width: 700px;
    font-size: 15px; color: var(--accent); opacity: 0; font-weight: 600;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Half the price. The same bill.</div>
  <div class="slide-sub">Kimi K3 vs the frontier — official rate cards, July 2026</div>

  <div id="receipts"></div>
  <div class="stamp" id="st1" style="left:160px; top:210px">−40% vs Sol</div>
  <div class="stamp" id="st2" style="left:130px; top:250px">−70% vs Fable</div>
  <div class="conv" id="conv">— ≈ same bill —</div>

  <div id="bench">
    <h3>…and the capability gap? <span style="font-weight:400; font-size:12px; color:var(--ink-2)">near-tie at the top</span></h3>
    <div id="legend"></div>
    <div id="brows"></div>
    <div id="footnote"></div>
  </div>

  <div id="quote"></div>
  <div id="qs"></div>
  <div id="promise"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/pricing.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  var M = PRICING.models;
  var $ = PRICING.fmt$;

  // ---- receipts ----
  var host = document.getElementById("receipts");
  M.forEach(function (m, i) {
    var r = document.createElement("div");
    r.className = "receipt"; r.id = "rc-" + m.key;
    r.style.left = (60 + i * 206) + "px";
    r.innerHTML =
      '<div class="accentbar" style="background:' + m.color + '"></div>' +
      "<h3>" + m.name.toUpperCase() + "</h3>" +
      '<div class="rsub">official rate card · /1M tok</div>' +
      '<div class="sep"></div>' +
      '<div class="rmode">' +
      '<div class="list-lines">' +
      '<div class="rrow"><span>input</span><b>' + $(m.input) + "</b></div>" +
      '<div class="rrow rrow-cached"><span>cached input</span><b>' + $(m.cached) + "</b></div>" +
      '<div class="rrow rrow-output"><span>output (incl. reasoning)</span></div>' +
      '<div class="rrow"><span></span><b style="font-size:14px">' + $(m.output) + "</b></div>" +
      '<div class="sep"></div>' +
      '<div class="rrow"><span>context</span><b>' + m.ctx + "</b></div>" +
      '<div class="rrow rrow-open"><span>open weights</span><b>' + m.open + "</b></div>" +
      "</div>" +
      '<div class="task-lines">' +
      '<span class="qbadge qb3" style="right:-6px; top:-64px">?</span>' +
      '<div class="rrow"><span>output ' + m.outTokens + "k × " + $(m.output) + "</span><b>" + $(m.outTokens / 1000 * m.output) + '</b><span class="qbadge qb1">?</span></div>' +
      '<div class="rrow"><span>input (mostly cached)</span><b>' + $(m.inCost) + '</b><span class="qbadge qb2">?</span></div>' +
      '<div class="sep"></div>' +
      '<div class="rrow" style="font-size:10px; color:#8a857a"><span>same task, measured</span></div>' +
      "</div>" +
      "</div>" +
      '<div class="rtotal"><div class="tlab" id="tlab-' + m.key + '">list rates</div>' +
      '<div class="tval" id="tval-' + m.key + '">/1M tok</div></div>';
    host.appendChild(r);
  });

  // ---- benchmark panel ----
  var legend = document.getElementById("legend");
  M.forEach(function (m) {
    legend.innerHTML += '<span><span class="dot" style="background:' + m.color + '"></span>' + m.name + "</span>";
  });
  var brows = document.getElementById("brows");
  PRICING.bench.forEach(function (b) {
    var d = document.createElement("div");
    d.className = "brow";
    var barsHtml = "";
    if (b.max) {
      M.forEach(function (m, i) {
        barsHtml += '<div class="bar" style="background:' + m.color + '" data-w="' + (b.vals[i] / b.max * 380) + '">' +
          '<span class="bval' + (i === b.best ? " win" : "") + '">' + b.vals[i].toFixed(1) + "</span></div>";
      });
    } else {
      barsHtml = '<div style="font-family:ui-monospace,monospace; font-size:12px">' +
        M.map(function (m, i) {
          return '<span style="color:' + m.color + (i === b.best ? "; font-weight:700" : "") + '">' + b.vals[i] + "</span>";
        }).join(" &nbsp; ") + "</div>";
    }
    d.innerHTML = '<div class="btop"><span>' + b.label + '</span><span class="tag ' + b.src + '">' + b.src + "</span></div>" +
      '<div class="bars">' + barsHtml + "</div>";
    brows.appendChild(d);
  });
  document.getElementById("footnote").textContent = PRICING.footnote;

  document.getElementById("quote").innerHTML = PRICING.quote + ' <span class="by">' + PRICING.quoteBy + "</span>";
  var qs = document.getElementById("qs");
  PRICING.questions.forEach(function (q, i) {
    qs.innerHTML += '<div class="qchip" id="q' + i + '"><span class="qn">Q' + (i + 1) + "</span>" + q + "</div>";
  });
  document.getElementById("promise").textContent = "Promise: " + PRICING.promise;

  // ---- timeline ----
  var tl = gsap.timeline({ paused: true });

  // step 1: receipts print
  tl.fromTo(".receipt", { opacity: 0, y: -46 }, { opacity: 1, y: 0, duration: 0.55, stagger: 0.16, ease: "power3.out" })
    .fromTo(".receipt .rrow, .receipt .sep", { opacity: 0 }, { opacity: 1, duration: 0.25, stagger: 0.018 }, "-=0.35");
  DECK.markStep(tl);

  // step 2: benchmark near-tie
  tl.fromTo("#bench", { opacity: 0, x: 42 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" })
    .fromTo(".brow", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.3, stagger: 0.07 }, "-=0.2");
  document.querySelectorAll(".bar").forEach(function (b) {
    tl.fromTo(b, { width: 0 }, { width: b.dataset.w + "px", duration: 0.45, ease: "power2.out" }, "<+0.03");
  });
  DECK.markStep(tl);

  // step 3: per-token verdict stamps
  tl.fromTo("#st1", { opacity: 0, scale: 2.2, rotate: -9 }, { opacity: 1, scale: 1, duration: 0.35, ease: "power3.in" })
    .fromTo("#st2", { opacity: 0, scale: 2.2, rotate: -9 }, { opacity: 1, scale: 1, duration: 0.35, ease: "power3.in" }, "+=0.25");
  DECK.markStep(tl);

  // step 4: paradox — receipts flip to per-task bills, K3 & Sol converge
  tl.to(".list-lines", { opacity: 0, duration: 0.5 })
    .to("#st1, #st2", { opacity: 0.18, duration: 0.4 }, "<")
    .fromTo(".task-lines", { opacity: 0 }, { opacity: 1, duration: 0.5 }, "<+0.2");
  M.forEach(function (m) {
    var st = { v: 0 };
    tl.call(function () {
      document.getElementById("tlab-" + m.key).textContent = "per completed task";
    }, null, "<")
      .to(st, {
        v: m.task, duration: 0.8, ease: "power2.out",
        onUpdate: function () { document.getElementById("tval-" + m.key).textContent = $(st.v); }
      }, "<");
  });
  tl.fromTo("#conv", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#quote", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.5 });
  DECK.markStep(tl);

  // steps 5-7: the three questions
  [".qb1", ".qb2", ".qb3"].forEach(function (sel, i) {
    tl.fromTo("#q" + i, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" })
      .fromTo(sel, { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.35, stagger: 0.1, ease: "back.out(2.5)" }, "-=0.15");
    DECK.markStep(tl);
  });

  // step 8: the promise
  tl.fromTo("#promise", { opacity: 0 }, { opacity: 1, duration: 0.6 });

  DECK.register(tl, {
    reset: function () {
      M.forEach(function (m) {
        document.getElementById("tlab-" + m.key).textContent = "list rates";
        document.getElementById("tval-" + m.key).textContent = "/1M tok";
      });
    }
  });
</script>
</body>
</html>
