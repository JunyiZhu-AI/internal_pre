<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Everyone Is Talking About K3's Token Cost</title>
<link rel="stylesheet" href="shared/deck.css?v=3">
<style>
  .ledger {
    position: absolute; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 14px 16px;
  }
  .ledger h3 { margin: 0 0 10px; font-size: 15px; }
  .ledger h3 .note { font-size: 11px; color: var(--ink-2); font-weight: 400; margin-left: 8px; }
  .lrow { display: flex; gap: 3px; margin-bottom: 3px; opacity: 0; position: relative; }
  .lcell {
    height: 34px; display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, monospace; font-size: 12.5px;
    background: #232836; border-radius: 6px; color: #c7cce0; position: relative;
  }
  .lcell.lab { justify-content: flex-start; padding-left: 10px; font-family: inherit; font-size: 12px; color: var(--ink-2); background: transparent; }
  .lcell.hd { font-weight: 700; font-family: inherit; font-size: 12.5px; color: #fff; }
  .lcell.win { color: #fff; font-weight: 700; }
  #rate .lcell.lab { width: 158px; } #rate .lcell:not(.lab) { width: 118px; }
  #perf .lcell.lab { width: 208px; } #perf .lcell:not(.lab) { width: 86px; }
  .lrow .tag { position: absolute; right: 0; top: 9px; font-size: 9px; padding: 1px 6px; border-radius: 999px; }
  .tag.independent { background: rgba(47,214,176,0.12); color: var(--accent); }
  .tag.vendor-run { background: rgba(201,133,0,0.14); color: #e0a935; }
  .tag.arena { background: rgba(144,133,233,0.14); color: var(--c-o); }
  #k3glow {
    position: absolute; border: 2px solid var(--accent); border-radius: 9px;
    pointer-events: none; opacity: 0; box-shadow: 0 0 18px rgba(47,214,176,0.25);
  }
  .stamp {
    position: absolute; font-weight: 800; font-size: 15px; letter-spacing: 0.04em;
    border: 3px solid #e04b38; color: #e04b38; padding: 4px 10px; border-radius: 5px;
    transform: rotate(-9deg); opacity: 0; z-index: 6;
    background: rgba(11,13,18,0.55); font-family: ui-monospace, monospace;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  #fn3 { position: absolute; left: 44px; top: 452px; width: 560px; font-size: 10px; color: #6b7284; line-height: 1.45; opacity: 0; }
  #qs3 {
    position: absolute; left: 44px; top: 508px; width: 1192px;
    display: flex; flex-direction: row; gap: 16px;
  }
  .qchip {
    flex: 1; background: var(--panel); border: 1px solid var(--line); border-top: 3px solid var(--accent);
    border-radius: 10px; padding: 14px 16px; font-size: 13.5px; opacity: 0; line-height: 1.5;
  }
  .qchip .qn { color: var(--accent); font-weight: 700; margin-right: 7px; font-family: ui-monospace, monospace; display: block; margin-bottom: 5px; }
  .qbadge {
    position: absolute; width: 17px; height: 17px; border-radius: 50%;
    background: var(--accent); color: #0c1116; font-weight: 800; font-size: 12px;
    display: flex; align-items: center; justify-content: center; opacity: 0; z-index: 6;
  }
  #promise3 {
    position: absolute; left: 0; top: 646px; width: 100%; text-align: center;
    font-size: 15px; color: var(--accent); font-weight: 600; opacity: 0;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Everyone Is Talking About K3's Token Cost</div>
  <div class="slide-sub">rate cards vs capability — July 2026</div>

  <div class="ledger" id="rate" style="left:44px; top:112px; width:560px">
    <h3>Rate card <span class="note">official, per 1M tokens</span></h3>
    <div id="raterows"></div>
  </div>
  <div id="k3glow"></div>
  <div class="stamp" id="st1" style="left:196px; top:220px">−40% vs Sol</div>
  <div class="stamp" id="st2" style="left:182px; top:303px">−70% vs Fable</div>

  <div class="ledger" id="perf" style="right:44px; top:112px; width:560px; opacity:0">
    <h3>Performance <span class="note">July 2026</span></h3>
    <div id="perfrows"></div>
  </div>

  <div id="qs3"></div>
  <div id="fn3"></div>
  <div id="promise3"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/pricing.js?v=3"></script>
<script src="shared/manifest.js?v=3"></script>
<script src="shared/deck.js?v=3"></script>
<script>
  var M = PRICING.models, $ = PRICING.fmt$;

  function row(cells, opts) {
    opts = opts || {};
    var d = document.createElement("div");
    d.className = "lrow";
    if (opts.id) d.id = opts.id;
    cells.forEach(function (c, i) {
      var e = document.createElement("div");
      e.className = "lcell" + (i === 0 ? " lab" : "") + (opts.hd ? " hd" : "") +
        (opts.win === i - 1 ? " win" : "");
      e.innerHTML = c;
      if (opts.hd && i > 0) e.style.color = M[i - 1].color;
      d.appendChild(e);
    });
    if (opts.tag) d.innerHTML += '<span class="tag ' + opts.tag + '">' + opts.tag.slice(0, 6) + "</span>";
    return d;
  }

  var rr = document.getElementById("raterows");
  rr.appendChild(row(["", M[0].name, M[1].name, M[2].name], { hd: true }));
  rr.appendChild(row(["input"].concat(M.map(function (m) { return $(m.input); })), { win: 0 }));
  rr.appendChild(row(["cached input"].concat(M.map(function (m) { return $(m.cached); })), { win: 0, id: "row-cached" }));
  rr.appendChild(row(["output (incl. reasoning)"].concat(M.map(function (m) { return $(m.output); })), { win: 0, id: "row-output" }));
  rr.appendChild(row(["context window"].concat(M.map(function (m) { return m.ctx; })), {}));
  rr.appendChild(row(["open weights"].concat(M.map(function (m) { return m.open; })), { win: 0, id: "row-open" }));

  var pr = document.getElementById("perfrows");
  pr.appendChild(row(["", "K3", "Sol", "Fable 5"], { hd: true }));
  PRICING.bench.forEach(function (b) {
    var vals = b.max ? b.vals.map(function (v) { return v.toFixed(1); }) : b.vals;
    pr.appendChild(row([b.label].concat(vals), { win: b.best, tag: b.src }));
  });

  var qs3 = document.getElementById("qs3");
  PRICING.questions.forEach(function (q, i) {
    qs3.innerHTML += '<div class="qchip" id="q' + i + '"><span class="qn">Q' + (i + 1) + "</span>" + q + "</div>";
  });
  document.getElementById("fn3").textContent = PRICING.footnote;
  document.getElementById("promise3").textContent = "Promise: " + PRICING.promise;

  function badge(id, x, y) {
    var b = document.createElement("div");
    b.className = "qbadge"; b.id = id;
    b.style.left = x + "px"; b.style.top = y + "px";
    document.querySelector(".stage").appendChild(b);
  }
  badge("qb1", 585, 275); // output row
  badge("qb2", 585, 238); // cached row
  badge("qb3", 330, 148); // K3 column header

  var tl = gsap.timeline({ paused: true });

  // step 1: rate card rows cascade; K3 column glows
  tl.fromTo("#rate", { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" })
    .fromTo("#rate .lrow", { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.32, stagger: 0.09 }, "-=0.2")
    .call(function () {
      var g = document.getElementById("k3glow");
      g.style.left = "218px"; g.style.top = "146px"; g.style.width = "126px"; g.style.height = "225px";
    })
    .fromTo("#k3glow", { opacity: 0 }, { opacity: 1, duration: 0.4 });
  DECK.markStep(tl);

  // step 2: performance table — near-tie, with provenance tags
  tl.fromTo("#perf", { opacity: 0, x: 40 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" })
    .fromTo("#perf .lrow", { opacity: 0, x: 14 }, { opacity: 1, x: 0, duration: 0.3, stagger: 0.08 }, "-=0.2")
    .fromTo("#fn3", { opacity: 0 }, { opacity: 1, duration: 0.4 });
  DECK.markStep(tl);

  // step 3: the per-token verdict — discount stamps hit the rate card
  tl.fromTo("#st1", { opacity: 0, scale: 2.2, rotate: -9 }, { opacity: 1, scale: 1, duration: 0.35, ease: "power3.in" })
    .fromTo("#st2", { opacity: 0, scale: 2.2, rotate: -9 }, { opacity: 1, scale: 1, duration: 0.35, ease: "power3.in" }, "+=0.25");
  DECK.markStep(tl);

  // steps 4-6: questions with pinned ? badges
  for (var i = 0; i < 3; i++) {
    tl.fromTo("#q" + i, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" })
      .fromTo("#qb" + (i + 1), { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2.5)" }, "-=0.15");
    DECK.markStep(tl);
  }

  // step 7: the promise
  tl.fromTo("#promise3", { opacity: 0 }, { opacity: 1, duration: 0.6 });

  DECK.register(tl, {});
</script>
</body>
</html>
