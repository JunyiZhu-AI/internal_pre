<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kimi Delta Attention: The Frontier of the Linear Line</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #stsign { position: absolute; left: 44px; top: 116px; display: flex; align-items: center; gap: 10px; }
  #stsign .rnd { width: 26px; height: 26px; border-radius: 50%; border: 3px solid #e04b38; background: #0c1116;
    display: flex; align-items: center; justify-content: center; font: 800 13px ui-monospace, monospace; color: #e8eaf0; }
  #stsign .snm { font: 600 12px ui-monospace, monospace; color: #9aa1b5; }
  #stsign .sfare { font: 700 11px ui-monospace, monospace; color: #e04b38; border: 1px solid var(--line);
    border-radius: 999px; padding: 3px 10px; background: var(--panel); }
  #zoom { position: absolute; left: 120px; top: 186px; opacity: 0; }
  #zoom .zh { font: 800 13px ui-monospace, monospace; color: var(--accent); margin-bottom: 8px; }
  #ts { display: flex; gap: 4px; margin-bottom: 10px; }
  #ts i { width: 20px; height: 12px; border-radius: 3px; background: #232836; display: block; transition: background 0.2s; }
  #ts i.cur { background: var(--accent); box-shadow: 0 0 7px rgba(47,214,176,0.7); }
  #grid { display: grid; grid-template-columns: repeat(8, 26px); gap: 3px; padding: 8px;
    border: 2px solid var(--accent); border-radius: 10px; background: rgba(47,214,176,0.05); width: max-content; }
  #grid i { width: 26px; height: 22px; border-radius: 4px; background: #2fd6b0; opacity: 0.5; display: block; }
  #glab { font: 600 11px ui-monospace, monospace; color: #6b7284; margin-top: 6px; }
  #knob1wrap { position: absolute; left: 128px; top: 480px; opacity: 0; }
  #knob1wrap .kl { font: 600 12px ui-monospace, monospace; color: #9aa1b5; margin-bottom: 8px; }
  #k1track { width: 240px; height: 8px; border-radius: 4px; background: #232836; position: relative; }
  #k1 { position: absolute; top: -4px; left: 20px; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px rgba(47,214,176,0.7); }
  #chans { position: absolute; left: 128px; top: 464px; display: flex; gap: 3px; opacity: 0; }
  .ch { width: 26px; height: 64px; border-radius: 5px; background: #1b1e27; border: 1px solid var(--line); position: relative; }
  .ch i { position: absolute; left: 50%; margin-left: -5px; top: 26px; width: 10px; height: 10px; border-radius: 50%;
    background: #e04b38; box-shadow: 0 0 7px rgba(224,75,56,0.7); }
  #chlab { position: absolute; left: 128px; top: 540px; width: 460px; font: 700 12.5px ui-monospace, monospace; color: #e04b38; opacity: 0; line-height: 1.6; }
  #from { position: absolute; left: 420px; top: 250px; width: 250px; font: 600 12.5px ui-monospace, monospace; color: #9aa1b5; opacity: 0; line-height: 1.7; }
  #from b { color: #e8eaf0; }
  #plumb { position: absolute; left: 740px; top: 210px; width: 500px; opacity: 0; }
  #plumb .ph { font: 600 11px ui-monospace, monospace; color: #6b7284; margin-bottom: 10px; }
  #plumb .pchips { display: flex; gap: 10px; margin-bottom: 14px; }
  #plumb .pc { font: 700 12px ui-monospace, monospace; color: #c7cce0; border: 1px solid var(--line);
    border-radius: 8px; background: var(--panel); padding: 7px 12px; }
  #home { position: absolute; left: 740px; top: 306px; width: 470px; font: 700 12.5px ui-monospace, monospace;
    color: #e8eaf0; border: 1.5px solid rgba(224,75,56,0.6); border-radius: 10px; background: rgba(224,75,56,0.07);
    padding: 10px 14px; opacity: 0; line-height: 1.6; }
  #punch { position: absolute; left: 44px; bottom: 26px; font-size: 16px; font-weight: 700; color: var(--accent); opacity: 0; }
</style></head><body>
<div class="stage">
  <div class="slide-title">Kimi Delta Attention: The Frontier of the Linear Line</div>
  <div class="slide-sub">end of the line — the forget gate gets a resolution upgrade</div>
  <div id="stsign"><b class="rnd">7</b><span class="snm">arriving at</span><span class="sfare">~tens of KB / token ⚠</span></div>
  <div id="strip"></div>

  <div id="zoom">
    <div class="zh">the state box, zoomed — 8 channels shown</div>
    <div id="ts"></div>
    <div id="grid"></div>
    <div id="glab">memory channels →</div>
  </div>
  <div id="from"></div>

  <div id="knob1wrap"><div class="kl">forget gate α — <b style="color:#e8eaf0">one scalar per head</b></div><div id="k1track"><div id="k1"></div></div></div>
  <div id="chans"></div>
  <div id="chlab"></div>

  <div id="plumb">
    <div class="ph">the plumbing</div>
    <div class="pchips"><span class="pc" id="pc1"></span><span class="pc" id="pc2"></span></div>
  </div>
  <div id="home"></div>
  <div id="punch"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("strip"), 6);
  var strip = document.getElementById("strip");
  strip.style.left = "644px"; strip.style.top = "96px";

  document.getElementById("from").innerHTML = EV.kda.from.replace("Gated DeltaNet:", "<b>Gated DeltaNet:</b>");
  document.getElementById("chlab").textContent = EV.kda.upgrade + " ⚠";
  var plumbParts = EV.kda.plumbing.split(" · ");
  document.getElementById("pc1").textContent = plumbParts[0];
  document.getElementById("pc2").textContent = plumbParts[1] || "";
  document.getElementById("home").textContent = EV.kda.home;
  document.getElementById("punch").textContent = EV.kda.position;

  // token stream, 8x6 state grid, 8 per-channel sliders
  var ts = document.getElementById("ts");
  for (var i = 0; i < 10; i++) ts.appendChild(document.createElement("i"));
  var grid = document.getElementById("grid");
  var cols = [];
  for (var i = 0; i < 8; i++) cols.push([]);
  for (var r = 0; r < 6; r++) for (var c = 0; c < 8; c++) {
    var el = document.createElement("i");
    grid.appendChild(el); cols[c].push(el);
  }
  var chans = document.getElementById("chans");
  for (var c = 0; c < 8; c++) {
    var d = document.createElement("div");
    d.className = "ch";
    d.innerHTML = "<i id='ck" + c + "'></i>";
    chans.appendChild(d);
  }
  var RATE = [0.9, 1.7, 0.5, 2.3, 1.2, 0.7, 2.9, 1.5];

  var t = 0, mode = "scalar";
  var loop = gsap.timeline({ repeat: -1, paused: true });
  loop.call(function () {
    var row = ts.children;
    for (var i = 0; i < 10; i++) row[i].classList.toggle("cur", i === t % 10);
    if (mode === "scalar") {
      var v = 0.28 + 0.45 * (0.5 + 0.5 * Math.sin(t * 0.8));
      gsap.to("#grid i", { opacity: v, duration: 0.3, overwrite: "auto" });
      gsap.to("#k1", { left: 16 + 200 * (0.5 + 0.5 * Math.sin(t * 0.8)), duration: 0.3, overwrite: "auto" });
    } else {
      for (var c = 0; c < 8; c++) {
        var u = 0.5 + 0.5 * Math.sin(t * RATE[c] * 0.55 + c);
        gsap.to(cols[c], { opacity: 0.2 + 0.6 * u, duration: 0.3, overwrite: "auto" });
        gsap.to("#ck" + c, { top: 6 + 42 * (1 - u), duration: 0.3, overwrite: "auto" });
      }
    }
    t++;
  }).to({}, { duration: 0.34 });

  var tl = gsap.timeline({ paused: true });

  // step 1: Gated DeltaNet — delta write + ONE scalar forget knob
  tl.fromTo("#zoom", { opacity: 0, scale: 0.85, transformOrigin: "left top" }, { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" })
    .fromTo("#from", { opacity: 0, x: 12 }, { opacity: 1, x: 0, duration: 0.45 })
    .fromTo("#knob1wrap", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .call(function () { t = 0; mode = "scalar"; loop.play(0); })
    .to({}, { duration: 2.0 });
  DECK.markStep(tl);

  // step 2: KDA — the knob splits into per-channel sliders
  tl.to("#knob1wrap", { opacity: 0, y: 8, duration: 0.35 })
    .call(function () { mode = "chan"; })
    .fromTo("#chans", { opacity: 0 }, { opacity: 1, duration: 0.3 })
    .fromTo("#chans .ch", { scaleY: 0.2, transformOrigin: "center top" }, { scaleY: 1, duration: 0.4, stagger: 0.05, ease: "back.out(1.6)" }, "<")
    .fromTo("#chlab", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 })
    .to({}, { duration: 1.6 });
  DECK.markStep(tl);

  // step 3: the plumbing, and where it lives
  tl.fromTo("#plumb", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#home", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.45 });
  DECK.markStep(tl);

  // step 4: its position on the map
  tl.fromTo("#punch", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 })
    .to("#strip .ev-sn.on i", { scale: 1.7, duration: 0.28, yoyo: true, repeat: 5, ease: "power1.inOut" });

  DECK.register(tl, {
    reset: function () {
      loop.pause(0); t = 0; mode = "scalar";
      gsap.killTweensOf("#grid i"); gsap.killTweensOf("#k1");
      for (var c = 0; c < 8; c++) gsap.killTweensOf("#ck" + c);
      gsap.set("#grid i", { clearProps: "opacity" });
      gsap.set("#k1", { clearProps: "left" });
      for (var c = 0; c < 8; c++) gsap.set("#ck" + c, { clearProps: "top" });
      [].forEach.call(ts.children, function (i) { i.classList.remove("cur"); });
    },
  });
</script>
</body></html>
