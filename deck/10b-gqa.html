<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MQA / GQA: Share the KV Heads</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  /* compact formula, attacked term hot */
  #fwrap { position: absolute; left: 44px; top: 122px; display: flex; align-items: flex-start; gap: 8px; opacity: 0; }
  #fwrap .feq { font: 600 12px ui-monospace, monospace; color: #9aa1b5; padding-top: 5px; }
  #fwrap .fop { font: 700 15px ui-monospace, monospace; color: #4a5066; padding-top: 2px; }
  .ft { text-align: center; position: relative; padding: 0 2px 6px; }
  .ft .fv { font: 800 18px ui-monospace, monospace; color: #9085e9; white-space: nowrap; }
  .ft .fl { font: 9.5px ui-monospace, monospace; color: #6b7284; margin-top: 1px; white-space: nowrap; }
  .ft.hot .fv { color: var(--hot); }
  .ft.hot .fl { color: var(--hot); opacity: 0.7; }
  .ft.hot::after { content: ""; position: absolute; left: 2px; right: 2px; bottom: 0; height: 2.5px; border-radius: 2px; background: var(--hot); box-shadow: 0 0 10px var(--hot); }
  #fres { font: 800 18px ui-monospace, monospace; color: #ff8a7a; padding-top: 2px; white-space: nowrap; }
  #mode { position: absolute; left: 44px; top: 186px; font: 800 14px ui-monospace, monospace; color: #9aa1b5; opacity: 0; }
  /* head groups */
  #vis { position: absolute; left: 100px; top: 218px; width: 1104px; height: 170px; opacity: 0; }
  .grp { position: absolute; top: 0; width: 128px; height: 158px; border: 1px dashed var(--line); border-radius: 9px; }
  .grp .gl { position: absolute; top: 5px; width: 100%; text-align: center; font: 600 9px ui-monospace, monospace; color: #4a5066; }
  .hd { position: absolute; width: 17px; height: 17px; border-radius: 4px; }
  .hd.q { background: rgba(57, 135, 229, 0.8); }
  .hd.kv { background: #9085e9; box-shadow: 0 0 6px rgba(144, 133, 233, 0.35); }
  .rl { position: absolute; font: 700 11px ui-monospace, monospace; opacity: 0; }
  /* the bill */
  #bill { position: absolute; left: 100px; top: 428px; opacity: 0; }
  #bill .bl { font: 600 11.5px ui-monospace, monospace; color: var(--ink-2); margin-bottom: 6px; }
  #btrack { width: 560px; height: 22px; border: 1px solid var(--line); border-radius: 6px; position: relative; }
  #bfill { position: absolute; left: 0; top: 0; bottom: 0; width: 560px; border-radius: 5px; background: linear-gradient(90deg, rgba(144,133,233,0.55), #9085e9); }
  #bdiv { position: absolute; left: 700px; top: 442px; font: 800 20px ui-monospace, monospace; color: var(--accent); opacity: 0; }
  #already { position: absolute; left: 100px; top: 492px; font: 600 12.5px ui-monospace, monospace; color: var(--ink-2); opacity: 0; }
  #already b { color: #c9c2ff; }
  #adopters { position: absolute; left: 44px; bottom: 66px; font-size: 14px; color: #c7cce0; opacity: 0; }
  #pattern { position: absolute; left: 44px; bottom: 30px; width: 940px; font-size: 15.5px; font-weight: 700; color: var(--accent); opacity: 0; }
</style></head>
<body>
<div class="stage">
  <div class="slide-title">MQA / GQA: Share the KV Heads</div>
  <div class="slide-sub">first knob: n_kv doesn't have to equal the number of query heads</div>
  <div id="strip"></div>

  <div id="fwrap"></div>
  <div id="mode"></div>
  <div id="vis"></div>
  <span class="rl" id="rlq" style="left:58px; top:268px; color:var(--c-q)">Q</span>
  <span class="rl" id="rlkv" style="left:44px; top:338px; color:var(--c-o)">K,V</span>

  <div id="bill">
    <div class="bl">KV cache / token</div>
    <div id="btrack"><div id="bfill"></div></div>
  </div>
  <div id="bdiv">&divide; 8</div>
  <div id="already"></div>
  <div id="adopters"></div>
  <div id="pattern"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("strip"), 1);
  var strip = document.getElementById("strip");
  strip.style.left = "660px"; strip.style.top = "96px";

  // ---- formula (Llama-3-70B numbers, n_kv is the knob) ----
  function T(v, l, id) { return '<div class="ft" id="' + id + '"><div class="fv">' + v + '</div><div class="fl">' + l + "</div></div>"; }
  document.getElementById("fwrap").innerHTML =
    '<span class="feq">per token =</span>' +
    T("2", "K and V", "t-2") + '<span class="fop">&times;</span>' +
    T("80", "layers", "t-nl") + '<span class="fop">&times;</span>' +
    T("64", "KV heads", "t-kv") + '<span class="fop">&times;</span>' +
    T("128", "head dim", "t-dh") + '<span class="fop">&times;</span>' +
    T("2 B", "BF16", "t-by") + '<span class="fop">=</span>' +
    '<span id="fres">2.6 MB</span>';
  var tkv = document.getElementById("t-kv");
  tkv.classList.add("hot"); tkv.style.setProperty("--hot", EV.nodes[1].color);
  var tkvVal = tkv.querySelector(".fv");
  var fres = document.getElementById("fres");

  // ---- 8 groups x 8 query heads, KV squares free-floating for the collapse ----
  var vis = document.getElementById("vis");
  var kvEls = [];
  for (var g = 0; g < 8; g++) {
    var p = document.createElement("div");
    p.className = "grp"; p.style.left = (g * 138) + "px";
    p.innerHTML = '<div class="gl">8 Q heads</div>';
    vis.appendChild(p);
    for (var s = 0; s < 8; s++) {
      var x = g * 138 + 12 + (s % 4) * 27, qy = 24 + (s < 4 ? 0 : 27), ky = 96 + (s < 4 ? 0 : 27);
      var q = document.createElement("div");
      q.className = "hd q"; q.style.left = x + "px"; q.style.top = qy + "px";
      vis.appendChild(q);
      var kv = document.createElement("div");
      kv.className = "hd kv"; kv.style.left = x + "px"; kv.style.top = ky + "px";
      kv.dataset.bx = x; kv.dataset.by = ky;
      vis.appendChild(kv);
      kvEls.push(kv);
    }
  }
  var CX = 537, CY = 105;                       // MQA merge point
  function gcx(g) { return g * 138 + 52; }      // per-group settle point

  var mode = document.getElementById("mode");
  document.getElementById("already").innerHTML =
    EV.gqa.already.replace("0.33 MB", "<b>0.33 MB</b>").replace("2.6 MB", "<b>2.6 MB</b>");
  document.getElementById("adopters").textContent = EV.gqa.adopters;
  document.getElementById("pattern").textContent = EV.gqa.pattern;

  function bytesFmt(b) { return b >= 1e6 ? (b / 1e6).toFixed(1) + " MB" : Math.round(b / 1e3) + " KB"; }
  var ctr = { v: 2.62e6 };

  var tl = gsap.timeline({ paused: true });

  // step 1: MHA — 64 query heads, 64 private K,V
  tl.fromTo("#fwrap", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 })
    .call(function () { mode.textContent = "MHA — every query head hauls a private K,V"; mode.style.color = "#9aa1b5"; })
    .fromTo("#mode", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .fromTo("#vis", { opacity: 0 }, { opacity: 1, duration: 0.3 })
    .fromTo(".grp", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.35, stagger: 0.05 })
    .fromTo(".hd.q", { opacity: 0, scale: 0.3 }, { opacity: 1, scale: 1, duration: 0.25, stagger: 0.004, ease: "back.out(2)" })
    .fromTo(".hd.kv", { opacity: 0, scale: 0.3 }, { opacity: 1, scale: 1, duration: 0.25, stagger: 0.004, ease: "back.out(2)" })
    .fromTo("#rlq, #rlkv", { opacity: 0 }, { opacity: 1, duration: 0.3 });
  DECK.markStep(tl);

  // step 2: collapse — MQA flash (1 shared KV), settle on GQA (8 groups)
  tl.call(function () { mode.textContent = "MQA — the extreme: 1 KV head shared by all 64"; mode.style.color = "#ff8a7a"; tkvVal.textContent = "1"; })
    .to(".hd.kv", {
      x: function (i, t) { return CX - (+t.dataset.bx); },
      y: function (i, t) { return CY - (+t.dataset.by); },
      opacity: function (i) { return i === 0 ? 1 : 0; },
      duration: 0.6, stagger: 0.003, ease: "power2.inOut"
    })
    .to(kvEls[0], { boxShadow: "0 0 22px rgba(144,133,233,1)", duration: 0.2, yoyo: true, repeat: 3 })
    .to({}, { duration: 0.5 })
    .call(function () { mode.textContent = "GQA — 8 KV heads · groups of 8 queries share one"; mode.style.color = EV.nodes[1].color; tkvVal.textContent = "8"; })
    .to(kvEls.filter(function (e, i) { return i % 8 === 0; }), {
      x: function (i, t) { return gcx(Math.floor(kvEls.indexOf(t) / 8)) - (+t.dataset.bx); },
      y: function (i, t) { return CY - (+t.dataset.by); },
      opacity: 1, scale: 1.25,
      duration: 0.55, stagger: 0.03, ease: "back.out(1.4)"
    });
  DECK.markStep(tl);

  // step 3: the bill — cache ÷ 8
  tl.fromTo("#bill", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 })
    .to("#bfill", { width: 70, duration: 1.1, ease: "power2.inOut" })
    .fromTo(ctr, { v: 2.62e6 }, {
      v: 3.3e5, duration: 1.1, ease: "power2.inOut",
      onUpdate: function () { fres.textContent = bytesFmt(ctr.v); }
    }, "<")
    .to("#fres", { color: "#2fd6b0", duration: 0.5 }, "<0.5")
    .fromTo("#bdiv", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.2)" })
    .fromTo("#already", { opacity: 0 }, { opacity: 1, duration: 0.45 });
  DECK.markStep(tl);

  // step 4: who runs it — and what it started
  tl.fromTo("#adopters", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#pattern", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 })
    .fromTo(strip.children[2], { scale: 1 }, { scale: 1.25, duration: 0.3, yoyo: true, repeat: 1 });

  DECK.register(tl, {
    reset: function () {
      mode.textContent = "";
      tkvVal.textContent = "64";
      fres.textContent = "2.6 MB";
      gsap.set("#fres", { clearProps: "color" });
    }
  });
</script>
</body></html>
