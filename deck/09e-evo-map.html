<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Attention Evolution Map</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  .kicker { position: absolute; top: 12px; left: 45px; font: 700 11px ui-monospace, monospace; letter-spacing: 0.22em; color: #6b7284; }
  .slide-sub { opacity: 0; }
  #grid { position: absolute; left: 64px; top: 146px; width: 790px; }
  .row { display: flex; align-items: center; gap: 14px; height: 50px; margin-bottom: 8px; background: var(--panel); border: 1.5px solid var(--line); border-radius: 10px; padding: 0 18px; opacity: 0; }
  .row .pos { font: 700 11px ui-monospace, monospace; color: #4a5066; width: 22px; }
  .row .dot { width: 12px; height: 12px; border-radius: 50%; background: #2a2e3b; flex: none; }
  .row .nm { font-size: 16px; font-weight: 700; color: #6b7284; }
  .row .sb { font: 11px ui-monospace, monospace; color: #4a5066; margin-left: 6px; }
  .row .by { margin-left: auto; font: 700 14px ui-monospace, monospace; color: #4a5066; }
  .row.on .nm { color: #e8eaf0; }
  .row.on .sb { color: #9aa1b5; }
  .row.on .by { color: #e8eaf0; }
  #gp { position: absolute; left: 902px; top: 226px; width: 318px; border: 1.5px solid var(--line); border-radius: 14px; background: var(--panel); padding: 22px 24px; opacity: 0; }
  #gp .gp-lab { font: 700 11px ui-monospace, monospace; letter-spacing: 0.18em; color: #6b7284; }
  #gaugeVal { font: 800 34px ui-monospace, monospace; color: var(--accent); margin-top: 12px; min-height: 42px; transform-origin: left center; white-space: nowrap; }
  #gp .gp-sub { font: 10.5px ui-monospace, monospace; color: #4a5066; margin-top: 10px; }
  #story { position: absolute; left: 0; right: 240px; bottom: 40px; text-align: center; font-size: 19px; font-weight: 700; color: var(--accent); opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">ATTENTION EVOLUTION</div>
  <div class="slide-title" style="top:34px">The Attention Evolution Map</div>
  <div class="slide-sub" id="metric" style="top:78px"></div>

  <div id="grid"></div>
  <div id="gp">
    <div class="gp-lab">KV BYTES / TOKEN</div>
    <div id="gaugeVal"></div>
    <div class="gp-sub">one gauge for the whole section</div>
  </div>
  <div id="story"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("metric").textContent = EV.metric;
  document.getElementById("story").textContent = EV.story;

  var grid = document.getElementById("grid");
  var rows = EV.nodes.map(function (n, i) {
    var r = document.createElement("div");
    r.className = "row";
    r.innerHTML =
      '<div class="pos">0' + (i + 1) + '</div><i class="dot"></i>' +
      '<div class="nm">' + n.name + '<span class="sb">' + n.sub + "</span></div>" +
      '<div class="by">' + (n.bytes || "—") + (n.warn ? ' <span class="ev-warn">⚠</span>' : "") + "</div>";
    grid.appendChild(r);
    return r;
  });

  var gauge = document.getElementById("gaugeVal");
  function setGauge(t) {
    gauge.textContent = t;
    gauge.style.fontSize = t.length > 9 ? "23px" : "34px";
  }
  function on(i) {
    var r = rows[i], c = EV.nodes[i].color;
    r.classList.add("on");
    r.style.borderColor = c;
    var d = r.querySelector(".dot");
    d.style.background = c;
    d.style.boxShadow = "0 0 10px " + c;
  }

  var tl = gsap.timeline({ paused: true });

  // step 1: the lineage skeleton + thread metric + gauge at MHA baseline
  tl.fromTo("#metric", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .fromTo(".row", { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.35, stagger: 0.07, ease: "power2.out" })
    .fromTo("#gp", { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" })
    .call(function () { on(0); setGauge(EV.nodes[0].bytes); })
    .fromTo("#gaugeVal", { scale: 0.6, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2)" });
  DECK.markStep(tl);

  // step 2: GQA, MLA, Sparse light up — gauge ratchets down
  [[1, "330 KB"], [2, "~70 KB ⚠"], [3, null]].forEach(function (s) {
    tl.call(function () { on(s[0]); if (s[1]) setGauge(s[1]); })
      .fromTo(rows[s[0]], { scale: 1.04 }, { scale: 1, duration: 0.3, ease: "power2.out" });
    if (s[1]) tl.fromTo("#gaugeVal", { scale: 1.22 }, { scale: 1, duration: 0.35, ease: "power2.out" }, "<");
    tl.to({}, { duration: 0.3 });
  });
  DECK.markStep(tl);

  // step 3: Linear, Hybrid, KDA — gauge lands on a state, not a cache
  [[4, null], [5, null], [6, "~tens of KB (state)"]].forEach(function (s) {
    tl.call(function () { on(s[0]); if (s[1]) setGauge(s[1]); })
      .fromTo(rows[s[0]], { scale: 1.04 }, { scale: 1, duration: 0.3, ease: "power2.out" });
    if (s[1]) tl.fromTo("#gaugeVal", { scale: 1.22 }, { scale: 1, duration: 0.35, ease: "power2.out" }, "<");
    tl.to({}, { duration: 0.3 });
  });
  DECK.markStep(tl);

  // step 4: the story in one line
  tl.fromTo("#story", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.6 });

  DECK.register(tl, {
    reset: function () {
      rows.forEach(function (r) {
        r.classList.remove("on");
        r.style.borderColor = "";
        var d = r.querySelector(".dot");
        d.style.background = "#2a2e3b";
        d.style.boxShadow = "none";
      });
      setGauge("");
    }
  });
</script>
</body>
</html>
