<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Precision Becomes an Architecture Hyperparameter</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  /* ---- the product: the rig, small, dials already set ---- */
  #minirig { position: absolute; left: 930px; top: 26px; display: flex; align-items: center; gap: 8px;
             padding: 8px 12px; border: 1px solid var(--line); border-radius: 10px;
             background: rgba(27,30,39,0.45); opacity: 0; }
  .mr { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .mr .ml { font: 700 9px ui-monospace, monospace; color: #6b7284; }
  #mhbm { width: 26px; height: 36px; border: 1.5px solid rgba(201,133,0,0.7); border-radius: 5px; position: relative; }
  #mhbm i { position: absolute; left: 4px; right: 4px; height: 6px; border-radius: 2px; background: rgba(201,133,0,0.7); }
  #mhbm i:first-child { top: 5px; } #mhbm i:last-child { top: 15px; opacity: 0.5; }
  #mpipe { width: 46px; height: 9px; border: 1.5px solid rgba(47,214,176,0.55); border-radius: 5px;
           position: relative; overflow: hidden; }
  #mpipe i { position: absolute; top: 50%; transform: translateY(-50%); width: 4px; height: 4px; border-radius: 50%;
             background: #2fd6b0; animation: mFlow 1.3s linear infinite; }
  #mpipe i:nth-child(2) { animation-delay: 0.65s; }
  @keyframes mFlow { from { left: -5px; } to { left: 44px; } }
  #mtile { width: 24px; height: 24px; border: 1.5px solid rgba(224,169,53,0.6); border-radius: 5px;
           background: var(--panel); display: flex; align-items: center; justify-content: center;
           font: 800 11px ui-monospace, monospace; color: #e0a935; }
  #mcore { width: 32px; height: 32px; border: 2px solid #3987e5; border-radius: 6px; background: #0d1420;
           display: flex; align-items: center; justify-content: center;
           font: 800 12px ui-monospace, monospace; color: #6fb1ff;
           animation: mPulse 1.8s ease-in-out infinite; }
  @keyframes mPulse { 50% { box-shadow: 0 0 12px rgba(57,135,229,0.5); } }

  /* ---- training conveyor ---- */
  .stg { position: absolute; top: 150px; width: 170px; height: 54px; border-radius: 10px;
         background: var(--panel); border: 1.5px solid; opacity: 0;
         display: flex; align-items: center; justify-content: center;
         font: 700 13.5px ui-monospace, monospace; }
  .sarr { position: absolute; top: 168px; font: 700 14px ui-monospace, monospace; color: #4a5066; opacity: 0; }
  #belt { position: absolute; left: 44px; top: 214px; width: 990px; height: 5px; border-radius: 3px; opacity: 0;
          background: repeating-linear-gradient(90deg, #2a2e3b 0 14px, transparent 14px 28px);
          animation: beltMove 1.1s linear infinite; }
  @keyframes beltMove { to { background-position: 28px 0; } }

  #flag { position: absolute; left: 865px; top: 90px; width: 140px; text-align: center; opacity: 0; z-index: 6; }
  #flagLab { font: 800 12px ui-monospace, monospace; color: var(--accent); white-space: nowrap; }
  #flagDial { margin: 2px auto 0; width: 26px; height: 26px; }
  #flagStem { margin: 0 auto; width: 2px; height: 13px; background: var(--accent); }

  .tcard { position: absolute; top: 240px; border: 1px solid var(--line); border-left: 3px solid;
           border-radius: 8px; background: var(--panel); padding: 7px 11px; opacity: 0; }
  .tcard .tn { font: 800 12.5px ui-monospace, monospace; }
  .tcard .td { font-size: 11px; color: #c7cce0; margin-top: 2px; }
  .tcard .tt { font-size: 10px; color: #6b7284; font-style: italic; margin-top: 1px; }
  #card-ptq { left: 856px; width: 370px; border-left-color: #9aa1b5; } #card-ptq .tn { color: #9aa1b5; }
  #card-fp8 { left: 44px; width: 370px; border-left-color: #6fb1ff; } #card-fp8 .tn { color: #6fb1ff; }
  #card-qat { left: 450px; width: 380px; border-left-color: #2fd6b0; } #card-qat .tn { color: #2fd6b0; }
  #card-qat .tt { color: var(--accent); font-style: normal; font-weight: 600; }

  /* ---- beat 2: weight wall + quality + microscaling ---- */
  #wallLab { position: absolute; left: 44px; top: 336px; font: 700 11px ui-monospace, monospace; color: var(--ink-2); opacity: 0; }
  #wallLab b { color: #e0a935; }
  #wall { position: absolute; left: 44px; top: 356px; width: 414px; display: grid;
          grid-template-columns: repeat(16, 24px); grid-auto-rows: 24px; gap: 2px; opacity: 0; }
  #wall i { border-radius: 3px; }
  #spark { position: absolute; left: 478px; top: 356px; width: 192px; height: 92px; background: var(--panel);
           border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; opacity: 0; }
  #spark .sl { font: 700 9.5px ui-monospace, monospace; letter-spacing: 0.12em; color: #6b7284; text-transform: uppercase; }
  #micro { position: absolute; left: 44px; top: 528px; opacity: 0; }
  #mblock { position: absolute; left: 34px; top: 0; display: flex; gap: 3px; padding: 5px 7px;
            border: 1.5px dashed rgba(224,169,53,0.6); border-radius: 8px; }
  #mblock b { width: 27px; height: 24px; border-radius: 4px; background: #232836;
              display: flex; align-items: center; justify-content: center;
              font: 600 10.5px ui-monospace, monospace; color: #c7cce0; }
  #microChip { position: absolute; left: 8px; top: 5px; z-index: 3; padding: 4px 7px; border-radius: 6px;
               background: #0b0d12; border: 1.5px solid #e0a935;
               font: 800 11px ui-monospace, monospace; color: #e0a935; }
  #microTxt { position: absolute; left: 360px; top: 528px; width: 306px;
              font-size: 10.5px; color: var(--ink-2); line-height: 1.45; opacity: 0; }

  /* ---- beat 3: pinned label + strata ---- */
  #pin { position: absolute; left: 690px; top: 330px; font: 900 38px ui-monospace, monospace; opacity: 0; }
  #pin .pw { color: #e0a935; } #pin .pa { color: #6fb1ff; }
  #pin .tack { font-size: 15px; vertical-align: 18px; margin-left: 8px; }
  #punchl { position: absolute; left: 690px; top: 384px; width: 546px;
            font-size: 12.5px; font-weight: 600; color: var(--accent); opacity: 0; }
  .axcard { position: absolute; left: 690px; width: 546px; height: 48px; border: 1px solid var(--line);
            border-radius: 8px; background: var(--panel); padding: 7px 12px; opacity: 0;
            display: flex; align-items: center; gap: 14px; }
  .axcard .an { width: 118px; font: 700 9.5px ui-monospace, monospace; letter-spacing: 0.1em;
                text-transform: uppercase; color: #6b7284; line-height: 1.3; }
  .axcard .av { font: 600 12.5px ui-monospace, monospace; color: #6b7284; }
  .axcard .av .new { color: #2fd6b0; font-weight: 800; }
  #why { position: absolute; left: 690px; top: 594px; width: 546px;
         font-size: 11px; font-weight: 600; color: #e0a935; line-height: 1.45; opacity: 0; }

  #takeaway { position: absolute; left: 44px; top: 634px; width: 950px;
              font-size: 16px; font-weight: 800; color: var(--accent); opacity: 0; }
  #bridge { position: absolute; left: 44px; top: 666px; width: 940px;
            font-size: 11.5px; font-style: italic; color: var(--ink-2); line-height: 1.45; opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Precision Becomes an Architecture Hyperparameter</div>
  <div class="slide-sub">where quantization enters the pipeline — and what "W4A8" hides</div>

  <div id="minirig">
    <div class="mr"><div id="mhbm"><i></i><i></i></div><div class="ml">HBM</div></div>
    <div class="mr"><div id="mpipe"><i></i><i></i></div><div class="ml">&nbsp;</div></div>
    <div class="mr"><div id="mtile">4</div><div class="ml">W4</div></div>
    <div class="mr"><div id="mcore">8</div><div class="ml">A8</div></div>
  </div>

  <div class="stg" id="stg-pre" style="left:120px; border-color:rgba(57,135,229,0.6); color:#6fb1ff;">pretrain</div>
  <div class="stg" id="stg-sft" style="left:320px; border-color:rgba(47,214,176,0.6); color:#2fd6b0;">SFT</div>
  <div class="stg" id="stg-rl"  style="left:520px; border-color:rgba(144,133,233,0.6); color:#9085e9;">RL</div>
  <div class="stg" id="stg-dep" style="left:720px; border-color:rgba(107,114,132,0.8); color:#9aa1b5;">deploy</div>
  <span class="sarr" style="left:296px">▸</span><span class="sarr" style="left:496px">▸</span>
  <span class="sarr" style="left:696px">▸</span><span class="sarr" style="left:900px">▸</span>
  <div id="belt"></div>

  <div id="flag">
    <div id="flagLab">PTQ</div>
    <div id="flagDial"><svg width="26" height="26" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="26" fill="#12141a" stroke="#2fd6b0" stroke-width="4"/>
      <line x1="32" y1="32" x2="32" y2="10" stroke="#2fd6b0" stroke-width="6" stroke-linecap="round" transform="rotate(70 32 32)"/>
      <circle cx="32" cy="32" r="6" fill="#2fd6b0"/></svg></div>
    <div id="flagStem"></div>
  </div>

  <div class="tcard" id="card-ptq"><div class="tn"></div><div class="td"></div><div class="tt"></div></div>
  <div class="tcard" id="card-fp8"><div class="tn"></div><div class="td"></div><div class="tt"></div></div>
  <div class="tcard" id="card-qat"><div class="tn"></div><div class="td"></div><div class="tt"></div></div>

  <div id="wallLab">weights · <b id="bitRead">16-bit</b></div>
  <div id="wall"></div>
  <div id="spark"><div class="sl">quality</div>
    <svg id="sparksvg" width="174" height="62" viewBox="0 0 174 62">
      <line x1="0" y1="26" x2="174" y2="26" stroke="#2a2e3b" stroke-width="1" stroke-dasharray="3 4"/>
      <path id="sline" d="" fill="none" stroke="#2fd6b0" stroke-width="2" stroke-linecap="round"/>
    </svg></div>
  <div id="micro"><div id="mblock"></div><div id="microChip">×s</div></div>
  <div id="microTxt"></div>

  <div id="pin"><span class="pw">W4</span><span class="pa">A8</span><span class="tack">📌</span></div>
  <div id="punchl"></div>
  <div class="axcard" id="ax0" style="top:424px"></div>
  <div class="axcard" id="ax1" style="top:482px"></div>
  <div class="axcard" id="ax2" style="top:540px"></div>
  <div id="why"></div>

  <div id="takeaway"></div>
  <div id="bridge"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/quant.js"></script>
<script src="shared/gpus.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  // ---- entry-point cards ------------------------------------------------
  var CARD_IDS = ["card-ptq", "card-fp8", "card-qat"];
  QT.timeline.forEach(function (t, i) {
    var c = document.getElementById(CARD_IDS[i]);
    c.querySelector(".tn").textContent = t[0];
    c.querySelector(".td").textContent = t[1];
    c.querySelector(".tt").textContent = t[2];
  });
  document.getElementById("microTxt").textContent = QT.micro;
  document.getElementById("punchl").textContent = QT.punchline;
  document.getElementById("why").textContent = QT.why;
  document.getElementById("takeaway").textContent = QT.takeaway;
  document.getElementById("bridge").textContent = QT.bridge;

  // strata cards: "old → new", new part highlighted
  QT.axes.forEach(function (a, i) {
    var parts = a[1].split(" → ");
    document.getElementById("ax" + i).innerHTML =
      '<span class="an">' + a[0] + '</span><span class="av">' + parts[0] +
      ' → <span class="new">' + parts[1] + "</span></span>";
  });

  // ---- weight wall: 96 bricks that posterize 16 → 8 → 4 -----------------
  var wall = document.getElementById("wall"), bricks = [];
  var bval = [];
  for (var i = 0; i < 96; i++) {
    var b = document.createElement("i");
    bval.push((i * 53 % 97) / 97);
    wall.appendChild(b); bricks.push(b);
  }
  function brickColor(i, levels) {
    var q = Math.round(bval[i] * (levels - 1)) / (levels - 1);
    return "rgba(224,169,53," + (0.10 + q * 0.6).toFixed(3) + ")";
  }
  bricks.forEach(function (b, i) { b.style.background = brickColor(i, 16); });

  // microscaling block values
  var mblock = document.getElementById("mblock");
  ["7", "−3", "5", "2", "−6", "4", "1", "−2"].forEach(function (v) {
    var b = document.createElement("b"); b.textContent = v; mblock.appendChild(b);
  });

  // quality sparkline: flat with tiny noise, drawn during the repaint
  var sline = document.getElementById("sline");
  var d = "M 0 26";
  for (var x = 6; x <= 174; x += 6) d += " L " + x + " " + (26 + Math.sin(x * 1.7) * 1.8).toFixed(1);
  sline.setAttribute("d", d);
  var slen = sline.getTotalLength();
  gsap.set(sline, { strokeDasharray: slen, strokeDashoffset: slen });

  var flagLab = document.getElementById("flagLab");

  // ---- timeline ---------------------------------------------------------
  var tl = gsap.timeline({ paused: true });

  // beat 1: the conveyor; the quantization flag slides ever earlier
  tl.fromTo("#minirig", { opacity: 0, y: -8 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" })
    .fromTo(".stg", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, stagger: 0.08, ease: "power2.out" })
    .fromTo(".sarr, #belt", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "-=0.2")
    .fromTo("#flag", { opacity: 0, y: -18 }, { opacity: 1, y: 0, duration: 0.45, ease: "back.out(1.8)" })
    .fromTo("#card-ptq", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35 })
    .to({}, { duration: 0.55 })
    .to("#flag", { left: 18, duration: 0.9, ease: "power2.inOut" })
    .call(function () { flagLab.textContent = QT.timeline[1][0]; })
    .fromTo("#card-fp8", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35 })
    .to({}, { duration: 0.55 })
    .to("#flag", { left: 335, top: 102, duration: 0.8, ease: "power2.inOut" })
    .call(function () { flagLab.textContent = QT.timeline[2][0]; })
    .to("#stg-sft", { boxShadow: "0 0 22px rgba(47,214,176,0.55)", duration: 0.35, yoyo: true, repeat: 1 })
    .fromTo("#card-qat", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35 });
  DECK.markStep(tl);

  // beat 2: the wall repaints 16 → 8 → 4 while quality holds flat
  tl.fromTo("#wallLab, #wall", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .fromTo("#spark", { opacity: 0 }, { opacity: 1, duration: 0.35 }, "<")
    .to(sline, { strokeDashoffset: 0, duration: 2.6, ease: "none" }, "<")
    .to({}, { duration: 0.3 })
    .to(bricks, { backgroundColor: function (i) { return brickColor(i, 8); }, duration: 0.3, stagger: 0.005 }, "<")
    .call(function () { document.getElementById("bitRead").textContent = "8-bit"; })
    .to({}, { duration: 0.45 })
    .to(bricks, { backgroundColor: function (i) { return brickColor(i, 4); }, duration: 0.3, stagger: 0.005 }, "<0.15")
    .call(function () { document.getElementById("bitRead").textContent = "4-bit"; })
    .fromTo("#micro", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" })
    .fromTo("#microChip", { scale: 0.4 }, { scale: 1, duration: 0.35, ease: "back.out(2.5)" }, "<0.1")
    .fromTo("#microTxt", { opacity: 0 }, { opacity: 1, duration: 0.35 });
  DECK.markStep(tl);

  // beat 3: the label stays — the strata flip underneath
  tl.fromTo("#pin", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2)" })
    .fromTo("#punchl", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .fromTo(".axcard", { opacity: 0, rotationX: -90, transformPerspective: 700 },
      { opacity: 1, rotationX: 0, duration: 0.5, stagger: 0.22, ease: "back.out(1.6)" })
    .to("#pin", { scale: 1.07, duration: 0.28, yoyo: true, repeat: 1, transformOrigin: "left center" })
    .fromTo("#why", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 });
  DECK.markStep(tl);

  // beat 4: takeaway + bridge to MoE
  tl.fromTo("#takeaway", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" })
    .fromTo("#bridge", { opacity: 0 }, { opacity: 1, duration: 0.5 }, "+=0.25");

  DECK.register(tl, {
    reset: function () {
      flagLab.textContent = QT.timeline[0][0];
      document.getElementById("bitRead").textContent = "16-bit";
      bricks.forEach(function (b, i) { b.style.background = brickColor(i, 16); });
    }
  });
</script>
</body>
</html>
