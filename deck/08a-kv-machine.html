<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KV Cache: Trading Memory for Compute</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  #mode { position: absolute; left: 44px; top: 128px; font: 800 16px ui-monospace, monospace; opacity: 0; }
  #die { position: absolute; left: 70px; top: 200px; width: 150px; height: 230px; border: 2.5px solid #3987e5; border-radius: 10px; background: repeating-linear-gradient(0deg, rgba(57,135,229,0.1) 0 7px, transparent 7px 14px), repeating-linear-gradient(90deg, rgba(57,135,229,0.1) 0 7px, transparent 7px 14px); opacity: 0; }
  #die .lab { position: absolute; bottom: 6px; width: 100%; text-align: center; font-size: 11px; color: #9ec7f5; }
  #rework { position: absolute; left: 70px; top: 444px; width: 150px; text-align: center; font: 600 12px ui-monospace, monospace; color: #ff8a7a; opacity: 0; }
  #hbm { position: absolute; left: 320px; top: 176px; width: 400px; height: 300px; border: 2px solid rgba(201,133,0,0.7); border-radius: 12px; padding: 12px; opacity: 0; }
  #hbm .lab { position: absolute; bottom: -24px; width: 100%; text-align: center; font-size: 12px; color: #e0a935; font-weight: 700; left: 0; }
  #wblock { height: 96px; border: 1.5px solid rgba(201,133,0,0.55); border-radius: 8px; display: flex; align-items: center; justify-content: center; font: 600 12px ui-monospace, monospace; color: #e0a935; background: repeating-linear-gradient(0deg, rgba(201,133,0,0.12) 0 5px, transparent 5px 10px); }
  #kvzone { position: relative; margin-top: 10px; height: 88px; border: 1.5px dashed rgba(144,133,233,0.6); border-radius: 8px; padding: 5px 6px; }
  #kvzone .klab { position: absolute; top: 3px; right: 8px; font: 700 10px ui-monospace, monospace; color: #9085e9; }
  #kvbar { position: absolute; left: 5px; top: 5px; bottom: 5px; width: 0; background: linear-gradient(90deg, rgba(144,133,233,0.5), #9085e9); border-radius: 5px; }
  #kvgb { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font: 800 15px ui-monospace, monospace; color: #0c1116; z-index: 2; opacity: 0; }
  #batch { margin-top: 10px; display: flex; gap: 6px; height: 52px; }
  #batch i { flex: 1; border: 1.5px solid rgba(107,114,132,0.6); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 9.5px; color: #6b7284; transition: flex 0.6s, opacity 0.6s; }
  #batch i.gone { flex: 0.06; opacity: 0.25; font-size: 0; }
  #comp { position: absolute; left: 770px; top: 200px; width: 220px; font: 600 13px ui-monospace, monospace; color: #9aa1b5; line-height: 2; opacity: 0; }
  #comp b { color: #e8eaf0; font-size: 15px; }
  #formula { position: absolute; left: 44px; top: 540px; display: flex; align-items: center; gap: 9px; opacity: 0; }
  .fterm { text-align: center; opacity: 0; }
  .fterm .fv { font: 800 19px ui-monospace, monospace; color: #9085e9; }
  .fterm .fl { font: 9.5px ui-monospace, monospace; color: #6b7284; margin-top: 1px; }
  .fop { font: 700 16px ui-monospace, monospace; color: #4a5066; }
  #fres { font: 800 19px ui-monospace, monospace; color: var(--accent); opacity: 0; }
  #punch { position: absolute; left: 44px; bottom: 26px; font-size: 16px; font-weight: 700; color: var(--accent); opacity: 0; }
  #tokout { position: absolute; left: 232px; top: 300px; font: 700 13px ui-monospace, monospace; color: #2fd6b0; opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">KV Cache: Trading Memory for Compute</div>
  <div class="slide-sub">decoding becomes O(n) — and the receipt lands in HBM</div>

  <div id="mode"></div>
  <div id="die"><div class="lab">Processor</div></div>
  <div id="rework"></div>
  <div id="tokout">→ tok</div>
  <div id="hbm">
    <div id="wblock">weights · 140 GB</div>
    <div id="kvzone"><span class="klab">KV cache</span><div id="kvbar"><span id="kvgb"></span></div></div>
    <div id="batch"><i>req 1</i><i>req 2</i><i>req 3</i><i>req 4</i><i>req 5</i><i>req 6</i></div>
    <div class="lab">HBM · fixed capacity</div>
  </div>
  <div id="comp">per token work<br><b id="work">—</b><br><span id="total" style="color:#6b7284">—</span></div>

  <div id="formula"><span style="font: 600 13px ui-monospace, monospace; color: var(--ink-2)">per token =</span></div>
  <div id="punch"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnscale.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("punch").textContent = AS.kvPunch;

  var formula = document.getElementById("formula");
  AS.kvTerms.forEach(function (t, i) {
    if (i) formula.insertAdjacentHTML("beforeend", '<span class="fop">×</span>');
    formula.insertAdjacentHTML("beforeend",
      '<div class="fterm"><div class="fv">' + t[0] + '</div><div class="fl">' + t[1] + "</div></div>");
  });
  formula.insertAdjacentHTML("beforeend", '<span class="fop">=</span><span id="fres">0.33 MB / token</span>');

  var mode = document.getElementById("mode");
  var cached = false, toks = 0;
  var loop = gsap.timeline({ repeat: -1, paused: true });
  loop.call(function () {
    toks++;
    var c = document.getElementById("tokout");
    gsap.fromTo(c, { opacity: 1, x: 0 }, { opacity: 0, x: 40, duration: 0.7 });
    if (!cached) {
      document.getElementById("work").textContent = "recompute K,V for all " + toks * 1000 + " tokens";
      document.getElementById("total").textContent = "total: O(n²)";
      gsap.fromTo("#die", { boxShadow: "0 0 30px rgba(224,75,56,0.85)" }, { boxShadow: "0 0 0px rgba(224,75,56,0)", duration: 0.75 });
    } else {
      document.getElementById("work").textContent = "attend over cache — new token only";
      document.getElementById("total").textContent = "total: O(n)";
      gsap.to("#kvbar", { width: Math.min(370, 40 + toks * 16), duration: 0.4 });
    }
  }).to({}, { duration: 0.85 });

  var tl = gsap.timeline({ paused: true });

  // step 1: decode WITHOUT a cache — the die re-derives history every token
  tl.fromTo("#die, #hbm, #comp", { opacity: 0 }, { opacity: 1, duration: 0.5, stagger: 0.08 })
    .call(function () {
      mode.textContent = "WITHOUT CACHE"; mode.style.color = "#ff8a7a";
      document.getElementById("rework").textContent = "every step: re-derive K,V of the ENTIRE history";
    })
    .fromTo("#mode, #rework", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .call(function () { toks = 0; cached = false; loop.play(0); });
  DECK.markStep(tl);

  // step 2: switch the cache on — store K,V once, decode touches only the new token
  tl.call(function () {
    cached = true; toks = 0;
    mode.textContent = "WITH KV CACHE"; mode.style.color = "#9085e9";
    document.getElementById("rework").textContent = "";
  })
    .to("#rework", { opacity: 0, duration: 0.2 })
    .to("#die", { borderColor: "#3987e5", duration: 0.3 })
    .to({}, { duration: 2.0 });
  DECK.markStep(tl);

  // step 3: the bill — the size formula assembles term by term
  tl.fromTo("#formula", { opacity: 0 }, { opacity: 1, duration: 0.3 });
  document.querySelectorAll(".fterm").forEach(function (t) {
    tl.fromTo(t, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.35, ease: "back.out(1.7)" }, "+=0.08");
  });
  tl.fromTo("#fres", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(2)" });
  DECK.markStep(tl);

  // step 4: one 128k request — 42 GB; batch dies
  tl.call(function () {
    document.getElementById("kvgb").textContent = AS.fmtGB(AS.kvGB(131072)) + " — one 128k request";
  })
    .to("#kvbar", { width: 370, duration: 1.0, ease: "power2.inOut" })
    .fromTo("#kvgb", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .call(function () {
      document.querySelectorAll("#batch i").forEach(function (b, i) { if (i > 1) b.classList.add("gone"); });
    })
    .to({}, { duration: 0.7 })
    .fromTo("#punch", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 });

  DECK.register(tl, {
    reset: function () {
      loop.pause(0); toks = 0; cached = false;
      document.getElementById("work").textContent = "—";
      document.getElementById("total").textContent = "—";
      document.getElementById("kvgb").textContent = "";
      gsap.set("#kvbar", { width: 0 });
      document.querySelectorAll("#batch i").forEach(function (b) { b.classList.remove("gone"); });
      mode.textContent = "";
    }
  });
</script>
</body>
</html>
