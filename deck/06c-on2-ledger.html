<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Self-Attention Recap: The O(n²) Problem</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  #formula { position: absolute; right: 44px; top: 34px; font: 600 15px ui-monospace, monospace; color: #9aa1b5; }
  #nsel { position: absolute; left: 44px; top: 128px; display: flex; gap: 8px; align-items: center; opacity: 0; }
  #nsel .nl { font: 12px ui-monospace, monospace; color: var(--ink-2); margin-right: 4px; }
  .nchip { font: 700 13px ui-monospace, monospace; color: #6b7284; border: 1.5px solid var(--line); border-radius: 999px; padding: 4px 14px; }
  .nchip.on { color: #0c1116; background: var(--accent); border-color: var(--accent); }
  .meter { position: absolute; left: 44px; width: 420px; height: 86px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px 18px; opacity: 0; }
  .meter .ml { font: 600 11.5px ui-monospace, monospace; color: var(--ink-2); }
  .meter .mv { font: 800 27px ui-monospace, monospace; color: #e8eaf0; margin-top: 4px; }
  #m1 { top: 176px; } #m2 { top: 276px; } #m3 { top: 376px; }
  #m2 .mv { color: #ff8a7a; }
  #m3 .mv { color: #e0a935; }
  #passchip { position: absolute; left: 44px; top: 482px; font: 600 12px ui-monospace, monospace; color: #ff8a7a; opacity: 0; }
  #chart { position: absolute; left: 540px; top: 150px; opacity: 0; }
  #chart text { font: 11px ui-monospace, monospace; fill: #6b7284; }
  #chart .axisline { stroke: var(--line); stroke-width: 1.5; }
  #chart .curve { fill: none; stroke: #e04b38; stroke-width: 3; stroke-linecap: round; }
  #chart circle { fill: #e04b38; }
  #punch { position: absolute; left: 44px; bottom: 30px; font-size: 17px; font-weight: 700; color: var(--accent); opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Self-Attention Recap: The O(n²) Problem</div>
  <div class="slide-sub">the score matrix, measured — not drawn</div>
  <div id="formula">Attention = softmax(QKᵀ/√d)·V</div>

  <div id="nsel"><span class="nl">context n =</span></div>
  <div class="meter" id="m1"><div class="ml">score-matrix entries (n × n)</div><div class="mv" id="v1">—</div></div>
  <div class="meter" id="m2"><div class="ml">HBM traffic — naïve: 3 full passes (BF16, one head)</div><div class="mv" id="v2">—</div></div>
  <div class="meter" id="m3"><div class="ml">S size vs 80 GB HBM (one head)</div><div class="mv" id="v3">—</div></div>
  <div id="passchip">① write S &nbsp; ② read for softmax &nbsp; ③ read for ·V</div>

  <svg id="chart" width="700" height="470"></svg>
  <div id="punch"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnscale.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("punch").textContent = AS.sin;
  var nsel = document.getElementById("nsel");
  AS.presets.forEach(function (p, i) {
    nsel.insertAdjacentHTML("beforeend", '<span class="nchip" id="nc' + i + '">' + p.lab + "</span>");
  });

  // log-log chart: x = n 1k..1M, y = GB 1e-3 .. 1e4
  var NS = "http://www.w3.org/2000/svg";
  var chart = document.getElementById("chart");
  var X0 = 90, W = 560, Y0 = 400, H = 340;
  function cx(n) { return X0 + (Math.log2(n) - 10) / 10 * W; }
  function cy(gb) { return Y0 - (Math.log10(gb) + 3) / 7 * H; }
  function el(tag, attrs, txt) {
    var e = document.createElementNS(NS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (txt !== undefined) e.textContent = txt;
    chart.appendChild(e);
    return e;
  }
  el("line", { x1: X0, y1: Y0, x2: X0 + W, y2: Y0, "class": "axisline" });
  el("line", { x1: X0, y1: Y0, x2: X0, y2: Y0 - H, "class": "axisline" });
  AS.presets.forEach(function (p) { el("text", { x: cx(p.n) - 12, y: Y0 + 18 }, p.lab); });
  [["1 MB", 0.001], ["1 GB", 1], ["1 TB", 1000]].forEach(function (t) {
    el("text", { x: X0 - 50, y: cy(t[1]) + 4 }, t[0]);
  });
  el("text", { x: X0 + W - 150, y: Y0 + 36 }, "context length n");
  el("line", { x1: X0, y1: cy(80), x2: X0 + W, y2: cy(80), stroke: "#e0a935", "stroke-width": 1.5, "stroke-dasharray": "6 5" });
  el("text", { x: X0 + W - 130, y: cy(80) - 6, fill: "#e0a935" }, "HBM · 80 GB");
  var curve = el("path", { "class": "curve", d: "" });
  var dots = AS.presets.map(function (p) {
    return el("circle", { cx: cx(p.n), cy: cy(AS.sGB(p.n)), r: 6, opacity: 0 });
  });

  function setN(i) {
    var p = AS.presets[i];
    for (var k = 0; k < 4; k++) document.getElementById("nc" + k).classList.toggle("on", k === i);
    document.getElementById("v1").textContent = AS.fmtN(AS.entries(p.n));
    document.getElementById("v2").textContent = AS.fmtGB(AS.naiveBytesGB(p.n));
    document.getElementById("v3").textContent = AS.fmtGB(AS.sGB(p.n)) +
      (AS.sGB(p.n) > AS.hbmGB ? "  — DOES NOT FIT" : "  (" + Math.round(AS.sGB(p.n) / AS.hbmGB * 100) + "%)");
    var d = "";
    for (var k = 0; k <= i; k++) {
      d += (k ? " L " : "M ") + cx(AS.presets[k].n) + " " + cy(AS.sGB(AS.presets[k].n));
    }
    curve.setAttribute("d", d);
    gsap.to(dots[i], { opacity: 1, duration: 0.3 });
  }

  var tl = gsap.timeline({ paused: true });

  // step 1: the meters, armed at n = 1k
  tl.fromTo("#nsel, .meter, #chart", { opacity: 0 }, { opacity: 1, duration: 0.45, stagger: 0.07 })
    .call(function () { setN(0); });
  DECK.markStep(tl);

  // step 2: why 3 passes
  tl.fromTo("#passchip", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .to("#m2", { borderColor: "#e04b38", duration: 0.35 });
  DECK.markStep(tl);

  // steps 3-5: scale
  tl.call(function () { setN(1); }).to({}, { duration: 0.9 });
  DECK.markStep(tl);
  tl.call(function () { setN(2); }).to({}, { duration: 0.9 });
  DECK.markStep(tl);
  tl.call(function () { setN(3); }).to({}, { duration: 0.9 })
    .to("#m3", { borderColor: "#e04b38", boxShadow: "0 0 18px rgba(224,75,56,0.4)", duration: 0.4 })
    .fromTo("#punch", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 });

  DECK.register(tl, {});
</script>
</body>
</html>
