<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kimi Delta Attention: The Frontier of the Linear Line</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #fold { position: absolute; left: 44px; top: 124px; display: flex; align-items: center; gap: 12px; opacity: 0; }
  #fold .dead { font: 700 13px ui-monospace, monospace; color: #55607a; text-decoration: line-through; text-decoration-color: rgba(47,214,176,0.8); text-decoration-thickness: 2px; }
  #fold .arr { font: 700 15px ui-monospace, monospace; color: #4a5066; }
  #fold .chip { font: 700 13px ui-monospace, monospace; color: #ff8a7a; border: 1.5px solid rgba(224,75,56,0.65); border-radius: 999px; padding: 5px 13px; background: var(--panel); box-shadow: 0 0 14px rgba(224,75,56,0.25); }
  /* the state + one knob */
  #sbox { position: absolute; left: 60px; top: 206px; opacity: 0; }
  #sbox .sl { font: 700 11.5px ui-monospace, monospace; color: var(--accent); margin-bottom: 8px; }
  #sg { display: grid; grid-template-columns: repeat(7, 20px); gap: 3px; }
  #sg i { width: 20px; height: 20px; border-radius: 4px; background: rgba(47,214,176,0.3); }
  #dwrite { position: absolute; left: 250px; top: 282px; font: 700 11.5px ui-monospace, monospace; color: var(--c-v); border: 1.5px solid rgba(201,133,0,0.6); border-radius: 999px; padding: 4px 11px; background: var(--panel); opacity: 0; }
  #knob1 { position: absolute; left: 435px; top: 226px; opacity: 0; }
  .trk { position: relative; width: 14px; height: 140px; border-radius: 7px; background: #1b1e27; border: 1px solid var(--line); }
  .kb { position: absolute; left: 50%; top: 10px; width: 20px; height: 20px; margin-left: -10px; border-radius: 50%; background: #e04b38; box-shadow: 0 0 10px rgba(224,75,56,0.7); }
  #knob1lab { position: absolute; left: 380px; top: 380px; width: 150px; text-align: center; font: 600 10.5px ui-monospace, monospace; color: #9aa1b5; opacity: 0; }
  #fromlab { position: absolute; left: 60px; top: 428px; width: 500px; font: 600 12.5px ui-monospace, monospace; color: #c7cce0; opacity: 0; }
  /* the split: per-channel equalizer */
  #ts { position: absolute; left: 620px; top: 176px; width: 600px; height: 24px; overflow: hidden; opacity: 0; }
  #ts span { position: absolute; top: 0; font: 700 10.5px ui-monospace, monospace; color: #9aa1b5; border: 1px solid var(--line); border-radius: 6px; padding: 3px 8px; background: var(--panel); }
  #eq { position: absolute; left: 620px; top: 214px; width: 600px; height: 160px; opacity: 0; }
  #eq .trk { position: absolute; top: 0; }
  #eqlab { position: absolute; left: 620px; top: 388px; width: 590px; font: 600 12.5px ui-monospace, monospace; color: #ff8a7a; opacity: 0; }
  /* plumbing + home */
  #plumb { position: absolute; left: 44px; top: 486px; display: flex; gap: 14px; opacity: 0; }
  #home { position: absolute; left: 44px; top: 536px; width: 1000px; font: 600 13px ui-monospace, monospace; color: #c7cce0; opacity: 0; }
  #home b { color: #ff8a7a; }
  #position { position: absolute; left: 44px; bottom: 30px; width: 940px; font-size: 15.5px; font-weight: 700; color: var(--accent); opacity: 0; }
</style></head>
<body>
<div class="stage">
  <div class="slide-title">Kimi Delta Attention: The Frontier of the Linear Line</div>
  <div class="slide-sub">the per-token formula is gone — the state itself is the design surface</div>
  <div id="strip"></div>

  <div id="fold">
    <span class="dead">2 &times; 80 &times; n_kv &times; d_h &times; 2 B &times; n</span>
    <span class="arr">&rarr;</span>
    <span class="chip">attack the state: S — d&times;d</span>
  </div>

  <div id="sbox"><div class="sl">S — fixed d&times;d state</div><div id="sg"></div></div>
  <div id="dwrite">&Delta; write</div>
  <div id="knob1"><div class="trk"><div class="kb" id="kb1"></div></div></div>
  <div id="knob1lab">Gated DeltaNet: ONE scalar forget knob &alpha;</div>
  <div id="fromlab"></div>

  <div id="ts"></div>
  <div id="eq"></div>
  <div id="eqlab"></div>

  <div id="plumb"></div>
  <div id="home"></div>
  <div id="position"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("strip"), 6);
  var strip = document.getElementById("strip");
  strip.style.left = "660px"; strip.style.top = "96px";

  document.getElementById("fromlab").textContent = EV.kda.from;
  document.getElementById("eqlab").textContent = EV.kda.upgrade + " ⚠";
  document.getElementById("home").innerHTML = EV.kda.home.replace("Kimi Linear", "<b>Kimi Linear</b>").replace("K3's backbone", "<b>K3's backbone</b>");
  document.getElementById("position").textContent = EV.kda.position;
  EV.kda.plumbing.split(" · ").forEach(function (p) {
    var c = document.createElement("span");
    c.className = "op-chip"; c.textContent = p;
    document.getElementById("plumb").appendChild(c);
  });

  // state grid
  var sg = document.getElementById("sg");
  for (var i = 0; i < 49; i++) sg.appendChild(document.createElement("i"));

  // token stream (ambient)
  var ts = document.getElementById("ts");
  var tsT = gsap.timeline({ paused: true });
  for (var i = 0; i < 6; i++) {
    var sp = document.createElement("span");
    sp.textContent = "t" + i;
    ts.appendChild(sp);
    tsT.fromTo(sp, { x: -50 }, { x: 640, duration: 3.2, ease: "none", repeat: -1 }, i * 0.55);
  }

  // equalizer: 18 per-channel forget sliders (ambient, independent)
  var eq = document.getElementById("eq");
  var eqT = [];
  for (var i = 0; i < 18; i++) {
    var t = document.createElement("div");
    t.className = "trk"; t.style.left = (i * 33) + "px";
    t.innerHTML = '<div class="kb"></div>';
    eq.appendChild(t);
    eqT.push(gsap.to(t.firstChild, {
      y: function () { return Math.random() * 108; },
      duration: function () { return 0.5 + Math.random() * 1.0; },
      repeat: -1, yoyo: true, repeatRefresh: true, ease: "sine.inOut", paused: true,
    }));
  }
  // single knob ambient bob
  var kb1T = gsap.to("#kb1", { y: 108, duration: 1.4, repeat: -1, yoyo: true, ease: "sine.inOut", paused: true });

  // ambient state-cell flicker (the delta write correcting entries)
  var flick = gsap.timeline({ repeat: -1, paused: true });
  flick.call(function () {
    var cell = sg.children[Math.floor(Math.random() * 49)];
    gsap.fromTo(cell, { backgroundColor: "rgba(224,75,56,0.85)" }, { backgroundColor: "rgba(47,214,176,0.3)", duration: 0.5 });
  }).to({}, { duration: 0.4 });

  var tl = gsap.timeline({ paused: true });

  // step 1: zoom the state — Gated DeltaNet: delta write + one scalar knob
  tl.fromTo("#fold", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#sbox", { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.5)" })
    .fromTo("#dwrite", { opacity: 0, x: -10 }, { opacity: 1, x: 0, duration: 0.4 })
    .fromTo("#knob1, #knob1lab", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .call(function () { flick.play(0); kb1T.play(0); })
    .fromTo("#fromlab", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .to({}, { duration: 1.2 });
  DECK.markStep(tl);

  // step 2: KDA — the knob splits per channel
  tl.fromTo("#eq", { opacity: 0, x: 16 }, { opacity: 1, x: 0, duration: 0.5 })
    .fromTo("#eq .trk", { opacity: 0 }, { opacity: 1, duration: 0.3, stagger: 0.03 }, "<")
    .fromTo("#ts", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .call(function () { eqT.forEach(function (t) { t.play(0); }); tsT.play(0); })
    .fromTo("#eqlab", { opacity: 0 }, { opacity: 1, duration: 0.45 })
    .to({}, { duration: 1.4 });
  DECK.markStep(tl);

  // step 3: the plumbing — and where it lives
  tl.fromTo("#plumb", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#home", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 });
  DECK.markStep(tl);

  // step 4: where this sits on the map
  tl.fromTo("#position", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 })
    .fromTo(strip.children[12], { scale: 1 }, { scale: 1.3, duration: 0.3, yoyo: true, repeat: 1 });

  DECK.register(tl, {
    reset: function () {
      flick.pause(0);
      kb1T.pause(0); gsap.set("#kb1", { y: 0 });
      tsT.pause(0);
      eqT.forEach(function (t) { t.pause(0); });
      gsap.set("#eq .kb", { y: 0 });
    }
  });
</script>
</body></html>
