<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prefill vs Decode: Two Different Workloads</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/phases.css">
<style>
  #gpuwrap { position: absolute; left: 170px; top: 200px; transform: scale(1.55); transform-origin: top left; opacity: 0; }
  #phase {
    position: absolute; left: 172px; top: 152px; font: 800 20px ui-monospace, monospace;
    letter-spacing: 0.06em; opacity: 0;
  }
  #counters { position: absolute; left: 985px; top: 210px; width: 250px; opacity: 0; }
  #counters .phcounter { margin-bottom: 14px; }
  #legend { margin-top: 10px; font-size: 10.5px; color: #6b7284; }
  #legend .bar {
    height: 8px; border-radius: 4px; margin-top: 4px;
    background: linear-gradient(90deg, #3987e5, #e0a935, #e04b38);
  }
  #legend .ends { display: flex; justify-content: space-between; margin-top: 2px; }
  #doc {
    position: absolute; left: -260px; top: 300px; width: 230px; height: 90px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; opacity: 0;
  }
  #doc i { display: block; height: 5px; border-radius: 2px; background: #3a4157; margin-bottom: 5px; }
  #doc i:nth-child(2n) { width: 84%; }
  #strip { position: absolute; left: 44px; top: 596px; }
  #strip text { font: 11px ui-monospace, monospace; fill: #6b7284; }
  #strip .axisline { stroke: var(--line); stroke-width: 1.5; }
  #wdot { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #e04b38; box-shadow: 0 0 16px rgba(224,75,56,0.9); opacity: 0; z-index: 9; }
  #gdot { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #3987e5; opacity: 0; z-index: 8; }
  .dlab { position: absolute; font: 700 12px ui-monospace, monospace; opacity: 0; z-index: 9; white-space: nowrap; }
  #caption {
    position: absolute; left: 0; top: 108px; width: 100%; text-align: center;
    font-size: 21px; font-weight: 700; color: var(--accent); opacity: 0;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Prefill vs Decode: Two Different Workloads</div>
  <div class="slide-sub">the same silicon, read two ways</div>
  <div id="caption"></div>

  <div id="phase"></div>
  <div id="gpuwrap"></div>
  <div id="doc"><i></i><i></i><i></i><i></i><i></i><i></i></div>

  <div id="counters">
    <div class="phcounter">compute&nbsp;&nbsp;<b id="cflops">—</b></div>
    <div class="phcounter">bytes moved&nbsp;&nbsp;<b id="cbytes">—</b></div>
    <div id="legend">thermal: idle → saturated<div class="bar"></div>
      <div class="ends"><span>idle</span><span>saturated</span></div></div>
  </div>

  <svg id="strip" width="1192" height="80"></svg>
  <div id="wdot"></div>
  <div id="gdot"></div>
  <div class="dlab" id="lab-pre" style="color:#3987e5">prefill · AI ≈ seq len · TTFT</div>
  <div class="dlab" id="lab-dec" style="color:#e04b38">decode · AI ≈ 1</div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/phases.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("caption").textContent = PH.caption;
  document.getElementById("gpuwrap").innerHTML = PH.gpuHTML("gpu");
  var gpu = document.getElementById("gpu");
  PH.reset(gpu);

  // ---- 1D intensity strip (ties back to the slide-03 roofline) ----
  var NS = "http://www.w3.org/2000/svg";
  var strip = document.getElementById("strip");
  function sx(ai) { return 60 + Math.log2(ai) / 10 * 1080; }
  function sel(tag, attrs, txt) {
    var e = document.createElementNS(NS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (txt !== undefined) e.textContent = txt;
    strip.appendChild(e);
    return e;
  }
  sel("line", { x1: 60, y1: 40, x2: 1140, y2: 40, "class": "axisline" });
  [1, 4, 16, 64, 256, 1024].forEach(function (v) {
    sel("line", { x1: sx(v), y1: 36, x2: sx(v), y2: 44, "class": "axisline" });
    sel("text", { x: sx(v) - 6, y: 62 }, String(v));
  });
  sel("text", { x: 60, y: 18 }, "arithmetic intensity (FLOPs/byte)");
  sel("line", { x1: sx(295), y1: 14, x2: sx(295), y2: 40, stroke: "#6fb1ff", "stroke-width": 2, "stroke-dasharray": "5 4" });
  sel("text", { x: sx(295) - 44, y: 76, fill: "#6fb1ff" }, "ridge ≈ 295 (H100)");
  var STRIPY = 596 + 40, PRE_X = 44 + sx(1024) - 30, DEC_X = 44 + sx(1.15);

  // ---- helpers ----
  var flopsEl = document.getElementById("cflops"), bytesEl = document.getElementById("cbytes");
  var phaseEl = document.getElementById("phase");
  var heat = { die: 0, pipe: 0 };
  function applyHeat() { PH.setDie(gpu, heat.die); PH.setPipe(gpu, heat.pipe); }

  function chip(x, y, cls) {
    var c = document.createElement("div");
    c.className = "tokchip " + (cls || "");
    c.style.left = x + "px"; c.style.top = y + "px";
    document.querySelector(".stage").appendChild(c);
    return c;
  }

  // decode ambient loop: one full weight+KV read per emitted token
  var totalGB = 0;
  var decodeLoop = gsap.timeline({ repeat: -1, paused: true });
  decodeLoop.call(function () {
    totalGB += 140;
    bytesEl.textContent = totalGB >= 1000 ? (totalGB / 1000).toFixed(1) + " TB (140 GB / token)" : totalGB + " GB (140 GB / token)";
    PH.addKV(gpu);
    var w = gpu.querySelector(".ph-w");
    gsap.fromTo(w, { boxShadow: "0 0 18px rgba(224,75,56,0.9)" }, { boxShadow: "0 0 0px rgba(224,75,56,0)", duration: 0.9 });
    var c = chip(925, 495, "out");
    gsap.to(c, { x: 90, opacity: 0, duration: 1.0, ease: "power1.out", onComplete: function () { c.remove(); } });
  }).to({}, { duration: 1.1 });

  var tl = gsap.timeline({ paused: true });

  // step 1: the machine, cool and idle; counters armed
  tl.fromTo("#gpuwrap", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" })
    .fromTo("#counters", { opacity: 0 }, { opacity: 1, duration: 0.4 }, "-=0.2")
    .fromTo("#strip", { opacity: 0 }, { opacity: 1, duration: 0.4 }, "<")
    .call(function () { flopsEl.textContent = "0"; bytesEl.textContent = "0"; });
  DECK.markStep(tl);

  // step 2: PREFILL — the prompt floods the die in one parallel wave
  tl.call(function () { phaseEl.textContent = "PREFILL"; phaseEl.style.color = "#3987e5"; })
    .to("#phase", { opacity: 1, duration: 0.3 })
    .fromTo("#doc", { opacity: 0, x: 0 }, { opacity: 1, x: 330, duration: 0.7, ease: "power2.inOut" });
  for (var i = 0; i < 10; i++) {
    tl.call(function () {
      var c = chip(300, 300 + ((Math.random() * 140) | 0));
      gsap.to(c, { x: 60 + Math.random() * 120, y: -20 + Math.random() * 60, opacity: 0, duration: 0.55, ease: "power2.in", onComplete: function () { c.remove(); } });
    }, null, "<+" + (0.06 * i));
  }
  tl.to("#doc", { opacity: 0, duration: 0.3 }, "-=0.2")
    .to(heat, { die: 1, duration: 1.3, ease: "power2.inOut", onUpdate: applyHeat }, "-=0.5")
    .call(function () { PH.setUtil(gpu, "~95%"); flopsEl.textContent = "≈ 1.1 PFLOP (8k tok)"; bytesEl.textContent = "140 GB — weights read ONCE"; })
    // prefill's receipt: the KV block materialises
    .call(function () { for (var k = 0; k < 5; k++) PH.addKV(gpu); })
    // the workload dot lands right of the ridge
    .fromTo("#wdot", { opacity: 0, left: PRE_X - 8, top: STRIPY - 60 }, { opacity: 1, top: STRIPY - 8, duration: 0.6, ease: "bounce.out" })
    .call(function () {
      var l = document.getElementById("lab-pre");
      l.style.left = (PRE_X - 250) + "px"; l.style.top = (STRIPY - 34) + "px";
    })
    .fromTo("#lab-pre", { opacity: 0 }, { opacity: 1, duration: 0.35 });
  DECK.markStep(tl);

  // step 3: THE FLIP — the first output token
  tl.call(function () {
    var c = chip(925, 495, "out");
    gsap.fromTo(c, { scale: 0 }, { scale: 1.4, x: 70, duration: 0.8, ease: "back.out(2)", onComplete: function () { gsap.to(c, { opacity: 0, duration: 0.4, onComplete: function () { c.remove(); } }); } });
  })
    .to(heat, { die: 0.55, pipe: 0.45, duration: 0.9, ease: "power2.inOut", onUpdate: applyHeat });
  DECK.markStep(tl);

  // step 4: DECODE — the whole memory dragged through the pipe per token
  tl.call(function () { phaseEl.textContent = "DECODE"; phaseEl.style.color = "#e04b38"; })
    .to(heat, { die: 0.07, pipe: 1, duration: 1.4, ease: "power2.inOut", onUpdate: applyHeat })
    .call(function () {
      PH.setUtil(gpu, "~3%");
      flopsEl.textContent = "140 GFLOPs / token";
      decodeLoop.play(0);
    })
    // ghost stays at prefill; the live dot crashes to AI ~ 1
    .fromTo("#gdot", { opacity: 0, left: PRE_X - 7, top: STRIPY - 7 }, { opacity: 0.8, duration: 0.3 })
    .to("#wdot", { left: DEC_X - 8, duration: 1.1, ease: "power2.inOut" })
    .call(function () {
      var l = document.getElementById("lab-dec");
      l.style.left = (DEC_X + 16) + "px"; l.style.top = (STRIPY - 34) + "px";
    })
    .fromTo("#lab-dec", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .to("#wdot", { scale: 1.3, duration: 0.5, yoyo: true, repeat: 3, ease: "sine.inOut" });
  DECK.markStep(tl);

  // step 5: punchline
  tl.fromTo("#caption", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.6 });

  DECK.register(tl, {
    reset: function () {
      decodeLoop.pause(0);
      totalGB = 0;
      heat.die = 0; heat.pipe = 0;
      PH.reset(gpu);
      phaseEl.textContent = "";
      flopsEl.textContent = "—"; bytesEl.textContent = "—";
      document.querySelectorAll(".tokchip").forEach(function (c) { c.remove(); });
    }
  });
</script>
</body>
</html>
