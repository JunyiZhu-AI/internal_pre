<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLOPs Are Cheap. Bytes Are Not.</title>
<link rel="stylesheet" href="shared/deck.css">
<style>
  #hero { position: absolute; left: 60px; top: 140px; }
  #hero text { font-family: ui-monospace, monospace; fill: #6b7284; font-size: 11px; }
  #hero .axisline { stroke: var(--line); stroke-width: 1.5; }
  #hero .cline { stroke: #3987e5; stroke-width: 3.5; fill: none; stroke-linecap: round; }
  #hero .bline { stroke: #2fd6b0; stroke-width: 3.5; fill: none; stroke-linecap: round; }
  #hero .gap { fill: rgba(201, 133, 0, 0.13); }
  #hero .ptlab { font-weight: 700; font-size: 12px; }
  #hero .balchip { font: 700 11.5px ui-monospace, monospace; }
  .gcard {
    position: absolute; left: 790px; width: 446px; height: 52px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 7px 12px; opacity: 0;
  }
  .gcard .gn { font-weight: 700; font-size: 13.5px; }
  .gcard .gs { font-size: 9.5px; color: var(--ink-2); margin-left: 6px; }
  .gcard .gd { font: 11px ui-monospace, monospace; color: #c7cce0; margin-top: 2px; }
  .gcard .hnote { position: absolute; right: 12px; top: 8px; font: 10px ui-monospace, monospace; color: #6fb1ff; text-align: right; line-height: 1.4; }
  .gcard .pbars { position: absolute; right: 12px; top: 7px; width: 150px; }
  .gcard .prow { display: flex; align-items: center; gap: 5px; margin-bottom: 2.5px; }
  .gcard .pn { font: 700 8.5px ui-monospace, monospace; color: #2fd6b0; width: 26px; }
  .gcard .pb { height: 7px; border-radius: 2px 4px 4px 2px; background: #2fd6b0; width: 0; }
  .gcard .pv { font: 8.5px ui-monospace, monospace; color: var(--ink-2); }
  #co-div {
    position: absolute; left: 150px; top: 170px; font: 600 14px ui-monospace, monospace;
    color: #e0a935; background: rgba(201,133,0,0.1); border: 1.5px solid rgba(201,133,0,0.5);
    border-radius: 10px; padding: 8px 14px; opacity: 0;
  }
  #co-rubin { position: absolute; left: 150px; top: 215px; font: 11px ui-monospace, monospace; color: #6b7284; opacity: 0; }
  #rack {
    position: absolute; left: 60px; top: 590px; width: 660px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 12px; padding: 10px 16px; opacity: 0;
    display: flex; gap: 16px; align-items: center;
  }
  #rackgrid { display: grid; grid-template-columns: repeat(18, 8px); gap: 2.5px; }
  #rackgrid i { width: 8px; height: 8px; border-radius: 2px; background: rgba(144,133,233,0.55); }
  #rack .rtxt { font-size: 11px; line-height: 1.5; color: var(--ink-2); }
  #rack .rtxt b { color: var(--c-o); }
  #roof2 { position: absolute; left: 790px; top: 452px; opacity: 0; }
  #roof2 text { font-family: ui-monospace, monospace; fill: #6b7284; font-size: 9px; }
  #roof2 .axisline { stroke: var(--line); stroke-width: 1.2; }
  #roof2 .roofline { stroke: #3987e5; stroke-width: 2.5; fill: none; stroke-linecap: round; }
  #aidef2 { position: absolute; left: 790px; top: 428px; font: 600 11.5px ui-monospace, monospace; color: var(--accent); opacity: 0; }
  #ridge2 { position: absolute; width: 13px; height: 13px; border-radius: 50%; background: #3987e5; box-shadow: 0 0 13px rgba(57,135,229,0.8); opacity: 0; z-index: 9; }
  #wdot2 { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: #e0a935; box-shadow: 0 0 12px rgba(224,169,53,0.85); opacity: 0; z-index: 9; }
  #wq2 { position: absolute; font: 800 19px ui-monospace, monospace; color: #e0a935; opacity: 0; z-index: 9; }
  #punch2 {
    position: absolute; left: 150px; top: 262px; width: 470px;
    font-size: 13px; color: var(--accent); font-weight: 600; line-height: 1.5; opacity: 0;
    background: rgba(11,13,18,0.88); border: 1px solid rgba(47,214,176,0.35);
    border-radius: 10px; padding: 9px 13px; z-index: 8;
  }
  #punch2 .cliff { color: var(--ink-2); font-weight: 400; font-style: italic; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">FLOPs Are Cheap. Bytes Are Not.</div>
  <div class="slide-sub">growth since A100 (=1) — compute sprints, bandwidth jogs · all BF16 dense</div>

  <svg id="hero" width="700" height="440"></svg>
  <div id="co-div"></div>
  <div id="co-rubin"></div>
  <div id="cards"></div>
  <div id="rack"><div id="rackgrid"></div><div class="rtxt" id="racktxt"></div></div>
  <div id="aidef2">AI = FLOPs ÷ bytes from HBM · roofline (H100)</div>
  <svg id="roof2" width="446" height="230"></svg>
  <div id="ridge2"></div>
  <div id="wdot2"></div>
  <div id="wq2">?</div>
  <div id="punch2"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/gpus.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  var A = GPUS.list[0];
  var cx = GPUS.list.map(function (g) { return g.tflops / A.tflops; });   // 1, 3.17, 3.17, 7.21, 11.2
  var bx = GPUS.list.map(function (g) { return g.bw / A.bw; });           // 1, 1.68, 2.4, 4, 4

  document.getElementById("co-div").textContent = GPUS.divergence;
  document.getElementById("co-rubin").textContent = GPUS.rubin;
  document.getElementById("punch2").innerHTML = GPUS.punchline + '<br><span class="cliff">' + GPUS.cliffhanger + "</span>";
  document.getElementById("racktxt").innerHTML = "<b>" + GPUS.nvl72.name + "</b> — " + GPUS.nvl72.gpus +
    " GPUs, one NVLink domain · " + GPUS.nvl72.hbm + " · " + GPUS.nvl72.aggBw + " · " + GPUS.nvl72.nvlink + " → EP";

  // ---- hero chart ----
  var NS = "http://www.w3.org/2000/svg";
  var hero = document.getElementById("hero");
  function el(svg, tag, attrs, txt) {
    var e = document.createElementNS(NS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (txt) e.textContent = txt;
    svg.appendChild(e);
    return e;
  }
  var gx = function (i) { return 90 + i * 140; };
  var gy = function (v) { return 375 - v / 12 * 340; };
  el(hero, "line", { x1: 60, y1: 375, x2: 680, y2: 375, "class": "axisline" });
  el(hero, "line", { x1: 60, y1: 375, x2: 60, y2: 25, "class": "axisline" });
  [2, 4, 6, 8, 10, 12].forEach(function (v) {
    el(hero, "text", { x: 30, y: gy(v) + 4 }, "×" + v);
  });
  GPUS.list.forEach(function (g, i) {
    el(hero, "text", { x: gx(i) - 18, y: 395, fill: g.color }, g.name);
  });

  var gapPoly = el(hero, "polygon", { "class": "gap", points: "", opacity: 0 });
  var gapLab = el(hero, "text", { x: gx(3) - 40, y: gy(5.6), fill: "#e0a935", "font-weight": 700, opacity: 0 }, "the widening gap");
  var cPath = el(hero, "path", { "class": "cline", d: "" });
  var bPath = el(hero, "path", { "class": "bline", d: "" });
  el(hero, "text", { x: 600, y: gy(11.2) - 40, fill: "#3987e5", "font-weight": 700 , opacity:0, id:"clab" }, "compute");
  el(hero, "text", { x: 618, y: gy(4) + 44, fill: "#2fd6b0", "font-weight": 700, opacity:0, id:"blab" }, "bandwidth");

  function lineD(vals, n) {
    return vals.slice(0, n).map(function (v, i) { return (i ? "L " : "M ") + gx(i) + " " + gy(v); }).join(" ");
  }
  function gapPts(n) {
    var pts = [];
    for (var i = 0; i < n; i++) pts.push(gx(i) + "," + gy(cx[i]));
    for (var i = n - 1; i >= 0; i--) pts.push(gx(i) + "," + gy(bx[i]));
    return pts.join(" ");
  }

  // dots, labels and balance chips per gen (revealed stepwise)
  GPUS.list.forEach(function (g, i) {
    el(hero, "circle", { cx: gx(i), cy: gy(cx[i]), r: 6.5, fill: "#3987e5", opacity: 0, id: "cd" + i });
    el(hero, "circle", { cx: gx(i), cy: gy(bx[i]), r: 6.5, fill: "#2fd6b0", opacity: 0, id: "bd" + i });
    el(hero, "text", { x: gx(i) - 16, y: gy(cx[i]) - 12, fill: "#6fb1ff", "class": "ptlab", opacity: 0, id: "cl" + i },
      "×" + cx[i].toFixed(1).replace(/\.0$/, "") + (g.approx ? "⚠" : ""));
    el(hero, "text", { x: gx(i) - 16, y: gy(bx[i]) + 22, fill: "#2fd6b0", "class": "ptlab", opacity: 0, id: "bl" + i },
      "×" + bx[i].toFixed(1).replace(/\.0$/, ""));
    el(hero, "text", { x: gx(i) - 20, y: 418, fill: g.color, "class": "balchip", opacity: 0, id: "bal" + i },
      "~" + GPUS.balance(g) + " F/B" + (g.approx ? "⚠" : ""));
  });

  // ---- spec cards ----
  var cardsHost = document.getElementById("cards");
  GPUS.list.forEach(function (g, i) {
    var d = document.createElement("div");
    d.className = "gcard"; d.id = "gc-" + g.key;
    d.style.top = (140 + i * 58) + "px";
    d.style.borderColor = g.color + "66";
    var extra = "";
    if (g.key === "h200") extra = '<div class="hnote">' + GPUS.h200note.replace(/ · /g, "<br>") + "</div>";
    if (g.key === "b200") {
      extra = '<div class="pbars">' + GPUS.precision.map(function (p) {
        return '<div class="prow"><span class="pn">' + p[0] + '</span><span class="pb" data-w="' + (p[1] / 9000 * 88) + '"></span><span class="pv">' + p[1].toLocaleString() + "</span></div>";
      }).join("") + "</div>";
    }
    d.innerHTML = '<span class="gn" style="color:' + g.color + '">' + g.name + '</span><span class="gs">' + g.gen + "</span>" +
      '<div class="gd">' + (g.approx ? "~" : "") + g.tflops.toLocaleString() + " TF · " + g.bw + " TB/s · " + g.cap + " GB " + g.hbm + "</div>" + extra;
    cardsHost.appendChild(d);
  });

  var rg = document.getElementById("rackgrid");
  for (var i = 0; i < 72; i++) rg.appendChild(document.createElement("i"));

  // ---- mini roofline ----
  var roof2 = document.getElementById("roof2");
  var X0 = 44, W2 = 380, Y0 = 190, H2 = 170;
  function rx(ai) { return X0 + Math.log2(ai) / 10 * W2; }
  function ry(tf) { return Y0 - Math.log2(tf) / 14 * H2; }
  el(roof2, "line", { x1: X0, y1: Y0, x2: X0 + W2, y2: Y0, "class": "axisline" });
  el(roof2, "line", { x1: X0, y1: Y0, x2: X0, y2: Y0 - H2, "class": "axisline" });
  [1, 16, 256].forEach(function (v) { el(roof2, "text", { x: rx(v) - 5, y: Y0 + 13 }, String(v)); });
  el(roof2, "text", { x: X0 + 90, y: Y0 + 27 }, "AI (FLOPs/byte)");
  var h = GPUS.list[1], bal = GPUS.balance(h);
  var rp = el(roof2, "path", {
    d: "M " + rx(1) + " " + ry(h.bw) + " L " + rx(bal) + " " + ry(h.tflops) + " L " + rx(1024) + " " + ry(h.tflops),
    "class": "roofline",
  });
  var rl = rp.getTotalLength();
  rp.style.strokeDasharray = rl; rp.style.strokeDashoffset = rl;
  el(roof2, "text", { x: rx(bal) - 26, y: ry(h.tflops) - 10, fill: "#3987e5", opacity: 0, id: "rl2" }, "ridge = " + bal);
  el(roof2, "text", { x: rx(2.4), y: ry(30), fill: "#6fb1ff", opacity: 0, id: "mem2", "font-weight": 700 }, "memory-bound");
  el(roof2, "text", { x: rx(300), y: ry(4600), fill: "#2fd6b0", opacity: 0, id: "cmp2", "font-weight": 700 }, "compute-bound");
  var R2 = { x: 790 + rx(bal), y: 452 + ry(h.tflops) };

  // ---- timeline ----
  var tl = gsap.timeline({ paused: true });

  GPUS.list.forEach(function (g, i) {
    if (i === 0) tl.fromTo("#hero", { opacity: 0 }, { opacity: 1, duration: 0.4 });
    tl.call(function () {
      cPath.setAttribute("d", lineD(cx, i + 1));
      bPath.setAttribute("d", lineD(bx, i + 1));
      gapPoly.setAttribute("points", gapPts(i + 1));
    })
      .fromTo("#gc-" + g.key, { opacity: 0, x: 22 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" })
      .fromTo(["#cd" + i, "#bd" + i], { opacity: 0 }, { opacity: 1, duration: 0.3 })
      .fromTo(["#cl" + i, "#bl" + i, "#bal" + i], { opacity: 0 }, { opacity: 1, duration: 0.3 }, "-=0.1");
    if (i === 1) tl.to(gapPoly, { opacity: 1, duration: 0.4 }, "-=0.2");
    if (g.key === "h200") {
      tl.to("#gc-h200", { boxShadow: "0 0 0 1.5px rgba(111,177,255,0.65)", duration: 0.3 });
    }
    if (g.key === "b200") {
      document.querySelectorAll("#gc-b200 .pb").forEach(function (b) {
        tl.fromTo(b, { width: 0 }, { width: b.dataset.w + "px", duration: 0.4, ease: "power2.out" }, "<+0.07");
      });
    }
    if (g.key === "b300") {
      tl.to(gapLab, { opacity: 1, duration: 0.35 })
        .to("#clab, #blab", { opacity: 1, duration: 0.35 }, "<")
        .fromTo("#co-div", { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" })
        .fromTo("#co-rubin", { opacity: 0 }, { opacity: 1, duration: 0.35 }, "-=0.15");
    }
    DECK.markStep(tl);
  });

  // step 6: NVL72
  tl.fromTo("#rack", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" })
    .fromTo("#rackgrid i", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.2, stagger: 0.006 }, "-=0.25");
  DECK.markStep(tl);

  // step 7: mini roofline draws, ridge dot flies from the H100 card
  tl.fromTo("#aidef2, #roof2", { opacity: 0 }, { opacity: 1, duration: 0.4 })
    .to(rp, { strokeDashoffset: 0, duration: 0.9, ease: "power2.inOut" })
    .fromTo("#ridge2", { opacity: 1, left: 1180, top: 216, scale: 0.5 },
      { left: R2.x - 6.5, top: R2.y - 6.5, scale: 1, duration: 0.7, ease: "power2.inOut" })
    .to("#rl2", { opacity: 1, duration: 0.3 })
    .to("#mem2, #cmp2", { opacity: 1, duration: 0.35 });
  DECK.markStep(tl);

  // step 8: workload dot rides down to AI ~ 1; punchline
  var pts = [800, 400, bal, 32, 8, 1.3].map(function (ai) {
    var tf = Math.min(h.tflops, h.bw * ai);
    return { left: 790 + rx(ai) - 6, top: 452 + ry(tf) - 6 };
  });
  tl.fromTo("#wdot2", { opacity: 0 }, { opacity: 1, duration: 0.25, left: pts[0].left, top: pts[0].top });
  pts.slice(1).forEach(function (p) {
    tl.to("#wdot2", { left: p.left, top: p.top, duration: 0.4, ease: "power1.inOut" });
  });
  tl.call(function () {
    var q = document.getElementById("wq2");
    q.style.left = pts[5].left + "px"; q.style.top = (pts[5].top - 30) + "px";
  })
    .fromTo("#wq2", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2.5)" })
    .to("#wq2", { scale: 1.3, duration: 0.55, yoyo: true, repeat: 1, ease: "sine.inOut" })
    .fromTo("#punch2", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 }, "-=0.7");

  DECK.register(tl, {});
</script>
</body>
</html>
