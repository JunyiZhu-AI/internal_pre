<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sparse Attention: Attend to Fewer Tokens</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/evo.css">
<style>
  #fwrap { position: absolute; left: 44px; top: 122px; display: flex; align-items: flex-start; gap: 8px; opacity: 0; }
  #fwrap .feq { font: 600 12px ui-monospace, monospace; color: #9aa1b5; padding-top: 5px; }
  #fwrap .fop { font: 700 15px ui-monospace, monospace; color: #4a5066; padding-top: 2px; }
  .ft { text-align: center; position: relative; padding: 0 2px 6px; }
  .ft .fv { font: 800 18px ui-monospace, monospace; color: #9085e9; white-space: nowrap; }
  .ft .fl { font: 9.5px ui-monospace, monospace; color: #6b7284; margin-top: 1px; white-space: nowrap; }
  .ft.dimt .fv { color: #55607a; }
  .ft.dimt .fl { color: #3c4152; }
  .ft.hot .fv { color: var(--hot); }
  .ft.hot .fl { color: var(--hot); opacity: 0.7; }
  .ft.hot::after { content: ""; position: absolute; left: 2px; right: 2px; bottom: 0; height: 2.5px; border-radius: 2px; background: var(--hot); box-shadow: 0 0 10px var(--hot); }
  #fres { font: 800 15px ui-monospace, monospace; color: #ff8a7a; padding-top: 4px; white-space: nowrap; }
  #fnote { position: absolute; left: 44px; top: 184px; font: 600 11.5px ui-monospace, monospace; color: #6b7284; opacity: 0; }
  /* score matrix */
  #mtx { position: absolute; left: 60px; top: 214px; opacity: 0; }
  #mtx i { position: absolute; width: 17px; height: 17px; border-radius: 3px; background: rgba(57,135,229,0.4); }
  #mtxlab { position: absolute; left: 60px; top: 528px; width: 320px; font: 600 10.5px ui-monospace, monospace; color: #6b7284; opacity: 0; }
  /* KV cache strip */
  #cache { position: absolute; left: 470px; top: 214px; opacity: 0; }
  #cache i { position: absolute; left: 0; width: 48px; height: 16px; border-radius: 3px; background: rgba(144,133,233,0.75); }
  #cachelab { position: absolute; left: 452px; top: 528px; width: 90px; text-align: center; font: 700 10.5px ui-monospace, monospace; color: var(--c-o); opacity: 0; }
  /* right rail of one-liners */
  .rline { position: absolute; left: 660px; width: 560px; font: 600 12.5px ui-monospace, monospace; line-height: 1.55; opacity: 0; }
  .rline b { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; }
  #punchline { position: absolute; left: 44px; bottom: 66px; width: 940px; font: 600 13.5px ui-monospace, monospace; color: #ff8a7a; opacity: 0; }
  #handoff { position: absolute; left: 44px; bottom: 30px; width: 940px; font-size: 15.5px; font-weight: 700; color: var(--accent); opacity: 0; }
</style></head>
<body>
<div class="stage">
  <div class="slide-title">Sparse Attention: Attend to Fewer Tokens</div>
  <div class="slide-sub">third knob lives outside the per-token bytes — the &times; n multiplier</div>
  <div id="strip"></div>

  <div id="fwrap"></div>
  <div id="fnote">per-token bytes stand — sparse attacks the count</div>
  <div id="mtx"></div>
  <div id="mtxlab">n &times; n scores — each row: one query over all past tokens</div>
  <div id="cache"></div>
  <div id="cachelab">KV cache</div>

  <div class="rline" id="rl1" style="top:228px; color:#e0a935"><b style="background:#e0a935"></b><span></span></div>
  <div class="rline" id="rl2" style="top:290px; color:#c7cce0"><b style="background:#e0a935"></b><span></span></div>
  <div class="rline" id="rl3" style="top:352px; color:#c7cce0"><b style="background:#9085e9"></b><span></span></div>
  <div id="punchline"></div>
  <div id="handoff"></div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/attnevo.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  EV.mapStrip(document.getElementById("strip"), 3);
  var strip = document.getElementById("strip");
  strip.style.left = "660px"; strip.style.top = "96px";

  function T(v, l, id, cls) { return '<div class="ft ' + (cls || "") + '" id="' + id + '"><div class="fv">' + v + '</div><div class="fl">' + l + "</div></div>"; }
  document.getElementById("fwrap").innerHTML =
    '<span class="feq">cache =</span>' +
    T("2", "K and V", "t-2", "dimt") + '<span class="fop">&times;</span>' +
    T("80", "layers", "t-nl", "dimt") + '<span class="fop">&times;</span>' +
    T("8", "KV heads", "t-kv", "dimt") + '<span class="fop">&times;</span>' +
    T("128", "head dim", "t-dh", "dimt") + '<span class="fop">&times;</span>' +
    T("2 B", "BF16", "t-by", "dimt") + '<span class="fop">&times;</span>' +
    T("n", "tokens kept", "t-n") + '<span class="fop">=</span>' +
    '<span id="fres">grows with context</span>';
  var tn = document.getElementById("t-n");
  tn.classList.add("hot"); tn.style.setProperty("--hot", "#e0a935");
  var tnVal = tn.querySelector(".fv");
  var fres = document.getElementById("fres");

  document.querySelector("#rl1 span").textContent = EV.sparse.window;
  document.querySelector("#rl2 span").textContent = EV.sparse.learned;
  document.querySelector("#rl3 span").textContent = EV.sparse.evict;
  document.getElementById("punchline").textContent = EV.sparse.tradeoff;
  document.getElementById("handoff").textContent = "next: delete the per-token term itself → the linear line";

  // ---- lower-triangular score matrix, 16x16 ----
  var N = 16, W = 4, SEL = [2, 3, 6, 7];
  var mtx = document.getElementById("mtx");
  var band = [], off = [], sel = [];
  for (var r = 0; r < N; r++) for (var c = 0; c <= r; c++) {
    var i = document.createElement("i");
    i.style.left = (c * 19) + "px"; i.style.top = (r * 19) + "px";
    mtx.appendChild(i);
    if (r - c < W) band.push(i);
    else {
      off.push(i);
      if (r >= 12 && SEL.indexOf(c) >= 0) sel.push(i);
    }
  }

  // ---- KV cache strip: token j = one purple cell ----
  var cache = document.getElementById("cache");
  var evict = [], keep = [];
  for (var j = 0; j < N; j++) {
    var e = document.createElement("i");
    e.style.top = ((N - 1 - j) * 19) + "px";   // newest on top
    cache.appendChild(e);
    if (j >= N - W || SEL.indexOf(j) >= 0) keep.push(e); else evict.push(e);
  }

  // ambient: the router's picks shimmer
  var amb = gsap.timeline({ repeat: -1, paused: true });
  amb.to(sel, { opacity: 0.55, duration: 0.7, ease: "sine.inOut", stagger: 0.05 })
    .to(sel, { opacity: 1, duration: 0.7, ease: "sine.inOut", stagger: 0.05 });

  function setTn(v, resTxt, resColor) {
    tnVal.textContent = v; fres.textContent = resTxt; fres.style.color = resColor;
    gsap.fromTo([tn, fres], { scale: 1.15 }, { scale: 1, duration: 0.35, transformOrigin: "center" });
  }

  var tl = gsap.timeline({ paused: true });

  // step 1: full n×n fades to a sliding-window band
  tl.fromTo("#fwrap", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#fnote", { opacity: 0 }, { opacity: 1, duration: 0.3 })
    .fromTo("#mtx", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .fromTo("#mtx i", { opacity: 0 }, { opacity: 1, duration: 0.25, stagger: 0.002 })
    .fromTo("#mtxlab", { opacity: 0 }, { opacity: 1, duration: 0.3 })
    .fromTo("#cache, #cachelab", { opacity: 0 }, { opacity: 1, duration: 0.35 })
    .to({}, { duration: 0.4 })
    .to(off, { opacity: 0.07, duration: 0.8, stagger: 0.001 })
    .to(band, { backgroundColor: "rgba(224,169,53,0.85)", duration: 0.8 }, "<")
    .call(function () { setTn("w", "bounded by the window", "#e0a935"); })
    .fromTo("#rl1", { opacity: 0, x: 10 }, { opacity: 1, x: 0, duration: 0.4 });
  DECK.markStep(tl);

  // step 2: a router picks blocks from the deep past
  tl.to(sel, { opacity: 0.95, backgroundColor: "rgba(224,169,53,0.95)", duration: 0.4, stagger: 0.025, ease: "power2.out" })
    .call(function () { amb.play(0); })
    .call(function () { setTn("w+s", "window + selected blocks", "#e0a935"); })
    .fromTo("#rl2", { opacity: 0, x: 10 }, { opacity: 1, x: 0, duration: 0.4 });
  DECK.markStep(tl);

  // step 3: everything else leaves the cache
  tl.to(evict, {
    x: -30, opacity: 0, backgroundColor: "rgba(224,75,56,0.8)",
    duration: 0.55, stagger: 0.04, ease: "power2.in"
  })
    .to(keep, { boxShadow: "0 0 10px rgba(144,133,233,0.9)", duration: 0.3, yoyo: true, repeat: 1 })
    .call(function () { setTn("w+s", "bounded — flat in n", "#2fd6b0"); })
    .fromTo("#rl3", { opacity: 0, x: 10 }, { opacity: 1, x: 0, duration: 0.4 });
  DECK.markStep(tl);

  // step 4: the trade-off — and the hand-off
  tl.fromTo("#punchline", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 })
    .fromTo("#handoff", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45 })
    .fromTo(strip.children[8], { scale: 1 }, { scale: 1.25, duration: 0.3, yoyo: true, repeat: 1 });

  DECK.register(tl, {
    reset: function () {
      amb.pause(0);
      gsap.set(sel, { clearProps: "opacity" });
      tnVal.textContent = "n";
      fres.textContent = "grows with context"; fres.style.color = "#ff8a7a";
      gsap.set([tn, fres], { scale: 1 });
    }
  });
</script>
</body></html>
