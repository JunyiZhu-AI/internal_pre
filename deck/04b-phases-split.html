<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prefill vs Decode: Two Different Workloads</title>
<link rel="stylesheet" href="shared/deck.css">
<link rel="stylesheet" href="shared/phases.css">
<style>
  .side { position: absolute; top: 228px; opacity: 0; }
  #sideP { left: 84px; }
  #sideD { left: 726px; }
  .side .word {
    position: absolute; top: -54px; left: 0; font: 800 22px ui-monospace, monospace;
    letter-spacing: 0.08em; color: #3a4157;
  }
  .side .tag {
    position: absolute; top: 216px; left: 0; font: 700 12.5px ui-monospace, monospace;
    border: 1.5px solid; border-radius: 999px; padding: 4px 14px; opacity: 0;
  }
  .side .stat {
    position: absolute; top: 254px; left: 0; font: 12px ui-monospace, monospace;
    color: #9aa1b5; opacity: 0;
  }
  .side .stat b { color: #e8eaf0; }
  #vs {
    position: absolute; left: 50%; top: 300px; transform: translateX(-50%);
    font: 800 17px ui-monospace, monospace; color: #3a4157; opacity: 0;
  }
  #strip { position: absolute; left: 44px; top: 580px; }
  #strip text { font: 11px ui-monospace, monospace; fill: #6b7284; }
  #strip .axisline { stroke: var(--line); stroke-width: 1.5; }
  .sdot { position: absolute; width: 15px; height: 15px; border-radius: 50%; opacity: 0; z-index: 9; }
  .dlab { position: absolute; font: 700 12px ui-monospace, monospace; opacity: 0; z-index: 9; white-space: nowrap; }
  #caption {
    position: absolute; left: 0; top: 106px; width: 100%; text-align: center;
    font-size: 21px; font-weight: 700; color: var(--accent); opacity: 0;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-title">Prefill vs Decode: Two Different Workloads</div>
  <div class="slide-sub">the same silicon, read two ways</div>
  <div id="caption"></div>

  <div class="side" id="sideP">
    <div class="word">PREFILL</div>
    <div id="gpuP-host"></div>
    <div class="tag" style="color:#3987e5; border-color:#3987e5">compute-bound</div>
    <div class="stat">AI ≈ seq length · util <b>~95%</b> · <b>TTFT</b></div>
  </div>
  <div id="vs">vs</div>
  <div class="side" id="sideD">
    <div class="word">DECODE</div>
    <div id="gpuD-host"></div>
    <div class="tag" style="color:#e04b38; border-color:#e04b38">bandwidth-bound</div>
    <div class="stat"><b>140 GB</b> read / token · util <b>~3%</b></div>
  </div>

  <svg id="strip" width="1192" height="80"></svg>
  <div class="sdot" id="dotP" style="background:#3987e5; box-shadow:0 0 14px rgba(57,135,229,0.9)"></div>
  <div class="sdot" id="dotD" style="background:#e04b38; box-shadow:0 0 14px rgba(224,75,56,0.9)"></div>
  <div class="dlab" id="labP" style="color:#3987e5">prefill</div>
  <div class="dlab" id="labD" style="color:#e04b38">decode · AI ≈ 1</div>
</div>

<script src="../vendor/gsap.min.js"></script>
<script src="shared/phases.js"></script>
<script src="shared/manifest.js"></script>
<script src="shared/deck.js"></script>
<script>
  document.getElementById("caption").textContent = PH.caption;
  document.getElementById("gpuP-host").innerHTML = PH.gpuHTML("gpuP");
  document.getElementById("gpuD-host").innerHTML = PH.gpuHTML("gpuD");
  var gpuP = document.getElementById("gpuP"), gpuD = document.getElementById("gpuD");
  PH.reset(gpuP); PH.reset(gpuD);

  var NS = "http://www.w3.org/2000/svg";
  var strip = document.getElementById("strip");
  function sx(ai) { return 60 + Math.log2(ai) / 10 * 1080; }
  function sel(tag, attrs, txt) {
    var e = document.createElementNS(NS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (txt !== undefined) e.textContent = txt;
    strip.appendChild(e);
    return e;
  }
  sel("line", { x1: 60, y1: 40, x2: 1140, y2: 40, "class": "axisline" });
  [1, 4, 16, 64, 256, 1024].forEach(function (v) {
    sel("line", { x1: sx(v), y1: 36, x2: sx(v), y2: 44, "class": "axisline" });
    sel("text", { x: sx(v) - 6, y: 62 }, String(v));
  });
  sel("text", { x: 60, y: 18 }, "arithmetic intensity (FLOPs/byte)");
  sel("line", { x1: sx(295), y1: 14, x2: sx(295), y2: 40, stroke: "#6fb1ff", "stroke-width": 2, "stroke-dasharray": "5 4" });
  sel("text", { x: sx(295) - 44, y: 76, fill: "#6fb1ff" }, "ridge ≈ 295 (H100)");
  var STRIPY = 580 + 40, PRE_X = 44 + sx(1024) - 30, DEC_X = 44 + sx(1.15);

  function chip(x, y, cls) {
    var c = document.createElement("div");
    c.className = "tokchip " + (cls || "");
    c.style.left = x + "px"; c.style.top = y + "px";
    document.querySelector(".stage").appendChild(c);
    return c;
  }

  var heatP = { die: 0, pipe: 0 }, heatD = { die: 0, pipe: 0 };
  function applyP() { PH.setDie(gpuP, heatP.die); PH.setPipe(gpuP, heatP.pipe); }
  function applyD() { PH.setDie(gpuD, heatD.die); PH.setPipe(gpuD, heatD.pipe); }

  // ambient loops
  var prefillLoop = gsap.timeline({ repeat: -1, paused: true });
  prefillLoop.call(function () {
    var c = chip(96, 300 + ((Math.random() * 100) | 0));
    gsap.to(c, { x: 60 + Math.random() * 90, opacity: 0, duration: 0.5, ease: "power2.in", onComplete: function () { c.remove(); } });
  }).to({}, { duration: 0.35 });

  var decodeLoop = gsap.timeline({ repeat: -1, paused: true });
  decodeLoop.call(function () {
    PH.addKV(gpuD);
    var w = gpuD.querySelector(".ph-w");
    gsap.fromTo(w, { boxShadow: "0 0 16px rgba(224,75,56,0.9)" }, { boxShadow: "0 0 0px rgba(224,75,56,0)", duration: 0.9 });
    var c = chip(1195, 320, "out");
    gsap.to(c, { x: 46, opacity: 0, duration: 1.0, ease: "power1.out", onComplete: function () { c.remove(); } });
  }).to({}, { duration: 1.1 });

  var tl = gsap.timeline({ paused: true });

  // step 1: two identical machines, idle
  tl.fromTo("#sideP", { opacity: 0, x: -24 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" })
    .fromTo("#sideD", { opacity: 0, x: 24 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, "-=0.3")
    .fromTo("#vs", { opacity: 0 }, { opacity: 1, duration: 0.3 });
  DECK.markStep(tl);

  // step 2: prefill runs — die saturates, pipe stays cool, KV receipt appears
  tl.call(function () { document.querySelector("#sideP .word").style.color = "#3987e5"; prefillLoop.play(0); })
    .to(heatP, { die: 1, pipe: 0.12, duration: 1.3, ease: "power2.inOut", onUpdate: applyP })
    .call(function () {
      PH.setUtil(gpuP, "~95%");
      for (var k = 0; k < 5; k++) PH.addKV(gpuP);
    })
    .fromTo("#sideP .tag", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35 })
    .fromTo("#sideP .stat", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "-=0.1")
    .fromTo("#dotP", { opacity: 0, left: PRE_X - 7, top: STRIPY - 50 }, { opacity: 1, top: STRIPY - 7, duration: 0.5, ease: "bounce.out" })
    .call(function () {
      var l = document.getElementById("labP");
      l.style.left = (PRE_X - 70) + "px"; l.style.top = (STRIPY - 32) + "px";
    })
    .fromTo("#labP", { opacity: 0 }, { opacity: 1, duration: 0.3 });
  DECK.markStep(tl);

  // step 3: the flip — prefill's first token becomes decode's seed
  tl.call(function () {
    var c = chip(548, 320, "out");
    gsap.to(c, { x: 260, duration: 0.9, ease: "power2.inOut", onComplete: function () { c.remove(); } });
  })
    .to({}, { duration: 0.9 });
  DECK.markStep(tl);

  // step 4: decode runs — pipe red-hot, die cool, KV grows and squeezes batch
  tl.call(function () { document.querySelector("#sideD .word").style.color = "#e04b38"; })
    .to(heatD, { die: 0.07, pipe: 1, duration: 1.2, ease: "power2.inOut", onUpdate: applyD })
    .call(function () { PH.setUtil(gpuD, "~3%"); decodeLoop.play(0); })
    .fromTo("#sideD .tag", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35 })
    .fromTo("#sideD .stat", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "-=0.1")
    .fromTo("#dotD", { opacity: 0, left: PRE_X - 7, top: STRIPY - 7 }, { opacity: 1, left: DEC_X - 7, duration: 1.0, ease: "power2.inOut" })
    .call(function () {
      var l = document.getElementById("labD");
      l.style.left = (DEC_X + 16) + "px"; l.style.top = (STRIPY - 32) + "px";
    })
    .fromTo("#labD", { opacity: 0 }, { opacity: 1, duration: 0.3 })
    .to("#dotD", { scale: 1.3, duration: 0.5, yoyo: true, repeat: 3, ease: "sine.inOut" });
  DECK.markStep(tl);

  // step 5: punchline
  tl.fromTo("#caption", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.6 });

  DECK.register(tl, {
    reset: function () {
      prefillLoop.pause(0); decodeLoop.pause(0);
      heatP.die = heatP.pipe = heatD.die = heatD.pipe = 0;
      PH.reset(gpuP); PH.reset(gpuD);
      document.querySelectorAll(".side .word").forEach(function (w) { w.style.color = "#3a4157"; });
      document.querySelectorAll(".tokchip").forEach(function (c) { c.remove(); });
    }
  });
</script>
</body>
</html>
